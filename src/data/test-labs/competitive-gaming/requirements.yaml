- requirement: 1
  text: |-
      <strong>History of Gaming</strong>. Do the following:
  children:
      - requirement: a
        text: |-
            Create a timeline showing how video gaming has evolved since 1958.
            Include at least one significant event from each decade.
        resources:
            - href: https://www.museumofplay.org/video-game-history-timeline/
              text: Video Game History Timeline
              type: website
            - href: https://www.pbs.org/kcts/videogamerevolution/history/index.html
              text: The Video Game Revolution
              type: website
            - href: https://www.si.edu/sidedoor/ep-15-worst-video-game-ever?page=1
              text: The Worst Video Game Ever
              type: website
      - requirement: b
        text: |-
            Identify and define five major video game genres. Provide an
            example for each.
        resources:
            - href: https://glitchwave.com/games/genre/
              text: Glitchwave Game Genres
              type: website
            - href: https://esportsinsider.com/esports-genres-explained
              text: 'Esports Genres Explained: Everything You Need to Know'
              type: website
            - href: https://www.google.com/search?q=pac+man
              text: Free Games
              type: website
      - requirement: c
        text: |-
            Explain the difference between video gaming and esports. Include
            how esports incorporates elements of organized competition such as
            teams, tournaments, rules, coaching, and spectatorship. Provide two
            examples of games that are commonly played casually as video games but
            are also used in organized esports competition.
        resources:
            - href: https://drive.google.com/file/d/12HVwGZbzfuvZNJ1fT7Htygk7BgyFnSXF/view
              text: Gaming vs. Esports
              type: website
            - href: https://hwb.gov.wales/keeping-safe-online/views-from-the-experts/video-gaming-and-esports-the-differences-and-distinctions-in-detail
              text: 'Video gaming and esports: the differences and distinctions in detail'
              type: website
            - href: https://help.playvs.com/en/articles/5915810-game-title-overview
              text: PlayVS Game Title Overview
              type: website
      - requirement: d
        text: |-
            Identify and define five major moments in the development of
            esports as an industry since 1990. Include key tournaments,
            technological advances, and organizations that helped shape
            competitive gaming globally. Discuss your findings with your merit
            badge counselor.
        resources:
            - href: https://whatisesports.xyz/major-milestones-esports-history-timeline/
              text: 'Major Milestones in Esports History: A Timeline'
              type: website
- requirement: 2
  text: |-
      <strong>Living the Scout Oath and Law Online</strong>. Do the
      following:
  children:
      - requirement: a
        text: |-
            Define the term “toxicity in gaming.” Describe a real or
            hypothetical example of toxic behavior in online play and outline how
            the situation could be prevented or resolved by applying the Scout
            Oath and Law.
        resources:
            - href: https://staticctf.ubisoft.com/8aefmxkxpxwl/1wJowtd0nH3HS8gAANwF3i/0d0f9fe2d3f9ac6315e069b109aad640/Good_Game_Playbook_for_Teens_EN.pdf
              text: Good Game Playbook for Teens
              type: pdf
            - href: https://alltogethernow.org.au/our-work/far-right-extremism/game-changers-resources-guide/
              text: Game Changer Resource Guide
              type: website
      - requirement: b
        text: |-
            List five strategies for handling negative online gaming
            experiences. Describe how each strategy reflects a point of the Scout
            Oath or Law.
        resources:
            - href: https://www.twoaveragegamers.com/how-to-deal-with-toxic-players-a-gamers-guide-to-staying-sane-online/
              text: 'How to Deal with Toxic Players: A Gamer’s Guide to Staying Sane'
              type: website
            - href: https://www.childline.org.uk/info-advice/bullying-abuse-safety/types-bullying/bullying-cyberbullying/
              text: Bullying and Cyberbullying
              type: website
      - requirement: c
        text: |-
            Research the Entertainment Software Rating Board (ESRB) rating
            system. Record the ratings of the video games you own and compare them
            to your age group. Explain to your counselor whether you agree with
            the ESRB descriptions.
        resources:
            - href: https://www.internetmatters.org/resources/video-games-age-ratings-explained/
              text: Video games age ratings explained
              type: website
            - href: http://www.esrb.org/search/
              text: Search ESRB Game Ratings
              type: website
      - requirement: d
        text: |-
            List five ways to create a positive online gaming environment for
            yourself and others. Demonstrate one of these methods with your troop,
            patrol, or family.
        resources:
            - href: https://www.twoaveragegamers.com/the-ultimate-guide-to-non-toxic-gaming-communities/
              text: The Ultimate Guide to Non-Toxic Gaming Communities
              type: website
            - href: https://www.twoaveragegamers.com/the-ultimate-guide-to-non-toxic-gaming-communities/
              text: StopBullying.gov – What Kids Can Do
              type: website
- requirement: 3
  text: |-
      <strong>Gamer Health and Balance</strong>. Do the following:
  children:
      - requirement: a
        text: Read two credible articles describing positive aspects of video
            gaming and two describing negative aspects. Create a chart showing
            where the articles agree or disagree.
        resources:
            - href: https://www.popsci.com/health/video-game-benefits/
              text: The surprising benefits of video games
              type: website
            - href: https://health.clevelandclinic.org/are-video-games-good-for-you
              text: Are Video Games Good for You? Your Brain Thinks So
              type: website
            - href: https://www.ted.com/talks/kris_alexander_how_video_games_can_level_up_the_way_you_learn
              text: How Video Games Can Level Up the Way You Learn
              type: website
            - href: https://www.aoa.org/healthy-eyes/caring-for-your-eyes/welcome-to-blink-land
              text: Welcome to Blink Land
              type: website
            - href: https://www.kidsvillepeds.com/blog/1290873-how-video-games-affect-kids-behavioral-health-the-hidden-risks/
              text: 'How Video Games Affect Kids’ Behavioral Health: The Hidden Risks'
              type: website
            - href: https://www.brightpathbh.com/effects-of-video-games-on-teen-mental-health/
              text: Effects Of Video Games On Teen Mental Health
              type: website
            - href: https://www.sciencejournalforkids.org/wp-content/uploads/2025/05/screentime-ADHD_Article.pdf
              text: What is the link between screen time and ADHD?
              type: pdf
      - requirement: b
        text: |-
            Track the amount of gaming you do each day for two weeks. Record
            and summarize your results.
        resources:
            - href: https://wordunited.com/free-resources/screen-time-tracker/
              text: Screen Time Tracker
              type: website
      - requirement: c
        text: |-
            Track your daily physical activity for the same two weeks. Compare
            your results to the CDC recommendation of one hour of
            moderate-to-vigorous activity per day for youth ages 6–17.
        resources:
            - href: https://www.cdc.gov/healthyweight/pdf/physical_activity_diary_cdc.pdf
              text: My Physical Activity Diary
              type: pdf
      - requirement: d
        text: |-
            Track your daily sleep for the same two weeks. Compare your
            results to the CDC recommendation of 9–12 hours for ages 6–12 and 8–10
            hours for ages 13–18.
        resources:
            - href: ahttps://thesleepcharity.org.uk/wp-content/uploads/The-Sleep-Charity-Teens-Sleep-Diary.pdf
              text: Teen Sleep Diary
              type: pdf
      - requirement: e
        text: |-
            After completing 3b, 3c, and 3d, create a one-week balanced
            schedule that includes healthy sleep, physical activity, and
            agreed-upon gaming time. Follow this schedule and summarize your
            results.
        resources:
            - href: https://www.cci.health.wa.gov.au/~/media/CCI/Mental-Health-Professionals/Depression/Depression-Worksheets/Depression-Worksheet---03---Weekly-Activity-Schedule.pdf
              text: Weekly Activity Schedule
              type: pdf
- requirement: 4
  text: |-
      <strong>Gamer Safety and Community Connection</strong>. Do the
      following:
  children:
      - requirement: a
        text: |-
            Explain the benefits and risks of gaming online.
        resources:
            - href: https://builtin.com/articles/online-gaming-social-benefits
              text: The Real Benefits of Video Games
              type: website
            - href: https://www.smartsocial.com/post/negative-effects-video-games
              text: Negative Effects of Video Games
              type: website
      - requirement: b
        text: |-
            Research and list ten ways to stay safe when playing video games
            online.
        resources:
            - href: https://www.internetmatters.org/issues/
              text: Online safety issues
              type: website
            - href: https://www.dhs.gov/sites/default/files/2024-09/24_09_20_K2P_Gaming-Safety.pdf
              text: Gaming Safety
              type: pdf
      - requirement: c
        text: |-
            Play one of your favorite games with your parent or guardian for
            at least 30 minutes. Demonstrate how to use privacy and safety
            settings, explain what you enjoy about the game, and let them play for
            part of the session.
        resources:
            - href: https://internetsafety101.org/objects/Gaming-controls-quick-guide-03-24-2025.pdf
              text: Online Gaming Safety Settings
              type: pdf
      - requirement: d
        text: |-
            Play an online or local multiplayer game with another Scout,
            friend, or community member in a cooperative or team-based setting.
            The match may be casual or competitive. During play, demonstrate
            positive communication, teamwork, and sportsmanship. Afterward, review
            the experience with your counselor and describe how cooperation and
            communication influenced your team’s performance and overall enjoyment
            of the game.
- requirement: 5
  text: |-
      <strong>Technology in Competitive Gaming</strong>. Do the following:
  children:
      - requirement: a
        text: |-
            Explain the difference between console gaming and PC gaming. List
            the advantages and disadvantages of each.
        resources:
            - href: https://www.seagate.com/blog/console-vs-pc-gaming/
              text: 'Console vs. PC Gaming: Which Is Better?'
              type: website
      - requirement: b
        text: |-
            Play the same game on at least two different platforms. Describe
            the similarities and differences in gameplay and performance.
      - requirement: c
        text: |-
            Visit a PC builder website such as PCPartPicker or Micro Center.
            Design your ideal gaming PC and create a parts list that includes:
            central processing unit (CPU), motherboard, random access memory
            (RAM), hard drive, power supply, graphics card, fans, case. Discuss
            your selections with your counselor.
        resources:
            - href: https://pcpartpicker.com/
              text: PCPartPicker
              type: website
            - href: https://www.microcenter.com/site/content/custom-pc-builder.aspx
              text: Micro Center
              type: website
- requirement: 6
  text: |-
      <strong>Leadership and Service in Competitive Gaming</strong>. Do ONE
      of the following:
  children:
      - requirement: a
        text: |-
            Teach your troop, patrol, or a group of younger Scouts or family
            members about online gaming safety or digital citizenship.
      - requirement: b
        text: |-
            Attend or view a live-streamed esports event online, such as a
            professional tournament, collegiate match, or school-level
            competition. Take notes on how the broadcast team presents the event,
            how players communicate, and how the audience interacts digitally.
            Share with your merit badge counselor what you learned about the
            structure and presentation of online esports competition.
      - requirement: c
        text: |-
            Attend an esports tournament, convention, or community event that
            includes a competitive gaming activity or demonstration. Attend with
            another Scout, troop member, or family member. Afterward, share with
            your merit badge counselor what you learned about the atmosphere of
            live esports events and how the experience changed your understanding
            of playing games competitively in front of an audience.
- requirement: 7
  text: |-
      Exploring Professions in the Competitive Gaming Industry</strong>. Do
      the following:
  children:
      - requirement: a
        text: |-
            Research two colleges that offer varsity esports programs. Record
            the following information for each: availability and amount of gaming
            scholarships, offered gaming or IT-related degrees, games played by
            the esports team, league or association in which the team competes.
        resources:
            - href: https://www.nacesports.org/school-directory
              text: NACE School Directory
              type: website
      - requirement: b
        text: |-
            Research three gaming-adjacent careers that support or connect to
            the esports industry but are not esports athlete roles. Examples may
            include: game designer or developer, shoutcaster or broadcast
            producer, data analyst or statistician, marketing or event
            coordinator, IT or network support specialist. For each career,
            identify the main responsibilities, education or training
            requirements, and how the role contributes to the success of the
            gaming or esports ecosystem.
        resources:
            - href: https://www.flipbookpdf.net/web/site/0f69cbe0b3ab4127778010bc84c0383f86c1f5a5FBP25582848.pdf.html#page/5
              text: 100 Jobs in Esports
              type: website
            - href: https://hitmarker.net/
              text: Hitmaker
              type: website
            - href: https://www.youtube.com/watch?v=dY42XJUcBME
              text: Careers in Esports
              type: video
      - requirement: c
        text: |-
            Visit the “Careers” or “Jobs” page of a major game publisher (such
            as Blizzard, Riot, Epic or Nintendo). Choose three jobs that interest
            you. For each, identify the required education, skills, and
            experience.
        resources:
            - href: https://careers.blizzard.com/global/en
              text: Careers at Blizzard Entertainment
              type: website
            - href: https://www.riotgames.com/en/work-with-us
              text: Riot Games – Work With Us
              type: website
            - href: https://www.epicgames.com/site/en-US/careers
              text: Epic Games Careers, Jobs and Employment Opportunity
              type: website
            - href: https://careers.nintendo.com/
              text: Careers at Nintendo of America
              type: website
- requirement: 8
  text: |-
      <strong>Complete the survey below to complete the test lab
      requirements</strong>
