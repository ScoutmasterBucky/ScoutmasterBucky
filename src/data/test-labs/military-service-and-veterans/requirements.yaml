- requirement: 1
  text: |-
      <strong>Explore Military Heritage.</strong> Do the following:
  children:
      - requirement: a
        text: |-
            Learn about Robert Baden-Powell’s military service. Discuss with
            your counselor what he learned about people, values, and culture
            through his military service and how it influenced the founding of
            Scouting.
        resources:
            - href: https://www.youtube.com/watch?v=8xW61FgOImw
              text: Robert Baden Powell
              type: video
            - href: https://www.britannica.com/biography/Robert-Stephenson-Smyth-Baden-Powell-1st-Baron-Baden-Powell
              text: Robert Baden-Powell
              type: website
      - requirement: b
        text: |-
            Select a historical military conflict. Discuss with your counselor
            what caused it and how leadership, planning, or values affected its
            outcome, how it was resolved, and discuss what lessons can be learned
            from it.
        resources:
            - href: https://www.youtube.com/watch?v=NdRuU5ON-LU
              text: American Revolutionary War – Timelines and Maps – Animated US History
              type: video
            - href: https://www.loc.gov/classroom-materials/united-states-history-primary-source-timeline/american-revolution-1763-1783/overview/
              text: History of the American Revolution
              type: website
            - href: https://www.youtube.com/watch?v=T3ryzrowNKc
              text: The American Civil War Explained
              type: video
            - href: https://www.loc.gov/classroom-materials/united-states-history-primary-source-timeline/civil-war-and-reconstruction-1861-1877/overview/
              text: History of the US Civil War
              type: website
            - href: https://www.youtube.com/watch?v=c7nUDLKKEBY
              text: How Did WW I Start?
              type: video
            - href: https://www.loc.gov/classroom-materials/united-states-history-primary-source-timeline/progressive-era-to-new-era-1900-1929/united-states-participation-in-world-war-i/
              text: U.S. Participation in World War I
              type: website
            - href: https://www.youtube.com/watch?v=tGlRJKsRozA
              text: World War II – Explained
              type: video
            - href: https://www.loc.gov/classroom-materials/united-states-history-primary-source-timeline/great-depression-and-world-war-ii-1929-1945/world-war-ii/
              text: World War II
              type: website
            - href: https://www.youtube.com/watch?v=h1wFrXKanC0
              text: 'The Korean War: 5 Things to Know'
              type: video
            - href: https://spice.fsi.stanford.edu/docs/overview_of_the__korean_war_and_its_legacy
              text: Korea War Overview
              type: website
            - href: https://www.youtube.com/watch?v=XD08SZxKU2Y
              text: Vietnam War explained
              type: video
            - href: https://www.vassar.edu/the-wars-for-vietnam/vietnam-war-overview
              text: Vietnam War Overview
              type: website
            - href: https://www.youtube.com/watch?v=xl_lctDXHuQ
              text: What Happened in the Persian Gulf War?
              type: video
            - href: https://www.history.com/articles/persian-gulf-war
              text: Gulf War Overview
              type: website
- requirement: 2
  text: |-
      <strong>Understand the Cost of War and the Value of Peace.</strong> Do the following:
  children:
      - requirement: a
        text: |-
            Discuss with your counselor why military conflict should be a last resort.
      - requirement: b
        text: |-
            Do ONE of the following:
        children:
            - requirement: a
              text: |-
                  Read or listen to President Dwight D. Eisenhower’s “Atoms for
                  Peace” speech and explain the objectives and role of the
                  International Atomic Energy Agency (IAEA) in promoting peaceful
                  uses of nuclear energy.
              resources:
                  - href: https://www.youtube.com/watch?v=2DxeLeginUQ
                    text: Atoms For Peace Speech Eisenhower
                    type: video
                  - href: https://www.eisenhowerlibrary.gov/research/online-documents/atoms-peace
                    text: Atoms for Peace Overview
                    type: website
                  - href: http://www.iaea.org/
                    text: International Atomic Energy Agency
                    type: website
            - requirement: b
              text: |-
                  Explain the role of the United Nations in promoting peace and
                  resolving international disputes.
              resources:
                  - href: https://peacekeeping.un.org/en
                    text: United Nations Peacekeeping
                    type: website
      - requirement: c
        text: |-
            Reflect on the human and societal costs of war and share the
            lessons that can be learned from major conflicts.
        resources:
            - href: https://www.youtube.com/watch?v=bi_dbJBqNUA
              text: 'The Impact of War on Civilians: Understanding the Human Cost of Conflict'
              type: video
- requirement: 3
  text: |-
      <strong>United States Armed Forces.</strong> Do ONE of the following:
  children:
      - requirement: a
        text: |-
            Choose one of the branches of service of the United States and
            research its history, its mission, and its organization. Explain to
            your counselor what you learned.
        resources:
            - href: https://www.youtube.com/watch?v=jm0DCIS38T0
              text: The EPIC History of the U.S. Air Force
              type: video
            - href: https://www.clemson.edu/business/academics/air-rotc/about/history.html
              text: History of the US Air Force
              type: website
            - href: https://www.youtube.com/watch?v=z4DmoTrRVw0
              text: Center of Military History
              type: video
            - href: https://www.youtube.com/watch?v=0pOjfwL3gpA
              text: US Army Structure EXPLAINED!
              type: video
            - href: https://www.legendsofamerica.com/army-history-timeline/
              text: History of the US Army
              type: website
            - href: https://www.youtube.com/watch?v=CTib37o8TGU
              text: United States Coast Guard – 1790 to Today – A Short History
              type: video
            - href: https://thegracemuseum.org/learn/2020-6-10-history-of-the-us-coast-guard/
              text: History of the US Coast Guard
              type: website
            - href: https://www.youtube.com/watch?v=j9yef9Zxgww
              text: Short History of the Marines
              type: video
            - href: https://www.ebsco.com/research-starters/history/united-states-marine-corps
              text: Summarized History of the USMC
              type: website
            - href: https://www.youtube.com/watch?v=6-2Kac2xSZ0
              text: The History of the United States Navy
              type: video
            - href: https://www.youtube.com/watch?v=Gan3GQnPQf4
              text: Every US Navy Fleet Explained
              type: video
            - href: https://www.britannica.com/topic/United-States-Navy/Theories-of-force-projection-and-World-War-I
              text: History of the United States Navy
              type: website
            - href: https://www.youtube.com/watch?v=66V_wcePi6k
              text: 'Exploring the United States Space Force: History, Mission, and Capabilities'
              type: video
            - href: https://www.britannica.com/science/space-exploration
              text: Britannica Space Force Article
              type: website
      - requirement: b
        text: |-
            Learn about the Veterans History Project organized by the Library
            of Congress. Conduct and record an interview of a veteran using those
            guidelines. Share your recording with your counselor and the veteran.
            With the veteran’s permission, share it with the Library of
            Congress.
        resources:
            - href: https://www.loc.gov/programs/veterans-history-project/how-to-participate/customized-guidance/
              text: Youth Participation and Guidelines
              type: website
            - href: https://www.loc.gov/static/programs/veterans-history-project/documents/for-scouts-custom-guidance.pdf
              text: Customized Guidance for Scouts
              type: pdf
            - href: https://www.youtube.com/watch?v=Y-zMq13vKiY
              text: Library of Congress Project Aims to Save Veterans’ Stories
              type: video
- requirement: 4
  text: |-
      <strong>Understand Military Recognition.</strong> Do the following:
  children:
      - requirement: a
        text: |-
            Explain the history and significance of the Medal of Honor and the
            Purple Heart.
        resources:
            - href: https://www.youtube.com/watch?v=3ZwXgTnH854
              text: 'In Their Own Words: An Introduction to the Medal of Honor and Its Recipients'
              type: video
            - href: https://www.cem.va.gov/history/Medal-of-Honor-history.asp
              text: Medal of Honor History &amp; Recipients
              type: website
            - href: https://www.youtube.com/shorts/Tv8Om9utYXs
              text: The Purple Heart
              type: video
            - href: https://www.nationalww2museum.org/war/articles/history-of-the-purple-heart
              text: The History of the Purple Heart
              type: website
      - requirement: b
        text: |-
            Describe the qualifications for receiving each award.
        resources:
            - href: https://www.youtube.com/watch?v=ZxhI7JvyXlk
              text: 'The INTENSE Process of Awarding a Medal of Honor: Step by Step'
              type: video
            - href: https://www.cmohs.org/news-events/blog/how-is-the-medal-of-honor-awarded/
              text: How is the Medal of Honor Awarded?
              type: website
            - href: https://www.youtube.com/watch?v=OcCch7iMRAM
              text: What Is the Criteria for Receiving a Purple Heart?
              type: video
            - href: https://crawfordcountyveteransohio.com/blog/purple-heart-qualifications-guidance/
              text: Understanding Purple Heart Qualifications
              type: website
      - requirement: c
        text: |-
            Research a Medal of Honor recipient and share their story with
            your counselor. Explain why their actions were recognized.
        resources:
            - href: https://www.youtube.com/watch?v=M_t1_fzFSOI
              text: Famous American Medal of Honor Recipients
              type: video
            - href: https://www.cmohs.org/recipients
              text: Medal of Honor Recipients
              type: website
- requirement: 5
  text: |-
      <strong>Military Uniforms and Insignia.</strong> Do the following:
  children:
      - requirement: a
        text: |-
            Learn about the purpose and history of military uniforms and
            insignia.
        resources:
            - href: https://www.war.gov/Resources/Insignias/#officer-insignia
              text: https://www.war.gov/Resources/Insignias/#officer-insignia
              type: website
            - href: https://en.wikipedia.org/wiki/Uniforms_of_the_United_States_Armed_Forces
              text: https://en.wikipedia.org/wiki/Uniforms_of_the_United_States_Armed_Forces
              type: website
      - requirement: b
        text: |-
            Identify the different uniforms worn by members of the U.S. Army,
            Navy, Marine Corps, Air Force, Space Force, and Coast Guard.
      - requirement: c
        text: |-
            Learn to identify and describe the rank insignia for all enlisted
            and officer ranks from one branch of the U.S. Armed Forces.
        resources:
            - href: https://veteran.com/military-ranks-insignia-charts/
              text: U.S. Military Ranks &amp; Pay Grade by Branch
              type: website
      - requirement: d
        text: |-
            Explain how rank and insignia show respect, order, and
            responsibility within the military.
- requirement: 6
  text: |-
      <strong>Reflect on Symbols of Service.</strong> Do the following:
  children:
      - requirement: a
        text: |-
            Discuss with an active-duty member, reservist, or veteran what
            their uniform and the American Flag mean to them as a military member.
            Share what you learned with your counselor. Describe what proper
            respect for the flag means to them.
      - requirement: b
        text: |-
            Discuss with your counselor what your uniform and troop flag mean
            to you.
- requirement: 7
  text: |-
      <strong>Honor Veterans.</strong> Do the following:
  children:
      - requirement: a
        text: |-
            Participate in a Veterans Day, Memorial Day, or other event that
            honors veterans in your community, school, or place of worship.
        resources:
            - href: https://www.youtube.com/watch?v=mWD4Oy6fKlo
              text: 'Bet You Didn’t Know: Veterans Day | History'
              type: video
            - href: https://department.va.gov/veterans-day/history-of-veterans-day/
              text: History of Veterans Day
              type: website
      - requirement: b
        text: |-
            Discuss with your counselor what role you played and what you
            learned from the experience.
      - requirement: c
        text: |-
            Visit a veterans’ organization, military museum, memorial, or
            cemetery. Discuss with your counselor what you learned about service,
            sacrifice, and remembrance.
- requirement: 8
  text: |-
      <strong>Military Academies.</strong> Do the following:
  children:
      - requirement: a
        text: |-
            Learn about the purpose and history of TWO of the U.S. military
            academies: the U.S. Military Academy at West Point, the U.S. Naval
            Academy, the U.S. Air Force Academy, the U.S. Coast Guard
            Academy, and the U.S. Merchant Marine Academy.
        resources:
            - href: https://www.youtube.com/watch?v=-Puh39QSVRI
              text: All US Military Academies Explained
              type: video
      - requirement: b
        text: |-
            Explain the general requirements for admission to one of these
            academies.
        resources:
            - href: https://www.collegeessayguy.com/blog/us-military-service-academies-guide
              text: A Guide to the US Military Service Academies
              type: website
      - requirement: c
        text: |-
            Describe how attending a service academy prepares a person for
            military leadership and service to the nation.
      - requirement: c
        text: |-
            Discuss with your counselor how the values of Scouting align with
            those of the military academies.
        resources:
            - href: https://westpoint.edu
              text: https://westpoint.edu
              type: website
            - href: https://www.usna.edu/homepage.php
              text: https://www.usna.edu/homepage.php
              type: website
            - href: https://www.usafa.edu
              text: https://www.usafa.edu
              type: website
            - href: https://uscga.edu
              text: https://uscga.edu
              type: website
            - href: https://www.usmma.edu
              text: https://www.usmma.edu
              type: website
- requirement: 9
  text: |-
      <strong>Inspire Service and Leadership.</strong> Do the following:
  children:
      - requirement: a
        text: |-
            Discuss how learning about veterans and military service can
            inspire youth to serve their community and country.
        resources:
            - href: https://www.youtube.com/watch?v=ZffcUB1ZlxM
              text: Scoutmaster Talks About How Military Life Affects Scouting
              type: video
            - href: https://ucnet.universityofcalifornia.edu/wp-content/uploads/working-at-uc/your-career/veterans/_files/21_Strengths_Arising_From_Military_Experience.pdf
              text: 21 Strengths Arising From Military Experience
              type: pdf
      - requirement: b
        text: |-
            List two ways you can demonstrate courage, service, or leadership
            in your daily life.
        resources:
            - href: https://www.youtube.com/watch?v=-fku1Evr7Vo
              text: The BEST Place to Find Courage
              type: video
            - href: https://www.colorado.edu/orientation/2024/02/29/6-ways-students-can-demonstrate-leadership
              text: 6 Ways Students can Demonstrate Leadership
              type: website
      - requirement: b
        text: |-
            Research service projects in your area that honor veterans or
            support those currently serving. Share what you learned with your
            counselor.
        resources:
            - href: https://www.youtube.com/shorts/FFRlU2fl0nc
              text: 'Honoring Heroes: 10 Eagle Scout Projects Dedicated to Veterans'
              type: video
            - href: https://elks.org/SharedElksOrg/enf/files/TwentyProjectIdeasforServingVeterans.pdf
              text: 20 Project Ideas for Serving Veterans
              type: pdf
- requirement: 10
  text: |-
      <strong>Careers.</strong> Explore careers related to this military
      service. Research one career to learn about the training and education
      needed, costs, job prospects, salary, job duties, and career
      advancement. Your research methods may include — with your parent or
      guardian’s permission — an internet or library search, an interview with
      a professional in the field, or a visit to a location where people in
      this career work. Discuss with your counselor both your findings and
      what about this profession might make it an interesting career.
  resources:
      - href: https://youtu.be/LbNP0FUItjI
        text: U.S. Air Force – Own the Sky
        type: video
      - href: https://youtu.be/luc9saxt_YQ
        text: First Jump | Be All You Can Be | U.S. Army
        type: video
      - href: https://youtu.be/_CfGZ_TvTeI
        text: Coast Guard – What Makes a Life?
        type: video
      - href: https://youtu.be/L2ljqUpkC1c
        text: My Why | U.S. Marine Corps
        type: video
      - href: https://youtu.be/b_FL2yiCJSE
        text: Strong Enough – US Navy
        type: video
      - href: https://youtu.be/R9bzFKHrQoo
        text: U.S. Space Force – Origins
        type: video
- requirement: 11
  text: |-
      Complete the survey below to complete the test lab
      requirements
