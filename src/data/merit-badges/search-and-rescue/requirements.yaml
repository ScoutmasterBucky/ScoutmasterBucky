                    href: >-
                        https://www.countyofglenn.net/government/departments/sheriff/search-rescue/training-response-activities
                    text: Training Scenarios
                    type: website
                -
                    href: >-
                        https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Search%20and%20Rescue/Lost%20Scout%20Scenario.pdf
                    text: Lost Scout Scenario
                    type: pdf
        -
            requirement: b
            text: |-
                Develop an Incident Action Plan (IAP) for a hasty search using
                the scenario information.
            resources:
                -
                    href: >-
                        https://www.sarbc.org/sarbc/pdfs/SearchMgmtActionPlan.pdf
                    text: Developing an IAP
                    type: pdf
        -
