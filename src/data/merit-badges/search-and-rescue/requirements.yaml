    requirement: 8
    text: '<b>Careers.</b> Do ONE of the following:'
    children:
        -
            requirement: a
            text: |-
                Explore careers related to Search and Rescue merit badge or
                emergency management. Research one career to learn about the
                training and education needed, costs, job prospects, salary, job
                duties, and career advancement. With permission of your parent
                or guardian, your research methods may include an internet or
                library search, an interview with a professional in the field,
                or a visit to a location where people in this career work.
                Discuss with your counselor both your findings and what about
                this profession might make it an interesting career.
            resources:
                -
                    href: https://youtu.be/qKA27Zpw8o4
                    text: What it Means to be a Search and Rescue Responder
                    type: video
                -
                    href: https://youtu.be/lowz7P4QIVs
