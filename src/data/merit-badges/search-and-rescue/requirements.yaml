    text: |-
        <b>Plan and Complete a Search.</b> Do the following with a team of
        Scouts, friends, or family to execute a practice SAR exercise:
    children:
        -
            requirement: a
            text: |-
                Choose a hypothetical SAR scenario, either one presented in the
                <i>Search and Rescue</i> merit badge pamphlet or one approved by
                your counselor.
            resources:
