-
    requirement: 1
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: |-
                Explain to your counselor the most likely hazards you may
                encounter while participating in geocaching activities, and what
                you should do to anticipate, help prevent, mitigate, and respond
                to these hazards.
            resources:
                -
                    href: >-
                        https://geocachingtoday.com/geocaching-safety-tips-to-stay-safe-while-treasure-hunting/
                    text: |-
                        GeoCaching Safety: 12 Critical Tips to Stay Safe While
                        Treasure Hunting
                    type: website
                -
                    href: https://youtu.be/YGQG0C0HBGw
                    text: Surviving the Wild—Essential Hiking Safety Tips
                    type: video
        -
            requirement: b
            text: |-
                Discuss first aid and prevention for the types of injuries or
                illnesses that could occur while participating in geocaching
                activities, including cuts, scrapes, snakebite, insect stings,
                tick bites, exposure to poisonous plants, heat and cold
                reactions (sunburn, heatstroke, heat exhaustion, hypothermia),
                and dehydration.
            resources:
                -
                    href: https://youtu.be/nxExCQiWa_U
                    text: |-
                        Backpacking First Aid (What To Carry + Foot Care,
                        Snakes, Poison Plants, Hypothermia, etc)
                    type: video
        -
            requirement: c
            text: |-
                Discuss how to properly plan an activity that uses GPS,
                including using the buddy system, sharing your plan with others,
                and considering the weather, route, and proper attire.
            resources:
                -
                    href: https://youtu.be/0_wubfWGADo
                    text: Geocaching Tips and Tricks
                    type: video
-
    requirement: 2
    text: 'Discuss the following with your counselor:'
    children:
        -
            requirement: a
            text: Why you should never bury a cache
            resources:
                -
                    href: >-
                        https://www.geocaching.com/help/index.php?pg=kb.chapter&id=128&pgid=905
                    text: Don't Bury Your Cache or Attach It to a Tree
                    type: website
        -
            requirement: b
            text: |-
                How to use proper geocaching etiquette when hiding or seeking a
                cache, and how to properly hide, post, maintain, and dismantle a
                geocache
            resources:
                -
                    href: https://youtu.be/GXzIu7p82jg
                    text: Geocaching Etiquette
                    type: video
        -
            requirement: c
            text: |-
                The Leave No Trace Seven Principles and the Outdoor Code as they
                apply to geocaching
            resources:
                -
                    href: https://youtu.be/-OBCyHbYmmA
                    text: How To Geocache the Leave No Trace Way
                    type: video
-
    requirement: 3
    text: |-
        Explain the following terms used in geocaching: waypoint, log, cache,
        accuracy, difficulty and terrain ratings, attributes, and trackable.
        Choose five additional terms to explain to your counselor.
    resources:
        -
            href: https://www.hoagiesgifted.org/geocaching_acronyms.htm
            text: Geocaching Acronyms and Terms
            type: website
        -
            href: https://www.geocaching.com/about/glossary.aspx
            text: Geocaching Terms
            type: website
-
    requirement: 4
    text: |-
        Explain how the Global Positioning System (GPS) works. Then, using
        Scouting's EDGE, demonstrate to your counselor the use of a GPS unit.
        Include marking and editing a waypoint, changing field functions, and
        changing the coordinate system in the unit.
    resources:
        -
            href: https://youtu.be/jl2xQk-z4To
            text: How Does GPS Find Your Location
            type: video
        -
            href: https://youtu.be/RNhtn71k-wA
            text: How To Use a Garmin eTrex 10 GPS Receiver
            type: video
-
    requirement: 5
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: |-
                Show you know how to use a map and compass and explain why this
                is important for geocaching.
            resources:
                -
                    href: https://youtu.be/7MQUIYsmQhc
                    text: Compass 101
                    type: video
                -
                    href: https://youtu.be/qGqLuqnvROg
                    text: THIS Is How To Use a Compass and Map
                    type: video
        -
            requirement: b
            text: |-
                Explain the similarities and differences between GPS navigation
                and standard map-reading skills and describe the benefits of
                each.
            resources:
                -
                    href: https://youtu.be/mK3pOU_x4jQ
                    text: Using a GPS with a Map and Compass
                    type: video
-
    requirement: 6
    text: |-
        Describe to your counselor the four steps to finding your first cache.
        Then mark and edit a waypoint.
    resources:
        -
            href: https://youtu.be/7LvnVdaw5sM
            text: 10 Things To Do When Playing Geocaching
            type: video
-
    requirement: 7
    text: |-
        With your parent or guardian's permission, go to <a
        href="https://www.geocaching.com/">www.geocaching.com</a>. Type in your
        city and state to locate public geocaches in your area. Share with your
        counselor the posted information about three of those geocaches. Then,
        pick one of the three and find the cache.
        <div class="gap"></div>
        <i><b>NOTE:</b> To fulfill this requirement, you will need to set up a
        free user account with <a
        href="https://www.geocaching.com/">www.geocaching.com</a>. Before doing
        so, ask your parent for permission and help.</i>
    resources:
        -
            href: https://www.geocaching.com/play
            text: Geocaching.com
            type: website
        -
            href: https://youtu.be/-ddhwGsGDjs
            text: How To Find Your First Geocache!
            type: video
-
    requirement: 8
    text: 'Do ONE of the following:'
    children:
        -
            requirement: a
            text: |-
                If a Cache to Eagle® series exists in your council, visit at
                least three of the locations in the series. Describe the
                projects that each cache you visit highlights, and explain how
                the Cache to Eagle® program helps share our Scouting service
                with the public.
            resources:
                -
                    href: >-
                        https://blog.scoutingmagazine.org/2021/02/12/she-created-a-geocaching-trail-that-links-together-14-eagle-scout-service-projects
                    text: |-
                        She Created a Geocaching Trail That Links Together 14
                        Eagle Scout Service Projects
                    type: website
        -
            requirement: b
            text: |-
                Create a Scouting-related Travel Bug® that promotes one of the
                values of Scouting. Release your Travel Bug into a public
                geocache and, with your parent or guardian's permission, monitor
                its progress at <a
                href="https://www.geocaching.com/">www.geocaching.com</a> for 30
                days. Keep a log, and share this with your counselor at the end
                of the 30-day period.
            resources:
                -
                    href: https://youtu.be/Fwl8-pvwHJQ
                    text: What Is a Travel Bug in Geocaching
                    type: video
        -
            requirement: c
            text: |-
                Set up and hide a public geocache, following the guidelines in
                the <em>Geocaching</em> merit badge pamphlet. Before doing so,
                share with your counselor a three-month maintenance plan for the
                geocache where you are personally responsible for those three
                months. After setting up the geocache, with your parent or
                guardian's permission, follow the logs online for 30 days and
                share them with your counselor. You must archive the geocache
                when you are no longer maintaining it.
            resources:
                -
                    href: https://youtu.be/0018rkb_knA
                    text: What To Do (and NOT Do) When Hiding a Geocache
                    type: video
        -
            requirement: d
            text: |-
                Explain what Cache In Trash Out (CITO) means, and describe how
                you have practiced CITO at public geocaches or at a CITO event.
                Then, either create CITO containers to leave at public caches,
                or host a CITO event for your unit or for the public.
            resources:
                -
                    href: https://youtu.be/5eIwxTAaxKw
                    text: Cache In Cache Out Geocaching Events
                    type: video
                -
                    href: https://youtu.be/Brhs9gpCszE
                    text: Geocaching Capital of Canada Cleanup
                    type: video
                -
                    href: >-
                        https://www.geocaching.com/help/index.php?pg=kb.chapter&id=23&pgid=799
                    text: Event Caches
                    type: website
-
    requirement: 9
    text: |-
        Plan a geohunt for a youth group such as your troop or a neighboring
        pack, at school, or your place of worship. Choose a theme, set up a
        course with at least four waypoints, teach the players how to use a GPS
        unit, and play the game. Tell your counselor about your experience, and
        share the materials you used and developed for this event.
    resources:
        -
            href: https://youtu.be/y69n3o3SAEA
            text: Geocaching—Setting up the Experience
            type: video
