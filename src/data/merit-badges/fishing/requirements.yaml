# Requirements 6a and 8 both refer to the 7 principles of Leave No Trace with very similar questions. These should be combined.
# Requirement 7 - changed "gamefishing" to "game fishing"
# Requirement 10 is missing a dot after "10."
- text: |-
      <b>NOTE:</b> Scouts should obey all local fishing regulations and property
      laws.
- requirement: 1
  text: |-
      Do the following:
  children:
      - requirement: a
        text: |-
            Explain to your counselor the most likely hazards you may encounter
            while participating in fishing activities, and what you should do to
            anticipate, help prevent, mitigate, and respond to these hazards.
        resources:
            - href: https://youtu.be/DlReuRpGOtk
              text: Fishing - Be Aware Of These Fishing Hazards
              type: video
            - href: https://anglersadvantageguideservice.com/why-is-fishing-dangerous-dont-overlook-these-risks/
              text: Why is Fishing Dangerous?
              type: website
      - requirement: b
        text: |-
            Discuss the prevention of and treatment for the following health
            concerns that could occur while fishing: cuts and scratches, puncture
            wounds, insect bites, hypothermia, dehydration, heat exhaustion,
            heatstroke, and sunburn.
        resources:
            - href: https://youtu.be/0jp5FgLmKtk
              text: How to Treat Cuts and Bruises
              type: video
            - href: https://www.youtube.com/watch?v=AmT3T_9Guq0
              text: Removing a Fishhook
              type: video
            - href: https://youtu.be/YkUW3pquCF4
              text: How to Treat an Insect Bite or Sting | First Aid Training
              type: video
            - href: https://www.youtube.com/watch?v=my6JB41apTw
              text: Hypothermia
              type: video
            - href: https://www.youtube.com/watch?v=KahsIEbFROI
              text: What is Dehydration?
              type: video
            - href: https://www.youtube.com/watch?v=8gn3DEYOPuE
              text: Heat Exhaustion vs Heat Stroke
              type: video
            - href: https://www.youtube.com/watch?v=-KzTvagnpfU
              text: Sunburn
              type: video
      - requirement: c
        text: |-
            Explain how to remove a barbed hook that is lodged in someone's arm.
        resources:
            - href: https://youtu.be/52GLMQp52qg
              text: How to Remove a Hook
              type: video
      - requirement: d
        text: |-
            Name and explain five safety practices you should always follow while
            fishing.
        resources:
            - href: https://youtu.be/mRQ0HHA3KAo
              text: Fishing Safety Tips
              type: video
- requirement: 2
  text: |-
      Discuss the differences between two types of fishing outfits. Point out and
      identify the parts of several types of rods and reels. Explain how and when
      each would be used. Review with your counselor how to care for this
      equipment.
  resources:
      - href: https://youtu.be/C7CWIywYmxk
        text: Types of Fishing Reels and How to Use Them for Beginners - Spinning vs.  Spincast vs. Baitcasting
        type: video
      - href: https://youtu.be/E49ZEmiLEPo
        text: Cane Pole Fishing
        type: video
- requirement: 3
  text: |-
      Demonstrate the proper use of two different types of fishing equipment.
  resources:
      - href: https://youtu.be/cHxF6aZSrIw
        text: How to Cast and Use a Spincast Push Button Rod and Reel - Fishing Reels for Beginners
        type: video
      - href: https://youtu.be/mZSIvpKVA4c
        text: Fishing 101 Made Easy with Simple Spinning Reel Casting
        type: video
      - href: https://youtu.be/n6XApOOpfA8
        text: How to Use a Baitcaster For Beginners!
        type: video
- requirement: 4
  text: |-
      Demonstrate how to tie the following knots: improved clinch knot, Palomar
      knot, uni knot, uni to uni knot, and arbor knot. Explain how and when each
      knot is used.
  resources:
      - href: https://www.animatedknots.com/improved-clinch-knot
        text: Improved Clinch Knot
        type: website
      - href: https://www.animatedknots.com/palomar-knot
        text: Palomar Knot
        type: website
      - href: https://www.animatedknots.com/uni-knot
        text: Uni Knot
        type: website
      - href: https://www.wired2fish.com/fishing-knots/how-to-tie-a-double-uni-knot?
        text: Uni-to-Uni / Double Uni Knot
        type: website
      - href: https://www.animatedknots.com/arbor-knot
        text: Arbor Knot
        type: website
      - href: https://www.animatedknots.com/
        text: Animated Knots
        type: website
- requirement: 5
  text: |-
      Name and identify five basic artificial lures and five natural baits and
      explain how to fish with them. Explain why baitfish are not to be released.
  resources:
      - href: https://fishingbooker.com/blog/most-common-types-of-fishing-lures-all-you-need-to-know/
        text: Most Common Types of Fishing Lures
        type: website
      - href: https://youtu.be/SamrdgVjpQk
        text: Fishing Lures for Beginners
        type: video
      - href: https://sportfishingbuddy.com/fishing-lure-types-chart/
        text: What Are the Different Types Of Fishing Lures?
        type: website
      - href: https://farmerandthefishnyc.com/why-are-bait-fish-not-to-be-released/
        text: Why Shouldn't Bait Fish Be Released Back Into the Water?
        type: website
      - href: https://www.youtube.com/watch?v=nmOdusje6tY
        text: Motivations and Risks of Illegal Baitfish Release
        type: video
- requirement: 6
  text: |-
      Do the following:
  children:
      - requirement: a
        text: |-
            Explain the importance of practicing Leave No Trace Seven Principles
            and the Outdoor Code. Discuss the positive effects of Leave No Trace
            Seven Principle and the Outdoor Code on fishing resources.
        resources:
            - href: https://lnt.org/why/7-principles/
              text: 7 Principles of LNT
              type: website
            - href: https://vimeo.com/1115216743/63b20c0b33?share=copy
              text: LNT Basics
              type: video
      - requirement: b
        text: |-
            Discuss the meaning and importance of catch and release. Describe how
            to properly release a fish safely to the water.
        resources:
            - href: https://youtu.be/TzNjYoRpvb0
              text: How to Safely Handle Fish for Catch &amp; Release Fishing
              type: video
            - href: https://youtu.be/SMGO50R_lrA
              text: Ethical Catch and Release Fishing
              type: video
- requirement: 7
  text: |-
      Obtain and review the regulations affecting game fishing where you live.
      Explain why they were adopted and what is accomplished by following them.
  resources:
      - href: https://fishpiers.com/fishing-license-requirements-by-state-all-50-states/
        text: Fishing Licenses, Rules, Regulations
        type: website
- requirement: 8
  text: |-
      Explain what good outdoor sportsmanlike behavior is and how it relates to
      anglers. Tell how the Leave No Trace Seven Principles and the Outdoor Code
      relate to a fishing sports enthusiast, including the aspects of littering,
      trespassing, courteous behavior, and obeying fishing regulations.
  resources:
      - href: https://youtu.be/54ImytCqbzI
        text: Understanding Basic Fishing Rules and Etiquette
        type: video
- requirement: 9
  text: |-
      Catch one fish and identify it.
  resources:
      - href: https://freeappsforme.com/fish-identification-apps/
        text: Fish Identification Apps
        type: website
      - href: https://www.fishbase.us/
        text: FishBase Identification
        type: website
      - href: https://youtu.be/mZ4M-AP6-iQ
        text: How to Identify Common Freshwater Fish
        type: video
- requirement: 10
  text: |-
      If regulations and health concerns permit, clean and cook a fish you have
      caught. If you are unable to catch a fish for eating, acquire a fish, clean
      the fish you acquired, and cook the fish you acquired.
      <div class="gap"></div>
      <b>Note:</b> It is not required that you eat the fish.
  resources:
      - href: https://youtu.be/uBDYqh8p2fU
        text: How to Clean and Care for Your Catch
        type: video
      - href: https://www.youtube.com/shorts/hca5xiZbulY?feature=share
        text: How to Fillet a Fish
        type: video
      - href: https://www.youtube.com/shorts/u19fJ10kAVo?feature=share
        text: How to Clean a Fish Before Cooking
        type: video
      - href: https://youtu.be/BSQhEjSalwk
        text: How to Cook a Fish
        type: video
      - href: https://youtu.be/Tgv7tCx2NsA?si=NwsJpJx4rYU3qDOX
        text: 5 Easy Ways to Cook Fish
        type: video
