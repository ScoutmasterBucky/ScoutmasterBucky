-
    requirement: 1
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: |-
                Discuss with your counselor the safety equipment, tools, and
                clothing used while checking or repairing farm equipment. Use
                this equipment, tools, and/or clothing (when needed or called
                for) in meeting the requirements for this merit badge.
            resources:
                -
                    href: https://youtu.be/cT0xTWFjDsY
                    text: |-
                        Farm Equipment Dangers —Staying Safe Around Farm
                        Machinery
                    type: video
                -
                    href: https://www.growerexperts.com/ppe-in-agriculture/
                    text: |-
                        The Comprehensive Guide to PPE for Farmers: Safety From
                        Head to Toe
                    type: website
                -
                    href: https://youtu.be/9rjaXpUKPqI
                    text: 'Safety on the Farm: General Safety'
                    type: video
                -
                    href: https://youtu.be/lRYxf9giLQI
                    text: Working Safely With Hand Tools Around the Farm
                    type: video
                -
                    href: https://youtu.be/Yjl1rqqjosU
                    text: Personal Protective Equipment in the Farm (PPE)
                    type: video
        -
            requirement: b
            text: |-
                Draw a plan showing a well-equipped farm shop. Point out the
                shop's mandatory safety devices and features.
            resources:
                -
                    href: >-
                        https://www.youtube.com/playlist?list=PLfmcXlkwVLVWPdGbiJMiCM3jdJF304pTq
                    text: Playlist of Top Shops
                    type: playlist
                -
                    href: https://youtu.be/turaJrzpgcg
                    text: |-
                        Farmer's Dream Shop Features Rolling Carts, In-Floor Tie
                        Downs | Top Shops® | Successful Farming
                    type: video
                -
                    href: https://youtu.be/Bss30MpMqLA
                    text: |-
                        The Largest Farm Shop We've Ever Seen | Top Shops® |
                        Successful Farming
                    type: video
        -
            requirement: c
            text: |-
                Find all the universal warning and safety symbols on a piece of
                equipment and explain what they mean.
            resources:
                -
                    href: https://youtu.be/x50qcaHzNy8
                    text: Caterpillar Warning Symbols/Icons Detailed Guide
                    type: video
                -
                    href: >-
                        https://www.scribd.com/document/889441066/Graphical-Symbols-for-Operator-Controls-and-Displays-on-Agricultural-Equipment
                    text: Agricultural Equipment Symbol Standards
                    type: website
        -
            requirement: d
            text: |-
                Describe what a safety data sheet (SDS) is and tell why it is
                used. Obtain the SDS for any engine coolant, oil, grease, fuel,
                hydraulic or transmission fluid, or other flammable or hazardous
                materials you use in meeting the requirements for this merit
                badge.
            resources:
                -
                    href: https://youtu.be/_yWF-w3CwmU
                    text: Safety Data Sheets
                    type: video
                -
                    href: https://www.hseblog.com/where-find-sds/
                    text: 'Where to Find Safety Data Sheets (SDS): A Complete Guide'
                    type: website
-
