                    type: website
        -
            requirement: b
            text: Checking the air filter.
            resources:
                -
                    href: https://youtu.be/571Oz9LrBwk
                    text: Maintaining Your Tractor—Changing the Air Filter
                    type: video
        -
            requirement: c
            text: Cleaning a work piece with a wire-brush wheel.
            resources:
                -
                    href: https://youtu.be/wPR2Lbmn7wM
                    text: Cleaning Up Rusted Metal Finds
                    type: video
