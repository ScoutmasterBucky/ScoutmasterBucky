    requirement: 3
    text: 'Do TWO of the following:'
    children:
        -
            requirement: a
            text: Replace the handle of any tool found on the farm.
            resources:
                -
                    href: https://youtu.be/CPmkVm9CYkw
                    text: How To Replace a Garden Tool Handle
                    type: video
                -
                    href: https://youtu.be/g0aC6xOppio
                    text: |-
                        Axe &amp; Hammer Handle Replacement—How To Do It Old
                        School
                    type: video
        -
            requirement: b
            text: |-
                Organize a tool rack or a storage system for nails, bolts, nuts,
                and washers.
            resources:
                -
                    href: https://youtu.be/twlFjHccSfE
                    text: Adam Savage's Hardware Logjam Sorting Challenge!
                    type: video
                -
                    href: https://youtu.be/ja3olvly0Ic
                    text: Easy Bolt Sorter
                    type: video
                -
                    href: https://youtu.be/7OSkChtwlJA
                    text: How To Organise Screws, Nails, Bolts &amp; Nuts
                    type: video
                -
                    href: https://youtu.be/pAP2m90RLhA
                    text: How To Organize Your Loose Screws and Nails
                    type: video
        -
            requirement: c
            text: |-
                Using a hand file, properly dress the mushroomed head of a
                chisel or punch.
            resources:
                -
                    href: https://youtu.be/1xiIuBbH1SQ
                    text: 4 Tools You Can Use To Dress a Chisel
                    type: video
                -
                    href: https://youtu.be/Q5wyhqKtnqo
                    text: Dressing Hammers and Punches—Basic Blacksmithing
                    type: video
        -
            requirement: d
            text: Using a hand file, correctly dress a screwdriver tip.
            resources:
                -
                    href: >-
                        https://www.tiktok.com/@paul.a.j.sellers/video/6854554012323171590
                    text: Sharpening and Reshaping Your Screwdriver With a File
                    type: video
-
    requirement: 4
    text: 'Do ONE of the following:'
    children:
        -
            requirement: a
            text: |-
                On an engine-powered machine: Grease all fittings, change the
                oil and oil filter, clean the air filter, clean the radiator
                fins, and replace the fuel filters.
            resources:
                -
                    href: https://youtu.be/2HhdyfFzjWI
                    text: |-
                        Do This Every Two Weeks and Your Tractor Will Never
                        Break Down
                    type: video
        -
            requirement: b
            text: |-
                For any engine-powered machine, create a preoperational
                checklist; include checking the engine coolant, engine oil,
                hydraulic and/or transmission fluid, and battery voltage (using
                a voltmeter). Using your checklist, conduct a preoperational
                check of that machinery or equipment.
            resources:
                -
                    href: >-
                        https://www.worksafebc.com/en/resources/health-safety/checklist/equipment-and-machine-safety-checklist
                    text: Download Equipment and Machine Safety Checklist
                    type: pdf
        -
            requirement: c
            text: Prepare any farm machine for winter storage.
            resources:
                -
                    href: https://youtu.be/rjwAwPDBrqk
                    text: |-
                        Winterizing Your Tractor and Equipment: 10 Essential
                        Steps
                    type: video
                -
                    href: >-
                        https://www.tiktok.com/@michiganmarinefarmer/video/7596082158477921566
                    text: Preparing the Combine for Winter Storage
                    type: video
-
    requirement: 5
    text: |-
        Visit an implement dealer. Interview the dealer technician or service
        manager for hints on good preventive maintenance. Ask why it is
        important, the costs, and what causes wear or damage. Report what you
        learn.
-
