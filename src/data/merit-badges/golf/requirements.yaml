# 2B2 had a copy and paste error. The "history of disc golf" is already at 2B3a. Kept previous requirement.
- requirement: 1
  text: |-
      Discuss safety on the golf course. Show that you know first aid for
      injuries or illnesses that could occur while golfing, including lightning,
      heat reactions, sunburn, dehydration, blisters, animal or bug bites, poison
      ivy exposure, sprains, and strains.
  resources:
      - href: https://youtu.be/26c7909-iKg
        text: First Aid on the Golf Course
        type: video
- requirement: 2
  text: |-
      Complete ONE of the following options:
  children:
      - text: |-
            <strong>Option A—Traditional Golf.</strong> Do ALL of the following:
        children:
            - requirement: 1
              text: |-
                  Study the USGA <i>Rules of Golf</i> now in use.
              children:
                  - requirement: a
                    text: |-
                        Tell about the three categories of golf etiquette.
                    resources:
                        - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Golf/three_categories_of_golf_etiquette.pdf
                          text: Three Categories of Golf Etiquette
                          type: pdf
                  - requirement: b
                    text: |-
                        Demonstrate that you understand the definitions of golf terms.
                    resources:
                        - href: https://youtu.be/3qWh2Wruokg
                          text: Basic Golf Terminology
                          type: video
                  - requirement: c
                    text: |-
                        Show that you understand the <i>Rules of Amateur Status.</i>
                    resources:
                        - href: https://youtu.be/TeMdMFFOaTo
                          text: Rules of Amateur Status
                          type: video
              resources:
                  - href: https://www.usga.org/rules/rules-and-clarifications/rules-and-clarifications.html#!ruletype=fr&section=rule&rulenum=1
                    text: USGA Rules of Golf
                    type: website
                  - href: https://rules.usga.org/courses/rules-101/
                    text: USGA Rules of Golf (Free Course)
                    type: website
                  - href: https://youtu.be/jbCekejTJXA
                    text: The Golf Clubs in Your Bag
                    type: video
            - requirement: 2
              text: |-
                  Tell about your understanding of the World Handicap System.
              resources:
                  - href: https://youtu.be/IGZ9IGOAWLw
                    text: World Handicap System
                    type: video
            - requirement: 3
              text: |-
                  Do the following:
              children:
                  - requirement: a
                    text: |-
                        Tell about the early history of golf.
                    resources:
                        - href: https://youtu.be/B8hKb4r0yh4
                          text: History of Golf
                          type: video
                  - requirement: b
                    text: |-
                        Describe golf's early years in the United States.
                    resources:
                        - href: https://youtu.be/dlGT57kHEQs
                          text: The Incomplete History of Golf in America
                          type: video
                  - requirement: c
                    text: |-
                        Tell about the accomplishments of a top golfer of your choice.
                    resources:
                        - href: https://www.lpga.com/athletes/directory
                          text: LPGA Player Profiles
                          type: website
                        - href: https://www.pgatour.com/players
                          text: PGA Player Profiles
                          type: website
            - requirement: 4
              text: |-
                  Do the following:
              children:
                  - requirement: a
                    text: |-
                        Tell how golf can contribute to a healthy lifestyle, mentally and
                        physically.
                    resources:
                        - href: https://youtu.be/5AIr-qbUpQo
                          text: Health Benefits of Golf
                          type: video
                  - requirement: b
                    text: |-
                        Tell how a golf exercise plan can help you play better. Show two
                        exercises that would help improve your game.
                    resources:
                        - href: https://youtu.be/02KhVJJEFvM
                          text: Exercises to Improve Your Game
                          type: video
            - requirement: 5
              text: |-
                  Show the following:
              children:
                  - requirement: a
                    text: |-
                        The proper grip, stance, posture, and key fundamentals of a good
                        swing
                    resources:
                        - href: https://youtu.be/Txjm1TjageQ
                          text: 'How to Swing a Golf Club: 5 Steps for Beginners'
                          type: video
                  - requirement: b
                    text: |-
                        Driver played from a tee
                    resources:
                        - href: https://youtu.be/cia6EeHF7ZQ
                          text: How to Hit a Driver from the Tee
                          type: video
                        - href: https://youtu.be/JVsRCPjYTKQ
                          text: How to Hit an Iron from the Tee
                          type: video
                  - requirement: c
                    text: |-
                        The fairway wood shot
                    resources:
                        - href: https://youtu.be/Fl-20OtZVoY
                          text: How to Hit a Fairway Wood
                          type: video
                  - requirement: d
                    text: |-
                        The long iron shot
                    resources:
                        - href: https://youtu.be/hoVIDS6UmFk
                          text: How to Hit a Long Iron Shot
                          type: video
                  - requirement: e
                    text: |-
                        The short iron shot
                    resources:
                        - href: https://youtu.be/AAOoy8PPlsY
                          text: How to Hit a Short Iron Shot
                          type: video
                  - requirement: f
                    text: |-
                        The approach, chip-and-run, and pitch shots
                    resources:
                        - href: https://youtu.be/dwubg2qgV0A
                          text: How to Hit a Chip Shot
                          type: video
                  - requirement: g
                    text: |-
                        A recovery shot from a bunker or heavy rough
                    resources:
                        - href: https://youtu.be/ipY-LZUAYrY
                          text: How to Hit a Bunker Shot
                          type: video
                        - href: https://youtu.be/4DT-DAOfAHk
                          text: How to Hit from the Rough
                          type: video
                  - requirement: h
                    text: |-
                        A sound putting stroke
                    resources:
                        - href: https://youtu.be/AuyVMXl5iYQ
                          text: How to Make Long Putts
                          type: video
                        - href: https://youtu.be/vexw6VaGZPM
                          text: How to Make Short Putts
                          type: video
            - requirement: 6
              text: |-
                  Play a minimum of two nine-hole rounds or one 18-hole round of golf
                  with another golfer about your age and with your counselor, or an adult
                  approved by your counselor. Do the following:
              children:
                  - requirement: a
                    text: |-
                        Follow the <i>Rules of Golf.</i>
                  - requirement: b
                    text: |-
                        Practice good golf etiquette.
                  - requirement: c
                    text: |-
                        Show respect to fellow golfers, committee, sponsor, and gallery.
              resources:
                  - href: https://youtu.be/RQv8w3kmwjo
                    text: How to Play Your First Round of Golf
                    type: video
            - requirement: 7
              text: |-
                  Find out about three careers related to traditional golf. Pick one and
                  identify the education, training, and experience required for this
                  profession. Discuss this with your counselor, and explain why this
                  interests you.
              resources:
                  - href: https://youtu.be/aeSCbYugQAk
                    text: How to Become a Golf Professional
                    type: video
                  - href: https://youtu.be/FV0vJxab0QI
                    text: How to Become a Golf Instructor
                    type: video
      - text: |-
            <strong>Option B—Disc Golf.</strong> Do ALL of the following:
        children:
            - requirement: 1
              text: |-
                  Study the <i>PDGA Official Rules of Disc Golf</i> now in use.
              children:
                  - requirement: a
                    text: |-
                        Tell about the six areas of Courtesy (812).
                    resources:
                        - href: https://youtu.be/8_80I2NenwQ
                          text: Disc Course Etiquette
                          type: video
                  - requirement: b
                    text: |-
                        Describe the seven areas of Scoring (808).
                    resources:
                        - href: https://www.pdga.com/rules/official-rules-disc-golf/808
                          text: Disc Golf Scoring Rules
                          type: website
              resources:
                  - href: https://www.pdga.com/rules/official-rules-disc-golf
                    text: PDGA Rules of Disc Golf
                    type: website
                  - href: https://youtu.be/iYxbSRG7xjc
                    text: 'PDGA Rules 1: Overview'
                    type: video
                  - href: https://www.youtube.com/playlist?list=PLo_ubqHIquFvqTqm8C8UkLT7dMzc2sd_d
                    text: PDGA Rules School
                    type: playlist
            - requirement: 2
              text: |-
                  Tell about your understanding of the <i>PDGA Disc Golfer's Code.</i>
              resources:
                  - href: https://www.pdga.com/files/disc-golfers-code-en-us_1.pdf
                    text: PDGA Disc Golfer's Code
                    type: website
            - requirement: 3
              text: |-
                  Do the following:
              children:
                  - requirement: a
                    text: |-
                        Tell about the history of disc golf and why it is an inclusive game.
                  - requirement: b
                    text: |-
                        Discuss with your counselor the contributions Ed Headrick made to
                        the sport of disc golf.
                  - requirement: c
                    text: |-
                        Describe the evolution of disc design.
                  - requirement: d
                    text: |-
                        Tell about the accomplishments of a top disc golfer of your choice.
                    resources:
                        - href: https://www.pdga.com/world-rankings
                          text: Top Disc Golfers in the World
                          type: website
              resources:
                  - href: https://youtu.be/U0sNVO5anuk
                    text: The History of Disc Golf
                    type: video
            - requirement: 4
              text: |-
                  Do the following:
              children:
                  - requirement: a
                    text: |-
                        Tell how disc golf can contribute to a healthy lifestyle, mentally
                        and physically.
                    resources:
                        - href: https://youtu.be/SkZaOSeLMZw
                          text: Health Benefits of Disc Golf
                          type: video
                  - requirement: b
                    text: |-
                        Tell how a disc golf exercise plan can help you play better. Show
                        two exercises that would help improve your game.
                    resources:
                        - href: https://youtu.be/Pe3rtET4RUs
                          text: Disc Golf Exercise Plan
                          type: video
            - requirement: 5
              text: |-
                  Show the following:
              children:
                  - requirement: a
                    text: |-
                        A good throwing grip
                    resources:
                        - href: https://youtu.be/hmlPfsFq82s
                          text: A Throwing Disc
                          type: video
                  - requirement: b
                    text: |-
                        A good runup (X-step) when throwing a disc
                    resources:
                        - href: https://youtu.be/rvwtWNsgGj0
                          text: The X-Step Runup
                          type: video
                  - requirement: c
                    text: |-
                        Backhand shot
                    resources:
                        - href: https://youtu.be/N00BfNwc7ng
                          text: The Backhand Shot
                          type: video
                  - requirement: d
                    text: |-
                        Forehand shot
                    resources:
                        - href: https://youtu.be/mjlBl3vHPLA
                          text: Forehand Shot
                          type: video
                  - requirement: e
                    text: |-
                        Overhand shot
                    resources:
                        - href: https://youtu.be/Wf0EX0TlE3U
                          text: Overhand Shot
                          type: video
                  - requirement: f
                    text: |-
                        Rolling shot
                    resources:
                        - href: https://youtu.be/SGzd4CddZuY
                          text: The Rolling Shot
                          type: video
                  - requirement: g
                    text: |-
                        A good (in-line) putting stance
                    resources:
                        - href: https://youtu.be/wTx5CzU-PMA
                          text: The Putting Stance
                          type: video
                  - requirement: h
                    text: |-
                        A good straddle putting stance
                    resources:
                        - href: https://youtu.be/Z0-g3KGpkPU
                          text: The Straddle Putt
                          type: video
                  - requirement: i
                    text: |-
                        A good putting grip
                    resources:
                        - href: https://youtu.be/hdMtc3Go2vU
                          text: Disc Golf Putting Grip
                          type: video
                  - requirement: j
                    text: |-
                        A good putting motion &amp; follow through
                    resources:
                        - href: https://youtu.be/IKgE6q0YKC8
                          text: The Putt
                          type: video
                  - requirement: k
                    text: |-
                        The proper use of a mini-marking disc
                    resources:
                        - href: https://youtu.be/drip90Ta9XQ
                          text: Using a Mini Marking Disc
                          type: video
            - requirement: 6
              text: |-
                  Play a minimum of 18-holes of disc golf with another disc golfer about
                  your age and with your counselor, or an adult approved by your counselor.
                  Do the following:
              children:
                  - requirement: a
                    text: |-
                        Follow the <i>PDGA Official Rules of Disc Golf.</i>
                  - requirement: b
                    text: |-
                        Practice good disc golf etiquette.
                  - requirement: c
                    text: |-
                        Show respect to fellow disc golfers and other people in the park
                        along with any wildlife, trees, and plants on the property.
              resources:
                  - href: https://youtu.be/M4bcozlUX9g
                    text: Playing a Round of Disc Golf
                    type: video
            - requirement: 7
              text: |-
                  Find out about three careers related to disc golf. Pick one and
                  identify the education, training, and experience required for this
                  profession. Discuss this with your counselor, and explain why this
                  interests you.
              resources:
                  - href: https://youtu.be/y64MQTh98j4
                    text: Disc Golf as a Career
                    type: video
                  - href: https://youtu.be/rLiz9krymJk
                    text: Being a Professional Disc Golfer
                    type: video
