# 4d and 7f had the trailing periods removed. Since it is the last item in the list, it should still have a period.
- requirement: 1
  text: |-
      <b>Safety and Hazards.</b> Do the following:
  children:
      - requirement: a
        text: |-
            Explain what safety is and what it means to be safe.
        resources:
            - href: https://youtu.be/qNmd4z2VFAY
              text: What is Safety?
              type: video
            - href: https://youtu.be/GRqwuAMqjnY
              text: What Does Safety Mean to You?
              type: video
      - requirement: b
        text: |-
            Explain what hazards are and how people manage hazards to reduce
            risks of harm and to improve safety.
        resources:
            - href: https://youtu.be/_GwVTdsnN1E
              text: Hazard and Risk - What's the Difference?
              type: video
- requirement: 2
  text: |-
      <b>Family and Home Safety.</b> Do the following:
  children:
      - requirement: a
        text: |-
            Explain common causes of and prevention of home injuries.
        resources:
            - href: https://healthtalk.unchealthcare.org/7-common-injuries-that-happen-at-home/
              text: Seven Common Home Injuries
              type: website
            - href: https://www.rubyhome.com/blog/home-accident-stats/
              text: Home Accident Statistics
              type: website
      - requirement: b
        text: |-
            Discuss the dangers involved with the use of fireworks.
        resources:
            - href: https://youtu.be/8HxuUMoJyGA
              text: Fireworks Safety
              type: video
            - href: https://www.mayoclinichealthsystem.org/hometown-health/speaking-of-health/use-caution-with-fireworks
              text: Dangers of Fireworks
              type: website
      - requirement: c
        text: |-
            Explain common causes of and prevention of home fires.
        resources:
            - href: https://www.nfpa.org/news-blogs-and-articles/blogs/2020/12/17/most-home-fires-result-from-five-general-causes
              text: 5 Causes of Home Fires
              type: website
      - requirement: d
        text: |-
            Using the Home Safety Checklist in the <i>Safety</i> merit badge
            pamphlet, or one approved by your counselor, inspect your home or a
            similar building for hazards with an adult. Review your checklist and
            findings with your counselor.
        resources:
            - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Emergency%20Preparedness/Home%20Safety%20Checklists%20%231%20%23%202%2001%202026.pdf
              text: Home Safety Checklist
              type: pdf
      - requirement: e
        text: |-
            Develop a fire-escape plan for your home or for a similar building.
            Include in your drawings exit routes from each room and a meeting place
            outside. Conduct a fire-escape drill. Review your plan and your drill
            with your counselor.
        resources:
            - href: https://www.nfpa.org/education-and-research/home-fire-safety/escape-planning#safety-tips
              text: Home Fire Escape Planning
              type: website
            - href: https://www.youtube.com/watch?v=zeiN_A-OSt8
              text: Demonstration of Safely Escaping a House Fire
              type: video
      - requirement: f
        text: |-
            Develop a family emergency action plan for evacuation because of
            weather or other natural disasters that occur in your area. Using a
            checklist in the <i>Safety</i> merit badge pamphlet or one approved by
            your counselor, assemble or inspect an emergency supplies kit. Explain
            to your counselor how a family would use the plan and the kit supplies
            in an emergency.
        resources:
            - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Emergency%20Preparedness/Family%20Emergency%20Kit%20Checklist%2001%202026.pdf
              text: Checklist for a Family Emergency Evacuation Kit
              type: pdf
            - href: https://youtu.be/EOXSpBkH6zE
              text: Wildfire Evacuation Planning
              type: video
            - href: https://youtu.be/4NbejEMQ6cg
              text: How to Shelter in Place
              type: video
            - href: https://www.ready.gov/evacuation
              text: Evacuation Planning
              type: website
- requirement: 3
  text: |-
      <b>Safety from Crime. </b>Do the following:
  children:
      - requirement: a
        text: |-
            Explain common types of crimes that can affect teens.
      - requirement: b
        text: |-
            Using a Home Security Checklist in the <i>Safety</i> merit badge
            pamphlet or one approved by your counselor, inspect your home or a
            similar building for crime security measures with an adult. Review your
            checklist and findings with your counselor.
        resources:
            - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Crime%20Prevention/Home%20Security%20Checklists%20%231%20%232.pdf
              text: Home Security Checklist
              type: pdf
- requirement: 4
  text: |-
      <b>Safety in Public Places.</b> Explain each of the following to your
      counselor:
  children:
      - requirement: a
        text: |-
            How a person would safely exit from public buildings, a hotel, and a
            stadium in an emergency
        resources:
            - href: https://youtu.be/KaDcgIx2PlY
              text: How to Survive a Stampede
              type: video
            - href: https://youtu.be/P8Naa4pzDdo
              text: How to Survive a Burning High Rise
              type: video
      - requirement: b
        text: |-
            How and why Scouts would take shelter at camp
        resources:
            - href: https://www.youtube.com/shorts/no3dR86WRss
              text: Camp Emergency Planning
              type: video
            - href: https://www.acacamps.org/resources/wildfire-evacuations
              text: Camp Evacuation Planning
              type: website
      - requirement: c
        text: |-
            How should Scouts respond to an active shooter
        resources:
            - href: https://youtu.be/sshDd_AgRAA
              text: How to Respond to an Active Shooter
              type: video
      - requirement: d
        text: |-
            The meaning of this saying: "If You See Something, Say Something®"
        resources:
            - href: https://youtu.be/Lgm5QWD1T3k
              text: If You See Something, Say Something®
              type: video
- requirement: 5
  text: |-
      <b>Safeguarding Youth.</b> Do the following:
  children:
      - requirement: a
        text: |-
            Discuss Scouting America's Safeguarding Youth guidelines that adults
            and Scouts must follow so that everyone is safe at Scouting activities.
        resources:
            - href: https://filestore.scouting.org/filestore/YPSAT/YT%20Mod4%20Final%20Master%20Small.mp4
              text: Youth Protection Policies
              type: video
      - requirement: b
        text: |-
            Discuss with your counselor what situations and behaviors would
            prompt you to Recognize, Resist, and Report a possible abuse situation.
      - requirement: c
        text: |-
            Discuss how you, other Scouts, leaders, and anyone can report
            situations suspicious for abuse through the Scouts First Helpline and
            other means.
- requirement: 6
  text: |-
      <b> Safety from Assault.</b> Explain how to avoid or prevent:
  children:
      - requirement: a
        text: |-
            Assault on a street
        resources:
            - href: https://youtu.be/aQdCVTon3HQ
              text: Muggers Reveal How They Target Their Victims
              type: video
      - requirement: b
        text: |-
            Assault at a restaurant event
      - requirement: c
        text: |-
            Sexual assault at a party or on a date
- requirement: 7
  text: |-
      <b>Online Safety.</b> Discuss the following with your counselor:
  children:
      - requirement: a
        text: |-
            How to avoid being the victim of online crimes
        resources:
            - href: https://consumer.ftc.gov/protect-your-personal-information-hackers-scammers#keep
              text: Protect Your Personal Information From Hackers and Scammers
              type: website
            - href: https://youtu.be/bdp8RdjV6PU
              text: Passkeys Explained in Under 4 Minutes
              type: video
      - requirement: b
        text: |-
            Common online financial scams
        resources:
            - href: https://youtu.be/k8UVnkh8i0c
              text: Common Online Scams
              type: video
            - href: https://youtu.be/CDhAOvsyw2s
              text: 10 Common Internet Scams
              type: video
      - requirement: c
        text: |-
            Effective online security
        resources:
            - href: https://youtu.be/aO858HyFbKI
              text: Effective Online Security
              type: video
      - requirement: d
        text: |-
            Identity theft and how to prevent it
        resources:
            - href: https://youtu.be/kDFeSUUwRnA
              text: Preventing Identity Theft
              type: video
      - requirement: e
        text: |-
            How criminals use social media to target victims
        resources:
            - href: https://youtu.be/5bdBvNCBeho
              text: How Criminals Use Social Media
              type: video
      - requirement: f
        text: |-
            How bullying, texting, and sharing photos can become crimes
- requirement: 8
  text: |-
      <b>Travel Safety.</b> Explain guidelines for traveling safely:
  children:
      - requirement: a
        text: |-
            As a pedestrian in a city
        resources:
            - href: https://youtu.be/QUXLT3gcFb8
              text: Pedestrian Safety
              type: video
      - requirement: b
        text: |-
            In a friend's car or truck
        resources:
            - href: https://www.fmins.com/blog/how-to-be-a-better-passenger/
              text: Passenger Responsibilities for Safety
              type: website
      - requirement: c
        text: |-
            In a rideshare vehicle
        resources:
            - href: https://riskadvisory.ucsf.edu/tips-stay-safe-while-ridesharing
              text: Rideshare Safety Tips
              type: website
            - href: https://youtu.be/3ElQynt6rV4
              text: Ride-Sharing Safety
              type: video
      - requirement: d
        text: |-
            On a bus
        resources:
            - href: https://youtu.be/fbsDdX7auRo
              text: Riding a Bus Safely
              type: video
            - href: https://youtu.be/YiI8bnDwkcE
              text: How to Ride a Bus Safely
              type: video
      - requirement: e
        text: |-
            On a subway or train
        resources:
            - href: https://youtu.be/5w2X_16tuK4
              text: How to Ride a Train Safely
              type: video
      - requirement: f
        text: |-
            On a commercial airplane
        resources:
            - href: https://youtu.be/vsfudxcksHI
              text: Air Travel Do Not Do's
              type: video
- requirement: 9
  text: |-
      <b>Careers.</b> Do ONE of the following:
  children:
      - requirement: a
        text: |-
            Explore careers related to Safety merit badge. Research one career
            to learn about the training and education needed, costs, job prospects,
            salary, job duties, and career advancement. With permission of your
            parent or guardian, your research methods may include an internet or
            library search, an interview with a professional in the field, or a
            visit to a location where people in this career work. Discuss with your
            counselor both your findings and what about this profession might make
            it an interesting career.
        resources:
            - href: https://youtu.be/zumgPs4PAiA
              text: Wondering How To Get Qualified To Work in Safety?!
              type: video
            - href: https://youtu.be/MT9yVrlSn7M
              text: Building Safety Careers
              type: video
      - requirement: b
        text: |-
            Explore how you could use knowledge and skills related to safety to
            pursue a hobby, lifestyle, or service as a volunteer. Research any
            training needed, expenses, and organizations that promote or support it.
            Discuss with your counselor what short-term and long-term goals you
            might have if you pursue this.
        resources:
            - href: https://youtu.be/SfFb2D-3H2s
              text: Volunteers in Mountain Rescue
              type: video
            - href: https://youtu.be/ZlgAJHEWmeg
              text: Safety Tips for Serving as Park Volunteer
              type: video
            - href: https://www.iloveit.net/passion/safety-as-a-passion-and-hobby/
              text: Safety as a Passion
              type: website
