              text: Recognize the "Umbles" and Avoid Hypothermia
              type: video
- requirement: 12
  text: |-
      <b>Mental Health Conditions.</b> Describe the following:
  children:
      - requirement: a
        text: |-
            Reactions associated with at least three stressful situations, such as
            mountain backpacking, rappelling, a ropes course, speaking before an
            audience, making a phone call to an adult, taking a swim test, missing
            home, lighting a match, trying out for a sports team, meeting someone
            for the first time, or other stressful circumstances.
        resources:
            - href: https://youtu.be/_H5QFfiU0s0
              text: 3 Tools for Situational Anxiety
              type: video
            - href: https://youtu.be/BmX6GXDvlLM
              text: Overcoming Social Anxiety
              type: video
            - href: https://www.youtube.com/watch?v=gTd6Lq1M9Tc
              text: Power of Self-Confidence
              type: video
            - href: https://youtu.be/a_dVK2EEWKE
              text: Getting Ready for Tryouts
              type: video
      - requirement: b
        text: |-
            The actions that you and others should take to prepare for and manage
            these situations.
        resources:
            - href: https://youtu.be/h2zWopNUUJE
              text: Techniques to Manage Stress
              type: video
            - href: https://youtu.be/UC6HUrneIWI
              text: Box Breathing | The Breathing Exercise Used By Navy SEALs
              type: video
            - href: https://youtu.be/QcKbxaGpwf4
              text: Tips for Overcoming Phone Anxiety
              type: video
            - href: https://youtu.be/wbroM1Di-bI
              text: How To STOP Letting Social Anxiety Control You
              type: video
      - requirement: c
        text: |-
            The indications that someone might be a danger to themselves or others.
      - requirement: d
        text: |-
            The actions that you should take if you suspect that someone might be a
            danger to themselves or others.
- requirement: 13
  text: |-
      <b>Miscellaneous Conditions.</b> Describe the symptoms and signs of, show
