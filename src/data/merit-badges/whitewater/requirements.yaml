                    type: video
                -
                    href: https://youtu.be/JpF-CoXjfWU
                    text: How To Use a Swim Line to Self Rescue a Canoe
                    type: video
        -
            requirement: b
            text: Proper use of a throw rope to rescue a swimmer in whitewater
            resources:
                -
                    href: https://youtu.be/B6dxD-ttYAw
                    text: Throw Bag Techniques
                    type: video
                -
                    href: https://youtu.be/DbWkLJ2gKTE
                    text: White Water Swims and Throw Bag Rescues
                    type: video
                -
                    href: https://youtu.be/UTzJsbXdHz0
                    text: How To Perform a Throwbag Rescue
                    type: video
        -
            requirement: c
            text: Proper technique for receiving a throw rope as a swimmer
            resources:
                -
                    href: https://youtu.be/B6dxD-ttYAw
                    text: Throw Bag Techniques
                    type: video
                -
                    href: https://youtu.be/DbWkLJ2gKTE
                    text: White Water Swims and Throw Bag Rescues
                    type: video
        -
            requirement: d
            text: |-
                Portaging-where portaging would be appropriate, and when and how
                to do it
            resources:
                -
                    href: https://youtu.be/wQKTRO-R9Uk
                    text: How To Portage a Canoe
                    type: video
                -
                    href: https://youtu.be/hp60rDcov48
                    text: |-
                        How To Portage for Beginners—Footwear, Gear, Tips and
                        Techniques
                    type: video
        -
            requirement: e
            text: |-
                The whitewater buddy system using at least three persons and
                three craft
            resources:
                -
                    href: https://youtu.be/BOS2DnTFRSA
                    text: Learning How To Safely Paddle as a Group
                    type: video
-
    requirement: 12
    text: |-
        Participate in one or more whitewater trips using either a canoe or
        kayak on a Class I and/or Class II river. The trip(s) must involve at
        least six hours of paddling time. For each trip:
    children:
        -
            requirement: a
            text: |-
                Help to prepare a written plan, specifying the route (put-ins
                and takeouts), schedule, equipment, safety precautions, and
                emergency procedures.
            resources:
                -
                    href: https://youtu.be/HF98HTAhxuA
                    text: Planning Your Kayak Trip Safely
                    type: video
        -
            requirement: b
            text: |-
                Determine local rules and obtain permission from landowners and
                land managers in advance.
        -
            requirement: c
            text: |-
                Explain what steps have been taken to comply with Scouting
                America Safety Afloat and the American Whitewater safety
                guidelines.
        -
            requirement: d
            text: |-
                Show how to protect personal and group equipment from water and
                how to load and secure the containers in boats to be used in the
                trip. Execute the plans with other paddlers.
            resources:
                -
                    href: https://youtu.be/iazzviLCqgo
                    text: How To Pack for a Multi-Day Whitewater Trip
                    type: video
                -
                    href: https://youtu.be/57ukrEWtvy8
                    text: '3 Minutes With a Maine Guide: Packing a Canoe'
                    type: video
        -
            requirement: e
            text: |-
                Explain to your counselor how well your plans worked for each
                trip taken.
