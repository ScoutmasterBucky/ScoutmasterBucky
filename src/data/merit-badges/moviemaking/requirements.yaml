- requirement: 1
  text: |-
      Discuss and demonstrate the proper elements of a good motion picture. In
      your discussion, include visual storytelling, rhythm, the 180-axis rule,
      camera movement, framing and composition of camera shots, and lens
      selection.
  resources:
      - href: https://youtu.be/BFwMRVwrKcA
        text: Film Making Basics
        type: video
- requirement: 2
  text: |-
      Do the following:
  children:
      - requirement: a
        text: |-
            In a three- or four-paragraph treatment, tell the story you plan to
            produce, making sure that the treatment conveys a visual picture.
        resources:
            - href: https://youtu.be/puF9CkvmJt0
              text: Film Production Explained, Each Step of the Production Process
              type: video
      - requirement: b
        text: |-
            Prepare a storyboard for your motion picture.
            <div class="gap"></div>
            <b>Note:</b> This can be done with rough sketches and stick figures.
        resources:
            - href: https://youtu.be/yPtqHdQcOOw
              text: What Is a Storyboard and Why Is It Important? Pre-Production Filmmaking
              type: video
      - requirement: c
        text: |-
            Demonstrate the following motion picture shooting techniques:
        children:
            - requirement: 1
              text: |-
                  Using a tripod
              resources:
                  - href: https://youtu.be/pAvn034VcCg
                    text: 7 Tripod Tricks for Filmaking
                    type: video
            - requirement: 2
              text: |-
                  Panning a camera
              resources:
                  - href: https://youtu.be/Km7Rfpda_Lw
                    text: Camera Panning
                    type: video
            - requirement: 3
              text: |-
                  Framing a shot
              resources:
                  - href: https://youtu.be/5UE3jz_O_EM
                    text: Reverse Shot
                    type: video
                  - href: https://www.youtube.com/shorts/DAwz2Wnrr90
                    text: Frame it Right Essential Framing
                    type: video
            - requirement: 4
              text: |-
                  Selecting an angle
              resources:
                  - href: https://youtu.be/nfHvSnILXl0
                    text: 'Filmmaking 101: 5 Camera Angles'
                    type: video
                  - href: https://youtu.be/SlNviMsi0K0
                    text: 12 CAMERA ANGLES to Enhance Your Films
                    type: video
            - requirement: 5
              text: |-
                  Selecting proper lighting
              resources:
                  - href: https://youtu.be/r2nD_knsNrc
                    text: Ultimate Guide to Cinematic Lighting
                    type: video
                  - href: https://youtu.be/zdZ2zza5WbY
                    text: Zack Snyder Justice League Martian Man Hunter Meets Lois
                    type: video
            - requirement: 6
              text: |-
                  Handheld shooting
              resources:
                  - href: https://youtu.be/LuJdvwm8-0k
                    text: 5 Tips for Shooting Handheld Videos
                    type: video
                  - href: https://youtu.be/PVmaJAmQ3yQ
                    text: 'Birdman: Anatomy of a Scene'
                    type: video
      - requirement: d
        text: |-
            Using motion picture shooting techniques, plan ONE of the following
            programs. Start with a treatment and complete the requirement by
            presenting this program to a pack or your troop, patrol, or class.
        children:
            - requirement: 1
              text: |-
                  Film a court of honor and show it to an audience.
              resources:
                  - href: https://youtu.be/oPfet0ypjmY
                    text: 4 Videography Tips for Beginners
                    type: video
            - requirement: 2
              text: |-
                  Create a short feature of your own design, using the techniques you
                  learned.
              resources:
                  - href: https://youtu.be/kZWH6OBDdR0
                    text: 10 Tips for Beginner Videographers
                    type: video
            - requirement: 3
              text: |-
                  Shoot a vignette that could be used to train a new Scout in a
                  Scouting skill.
              resources:
                  - href: https://youtu.be/cLLuuV_57JY
                    text: How to Make a Great Instructional Video
                    type: video
- requirement: 3
  text: |-
      Do ONE of the following:
  children:
      - requirement: a
        text: |-
            With your parent or guardian's permission and your counselor's
            approval, visit a film set or television production studio and watch
            how production work is done.
        resources:
            - href: https://youtu.be/zqUAiM-FLrs
              text: Film Set Order of Operations
              type: video
      - requirement: b
        text: |-
            Explain to your counselor the elements of the zoom lens and three
            important parts.
        resources:
            - href: https://youtu.be/fRKsKR9wvqE
              text: How Lens Work in Camera
              type: video
            - href: https://youtu.be/15h9iG-Rdwk
              text: The Parts of a Camera Lens - Anatomy of a DSLR Lens
              type: video
- requirement: 4
  text: |-
      Do ONE of the following:
  children:
      - requirement: a
        text: |-
            Explore careers related to this merit badge. Research one career to
            learn about the training and education needed, costs, job prospects,
            salary, job duties, and career advancement. Your research methods may
            include—with your parent or guardian's permission—an internet or library
            search, an interview with a professional in the field, or a visit to a
            location where people in this career work. Discuss with your counselor
            both your findings and what about this profession might make it an
            interesting career.
        resources:
            - href: https://youtu.be/CNMBMhNh2S0
              text: Top 10 Careers in Film &amp; Video Production
              type: video
      - requirement: b
        text: |-
            Explore how you could use knowledge and skills from this merit badge
            to pursue a hobby or healthy lifestyle. Research any training needed,
            expenses, and organizations that promote or support it. Discuss with
            your counselor what short-term and long-term goals you might have if you
            pursued this.
        resources:
            - href: https://youtu.be/d30kfqueNKI
              text: Filmmaking as a Hobby - Getting Started
              type: video
