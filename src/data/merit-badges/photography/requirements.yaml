# 2b uses a double hyphen and the rest use single. Adjusted to be single.
- requirement: 1
  text: |-
      Safety. Do the following:
  children:
      - requirement: a
        text: |-
            Explain to your counselor the most likely hazards you may encounter
            while working with photography and what you should do to anticipate,
            mitigate, prevent, and respond to these hazards. Explain how you would
            prepare for exposure to environmental situations such as weather, sun,
            and water.
        resources:
            - href: https://www.coverhound.com/insurance-learning-center/is-photography-a-dangerous-career%20%20
              text: Is Photography a Dangerous Career?
              type: website
            - href: https://thephotocove.com/health-and-safety-in-a-photography-studio/
              text: Health and Safety in a Photography Studio
              type: website
            - href: https://loadedlandscapes.com/safety-tips-nature-photography/
              text: 9 Safety Tips for Landscape and Nature Photographers
              type: website
      - requirement: b
        text: |-
            View the <a
            href="https://www.scouting.org/training/youth-protection/scouts-bsa/"
            >Personal Safety Awareness "Digital Safety" video</a> (with your parent
            or guardian's permission).
        resources:
            - href: https://filestore.scouting.org/filestore/YPSAT/YT%20Mod1%20Final%20Master%20Small.mp4
              text: Digital Safety
              type: video
- requirement: 2
  text: |-
      Explain how the following elements and terms can affect the quality of a
      picture:
  children:
      - requirement: a
        text: |-
            Light—natural light (ambient/existing), low light (such as at night),
            and artificial light (such as from a flash)
        resources:
            - href: https://youtu.be/FWcOshGthBI
              text: 'Golden Hour Magic: Perfect Light for Stunning Photos'
              type: video
            - href: https://youtu.be/Z9znfhFQPbE
              text: Artificial Lighting for Photography (So Much Easier Than You Think!)
              type: video
            - href: https://youtu.be/VgT4O6CclfA
              text: Why Most Natural Light Photography is Flat (and How to Fix It)
              type: video
      - requirement: b
        text: |-
            Exposure—aperture (f-stops), shutter speed, ISO
        resources:
            - href: https://youtu.be/Edvpu_939l4
              text: Iso, Shutter Speed and Aperture Explained | Exposure Basics for Beginners
              type: video
            - href: https://youtu.be/V7z7BAZdt2M
              text: Photography Basics in 10 Minutes
              type: video
      - requirement: c
        text: |-
            Depth of field
        resources:
            - href: https://youtube.com/shorts/98B3dvdAX6c
              text: Depth of Field in 30 Seconds
              type: video
      - requirement: d
        text: |-
            Composition—rule of thirds, leading lines, framing, depth
        resources:
            - href: https://youtu.be/eImryR3yKz8
              text: 'Basic Photography | Composition: The Only Rules You Need to Know'
              type: video
            - href: https://youtu.be/2uAYj6WScJQ
              text: 'Photography Composition: Master Leading Lines for Stunning Shots!'
              type: video
            - href: https://youtube.com/shorts/Z1Wb8ZH0uvc
              text: Master the Rule of Thirds for Better Photos
              type: video
      - requirement: e
        text: |-
            Angle of view
        resources:
            - href: https://youtu.be/9SZy4ptc5ws
              text: Angle of View and Framing
              type: video
      - requirement: f
        text: |-
            Stop action and blur motion
        resources:
            - href: https://youtu.be/5h4J8nZn1Sw
              text: How to Shoot Motion Blur Photography Like a Pro
              type: video
            - href: https://youtu.be/YtkIsA4VdRw
              text: 'Photography Tips: How to Do Stop Action Photography'
              type: video
      - requirement: g
        text: |-
            Decisive moment (action or expression captured by the photographer)
        resources:
            - href: https://youtu.be/meeqJ58eSzk
              text: Decisive Moment
              type: video
  resources:
      - href: https://shotkit.com/camera-settings/
        text: Easy to Understand Guide to Camera Settings for Beginners
        type: website
      - href: https://photographylife.com/common-camera-settings#camera-setup
        text: Common Camera Settings for Beginners
        type: website
- requirement: 3
  text: |-
      Explain the basic parts and operation of a camera. Explain how an exposure
      is made when you take a picture.
  resources:
      - href: https://youtu.be/V7z7BAZdt2M
        text: Photography Basics in 10 Minutes
        type: video
      - href: https://youtu.be/BsSjEhktkzU
        text: Parts of a Camera
        type: video
      - href: https://youtu.be/Ey6S3rKH_o4
        text: How Digital Cameras Work
        type: video
- requirement: 4
  text: |-
      Do TWO of the following, then share your work with your counselor.
  children:
      - requirement: a
        text: |-
            Photograph one subject from two different angles or perspectives.
        resources:
            - href: https://youtube.com/shorts/o5yjHn56VtE
              text: 'Pro Photo Secrets: Avoid Shadows &amp; Master Poses'
              type: video
      - requirement: b
        text: |-
            Photograph one subject from two different light sources - artificial
            and natural.
      - requirement: c
        text: |-
            Photograph one subject with two different depth of fields.
      - requirement: d
        text: |-
            Photograph one subject with two different compositional techniques.
- requirement: 5
  text: |-
      Photograph THREE of the following, then share your work with your
      counselor.
  children:
      - requirement: a
        text: |-
            Close-up of a person
      - requirement: b
        text: |-
            Two to three people interacting
      - requirement: c
        text: |-
            Action shot
      - requirement: d
        text: |-
            Animal shot
      - requirement: e
        text: |-
            Nature shot
      - requirement: f
        text: |-
            Picture of a person - candid, posed, or camera aware
- requirement: 6
  text: |-
      Describe how software allows you to enhance your photograph after it is
      taken. Select a photo you have taken, then do ONE of the following, and
      share what you have done with your counselor:
  children:
      - requirement: a
        text: |-
            Crop your photograph.
      - requirement: b
        text: |-
            Adjust the exposure or make a color correction.
      - requirement: c
        text: |-
            Show another way you could improve your picture for impact.
  resources:
      - href: https://youtu.be/KR7L2oSRlwY
        text: PHOTO EDITING FOR BEGINNERS - 9 Simple Steps to Improve Your Photos
        type: video
- requirement: 7
  text: |-
      Using images other than those created for requirements 4, 5, and 6, produce
      a visual story to document an event to photograph OR choose a topic that
      interests you to photograph. Do the following:
  children:
      - requirement: a
        text: |-
            Plan the images you need to photograph for your photo story.
        resources:
            - href: https://youtu.be/UtMXpomDWlk
              text: Storytelling in Photography
              type: video
      - requirement: b
        text: |-
            Share your plan with your counselor, and get your counselor's input and
            approval before you proceed.
      - requirement: c
        text: |-
            Select eight to 12 images that best tell your story. Arrange your
            images in order and mount the prints on a poster board, OR create an
            electronic presentation. Share your visual story with your counselor.
        resources:
            - href: https://youtu.be/G-qyX_Ri17M
              text: How to Make a PowerPoint Photo Slideshow
              type: video
- requirement: 8
  text: |-
      Identify three career opportunities in photography. Pick one and explain to
      your counselor how to prepare for such a career. Discuss what education and
      training are required, and why this profession might interest you.
  resources:
      - href: https://youtu.be/fEp_EDQE0IM
        text: Top 10 Careers For Photographers
        type: video
      - href: https://www.indeed.com/career-advice/finding-a-job/list-of-careers-in-photography
        text: Indeed Career Guide
        type: website
