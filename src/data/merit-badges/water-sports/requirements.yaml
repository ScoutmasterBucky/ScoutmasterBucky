-
    requirement: 1
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: |-
                Explain to your counselor the most likely hazards you may
                encounter while participating in water sports activities and
                what you should do to anticipate, help prevent, mitigate, and
                respond to these hazards.
        -
            requirement: b
            text: |-
                Review prevention, symptoms, and first-aid treatment for the
                following injuries or illnesses that could occur while
                participating in water sports: blisters, cold-water shock and
                hypothermia, dehydration, heat-related illnesses, sunburn,
                sprains, strains, minor cuts and bruises, spinal injury, and
                concussions and head trauma.
            resources:
                -
                    href: https://youtu.be/rH3gZuSr6Y8
                    text: Cold Water Shock—How To Deal With Cold Water Shock
                    type: video
                -
                    href: https://youtu.be/EmNieKLjmH4
                    text: |-
                        What Happens if You Don't Drink Enough Water? Signs of
                        Dehydration + 4 Ways To Keep Hydrated
                    type: video
                -
                    href: https://youtu.be/Rz6Wxiv4aRA
                    text: Dangers of Heat-Related Illnesses
                    type: video
                -
                    href: https://youtu.be/9aFm087_XWg
                    text: What Causes Sunburns?
                    type: video
                -
                    href: https://youtu.be/z1gbB_peVDQ
                    text: Sprain Care With RICE Method
                    type: video
        -
            requirement: c
            text: |-
                Review the Scouting America Safety Afloat policy. Tell how it
                applies to water sports.
            resources:
                -
                    href: >-
                        https://www.scouting.org/health-and-safety/safety-moments/safety-afloat/
                    text: Safety Afloat
                    type: website
-
    requirement: 2
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: |-
                Discuss with your counselor the characteristics of life jackets
                most appropriate for water sports, and tell why one must always
                be worn while waterskiing or wakeboarding. Then demonstrate how
                to select and fit a life jacket for water sports activities.
        -
            requirement: b
            text: |-
                Review and discuss the Water Sports Safety Code with your
                counselor. Promise that you will live up to it and follow it in
                all water work for this merit badge. Review the safety
                precautions that must be used by the boat operator in pulling
                waterskiers and wakeboarders.
            resources:
                -
                    href: >-
                        http://www.usscouts.org/mb/docs/Water-Sports-Safety-Code.pdf
                    text: Watersports Safety Code
                    type: pdf
-
    requirement: 3
    text: |-
        Before doing requirements 4 through 6, successfully complete the
        Scouting America swimmer test.
        <div class="gap"></div>
        <i><b>NOTE:</b> See the <a
        href="/merit-badges/swimming/"><i>Swimming</i> merit badge</a> pamphlet
        for details about the Scouting America swimmer test.</i>
    resources:
        -
            href: >-
                https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Pamphlets/Swimming.pdf
            text: <i>Swimming</i> Merit Badge Pamphlet
            type: pdf
-
    requirement: 4
    text: |-
        Show the following skier signals to the safety observer in the boat:
        skier safe, faster, slower, turns, back to dock, cut motor, skier in
        water.
    resources:
        -
            href: https://aceboater.com/common-hand-signals-for-boaters
            text: Towed Watersports Hand Signals
            type: pdf
-
    requirement: 5
    text: |-
        Showing reasonable control while using two skis, one ski, or a
        wakeboard, do the following:
    children:
        -
            requirement: a
            text: |-
                Show how to enter the water from a boat and make a deepwater
                start without help.
            resources:
                -
                    href: https://youtu.be/7h9n_qzP6HY
                    text: How To Get Up on a Wakeboard
                    type: video
                -
                    href: https://youtu.be/e1yqFxHQz6s
                    text: How To Stand Up on Water Skis
                    type: video
                -
                    href: https://youtu.be/df9-EjiGy8A
                    text: How To Water-Ski for Beginners
                    type: video
                -
                    href: https://youtu.be/rudwod76If8
                    text: How To Ski on One Ski
                    type: video
        -
            requirement: b
            text: |-
                Starting from outside the wakes, show you can cross both wakes
                four times and return to the center of the wake each time,
                without falling.
            resources:
                -
                    href: https://youtu.be/mSJ8x0vXkWk
                    text: 'Wakeboad Tutorial: Moving Around/Edging'
                    type: video
                -
                    href: https://youtu.be/p1BbmMuDbQE
                    text: How To Carve and Cross the Wake (Wakeboard)
                    type: video
                -
                    href: https://youtu.be/0wsEnL763c4
                    text: How To Get Started in Water Skiing
                    type: video
        -
            requirement: c
            text: |-
                Show you can fall properly to avoid an obstacle. Also show that
                you can drop handle and coast to a stop without losing your
                balance.
-
    requirement: 6
    text: |-
        While on shore, show that you know how to properly adjust the bindings
        of your ski(s) or wakeboard to fit yourself. Then, in deep water, show
        you can adjust bindings to fit. Recover and put on your ski(s) or
        wakeboard that has come off during a fall.
