-
    requirement: 1
    text: |-
        Before doing requirements 3 through 15, review with your counselor the
        principles of Safe Swim Defense.
    resources:
        -
            href: https://player.vimeo.com/video/187987620
            text: 3. Safe Area
            type: video
-
    requirement: 2
    text: 'Before doing requirements 3 through 15:'
    children:
        -
            requirement: a
            text: |-
                Earn the <a href="/merit-badges/swimming/"><i>Swimming</i> merit
                badge</a>.
            resources:
                -
                    href: https://www.scouting.org/merit-badges/swimming/
                    text: Swimming Merit Badge
                    type: website
        -
            requirement: b
            text: |-
                Swim continuously for 400 yards using each of the following
                strokes in a strong manner, in good form with rhythmic
                breathing, for at least 50 continuous yards: front crawl,
                sidestroke, breaststroke, and elementary backstroke.
-
    requirement: 3
    text: 'Explain the following:'
    children:
        -
            requirement: a
            text: |-
                Common drowning situations and how to avoid them, such as
                unfenced residential pools, drop offs, river currents, rip
                currents, and medical emergencies.
        -
            requirement: b
            text: How to identify persons in the water who need assistance.
            resources:
                -
                    href: https://youtu.be/beNheoRRdKk
                    text: Can You Spot a Person Drowning?
                    type: video
        -
            requirement: c
            text: The order of methods in water rescue.
        -
            requirement: d
            text: |-
                How rescue techniques vary depending on the setting and the
                condition of the person needing assistance.
        -
            requirement: e
            text: Situations for which in-water rescues should not be undertaken.
-
    requirement: 4
    text: |-
        Demonstrate "reaching" rescues using various items such as arm, leg,
        towels, shirts, paddles, poles.
    resources:
        -
            href: https://player.vimeo.com/video/187987272
            text: Lifesaving Reaching Rescues—Arm
            type: video
        -
            href: https://youtu.be/SsHswwtUaIk
            text: |-
                She Saved Someone From Drowning! More True Stories of Scouts in
                Action
            type: video
-
    requirement: 5
    text: |-
        Demonstrate "throwing" rescues using various items such as a line, ring
        buoy, rescue bag, and free-floating support. Successfully place at least
        one such aid within reach of a practice victim 25 feet from shore.
    resources:
        -
            href: https://player.vimeo.com/video/187987276
            text: Throwing Rescues—Lifejacket
            type: video
-
    requirement: 6
    text: |-
        With your counselor's approval, view in-person or on video a rowing
        rescue performed using a rowboat, canoe, kayak, or stand up paddleboard.
        Discuss with your counselor how effectively and efficiently the rescue
        was performed.
    resources:
        -
            href: https://youtu.be/CCNtlv9kRYA
            text: Their Kayak Capsized! A True Story of Scouts in Action
            type: video
-
    requirement: 7
    text: |-
        List various items that can be used as aids in a "go" rescue. Explain
        why buoyant aids are preferred.
-
    requirement: 8
    text: |-
        Correctly demonstrate rescues of a conscious practice subject 30 feet
        from shore in deep water using two types of buoyant aids provided by
        your counselor. Use a proper entry and a strong approach stroke. Speak
        to the subject to determine his or her condition and to provide
        instructions and encouragement.
    resources:
        -
            href: https://youtu.be/PbRsD-ep2TM
            text: |-
                He Saved His Grandma From Drowning! A True Story of Scouts in
                Action
            type: video
        -
            href: https://player.vimeo.com/video/187987279
            text: Entry—Stride Jump
            type: video
    children:
        -
            requirement: a
            text: |-
                Present one aid to a subject, release it, and swim at a safe
                distance as the subject moves to safety.
        -
            requirement: b
            text: |-
                In a separate rescue, present the other aid to a subject and use
                it to tow the subject to safety.
-
    requirement: 9
    text: |-
        Discuss with your counselor when it is appropriate to remove heavy
        clothing before attempting a swimming rescue. Remove street clothes in
        20 seconds or less, enter the water, and approach a conscious practice
        subject 30 feet from shore in deep water. Speak to the subject and use a
        nonbuoyant aid, such as a shirt or towel, to tow the subject to safety.
-
    requirement: 10
    text: |-
        Discuss with your counselor the importance of avoiding contact with an
        active subject and demonstrate lead-and-wait techniques.
    resources:
        -
            href: https://player.vimeo.com/video/187987281
            text: Lead and Wait
            type: video
        -
            href: https://youtu.be/HNZd-jBYN5g
            text: Shout and Signal Rescue
            type: video
-
    requirement: 11
    text: |-
        Perform the following nonequipment rescues for a conscious practice
        subject 30 feet from shore. Begin in the water from a position near the
        subject. Speak to the subject to determine his or her condition and to
        provide instructions and encouragement.
    resources:
        -
            href: https://player.vimeo.com/video/187982620
            text: Active Swim Support
            type: video
    children:
        -
            requirement: a
            text: |-
                Perform an armpit tow for a calm, responsive, tired swimmer
                resting with a back float.
        -
            requirement: b
            text: |-
                Perform a cross-chest carry for an exhausted, responsive subject
                treading water.
-
    requirement: 12
    text: |-
        In deep water, show how to escape from a victim's grasp on your wrist.
        Repeat for front and rear holds about the head and shoulders.
    resources:
        -
            href: https://player.vimeo.com/video/187987288
            text: 'Escape: Rear, Head, and Shoulder'
            type: video
-
    requirement: 13
    text: |-
        Perform the following rescues for an unconscious practice subject at or
        near the surface 30 feet from shore. Use a proper entry and strong
        approach stroke. Speak to the subject and splash water on the subject to
        determine his or her condition before making contact. Quickly remove the
        victim from the water, with assistance if needed, and position for CPR.
    children:
        -
            requirement: a
            text: Perform an equipment assist using a buoyant aid.
        -
            requirement: b
            text: Perform a front approach and wrist tow.
        -
            requirement: c
            text: Perform a rear approach and armpit tow.
-
    requirement: 14
    text: |-
        Discuss with your counselor how to respond if a victim submerges before
        being reached by a rescuer, and do the following:
    children:
        -
            requirement: a
            text: |-
                Recover a 10-pound weight in 8 to 10 feet of water using a
                feetfirst surface dive.
            resources:
                -
                    href: https://youtu.be/Lp81Aki77_0
                    text: Feet First Surface Dive
                    type: video
        -
            requirement: b
            text: Repeat using a headfirst surface dive.
            resources:
                -
                    href: https://youtu.be/tajzE__-B-U
                    text: Head First Surface Dive
                    type: video
-
    requirement: 15
    text: 'Demonstrate management of a spinal injury to your counselor:'
    children:
        -
            requirement: a
            text: Discuss the causes, signs, and symptoms of a spinal injury.
            resources:
                -
                    href: https://youtu.be/x-YYjkokQ6U
                    text: Head, Neck, and Spine Injuries
                    type: video
                -
                    href: https://youtu.be/9hEjyLabTRE
                    text: Assessing a Head Injury
                    type: video
        -
            requirement: b
            text: Support a faceup subject in calm water of standing depth.
        -
            requirement: c
            text: |-
                Turn a subject from a facedown to a faceup position in water of
                standing depth while maintaining support.
-
    requirement: 16
    text: 'Demonstrate knowledge of resuscitation procedure:'
    resources:
        -
            href: https://youtu.be/mnfhnyY-Udk
            text: How To Perform CPR for a Drowning Victim
            type: video
    children:
        -
            requirement: a
            text: Describe how to recognize the need for rescue breathing and CPR.
        -
            requirement: b
            text: |-
                Demonstrate CPR knowledge and skills, including rescue
                breathing, on a mannequin under the guidance of a current
                CPR/AED instructor trained by a nationally certified provider.
-
    requirement: 17
    text: |-
        With your counselor, discuss causes, prevention, and treatment of other
        injuries or illnesses that could occur while swimming or boating,
        including hypothermia, dehydration, heat-related illnesses, muscle
        cramps, sunburn, stings, and hyperventilation.
    resources:
        -
            href: >-
                https://surefirecpr.com/emergency-tips/10-common-summer-safety-emergencies/
            text: 10 Common Summer Safety Emergencies
            type: website
