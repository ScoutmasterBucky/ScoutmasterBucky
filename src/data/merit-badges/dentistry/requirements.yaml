# 2a missing a space in "and gum disease.Tell how" - added space
-
    requirement: 1
    text: |-
        Using X-ray (radiographic) films or images and with your counselor's
        guidance, do the following:
    children:
        -
            requirement: a
            text: Study the tooth structure and look for decay.
            resources:
                -
                    href: https://youtu.be/09dBTs5ObSU
                    text: X-Rays for Cavities
                    type: video
        -
            requirement: b
            text: |-
                Draw a lower molar, using the radiographs as a guide. Label its
                parts and surfaces. Show surrounding structures such as bone and
                gum tissues.
        -
            requirement: c
            text: |-
                Show on your drawing where the nerves and blood vessels enter
                and leave the tooth.
        -
            requirement: d
            text: |-
                Show on your drawing where bacterial plaque is most likely to be
                found.
-
    requirement: 2
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: |-
                Tell or write about what causes dental decay and gum disease.
                Tell how each of the following contributes to dental decay and
                gum disease: bacterial plaque, sugars, and acid.
            resources:
                -
                    href: https://youtu.be/zGoBFU1q4g0
                    text: What Causes Cavities?
                    type: video
                -
                    href: https://youtu.be/BE_h4bTdcdQ
                    text: What Causes Tooth Decay?
                    type: video
        -
            requirement: b
            text: |-
                Tell the possible causes for traumatic tooth loss, describe the
                types of mouth guards used to help prevent tooth trauma, and
                list the athletic activities during which a person should wear a
                mouth guard.
            resources:
                -
                    href: >-
                        https://www.colgate.com/en-us/oral-health/dental-emergencies-and-sports-safety/three-kinds-of-tooth-injury-that-occur-in-sports
                    text: |-
                        The Three Most Common Dental Injuries in Sports and How
