                    type: website
                -
                    href: https://youtu.be/d0ktAyLnGTE
                    text: Why Is Having a Mouthguard Important?
                    type: video
                -
                    href: >-
                        https://alignerco.com/blogs/blog/which-sports-require-mouthguards
                    text: Which Sports Require Mouth Guards?
                    type: website
        -
            requirement: c
            text: |-
                Explain the first-aid procedure for saving a tooth that has been
                knocked out.
            resources:
                -
                    href: https://youtu.be/KhHyIeionv8
                    text: Knocked Out Teeth | First Aid
                    type: video
        -
            requirement: d
            text: |-
                Discuss how the use of tobacco products can negatively affect
                your oral health.
            resources:
                -
                    href: https://youtu.be/It6DgyGNa48
                    text: What Does Smoking Do To Your Teeth?
                    type: video
                -
                    href: https://youtu.be/CAgoECkR354
                    text: |-
                        Vaping &amp; Your Teeth—The Hidden Damage You Need to
                        Know!
                    type: video
