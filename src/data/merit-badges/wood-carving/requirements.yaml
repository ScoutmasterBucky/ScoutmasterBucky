-
    requirement: 1
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: |-
                Explain to your counselor the hazards you are most likely to
                encounter while wood carving, and what you should do to
                anticipate, help prevent, mitigate, or lessen these hazards.
            resources:
                -
                    href: https://youtu.be/6_4Bpltbnkg
                    text: |-
                        Top 7 Safety Secrets I Wish I'd Known Before My First
                        Cut!
                    type: video
        -
            requirement: b
            text: |-
                Show that you know first aid for injuries that could occur while
                wood carving, including minor cuts and scratches and splinters.
            resources:
                -
                    href: https://youtu.be/A0EmfREhgRw
                    text: The Emergency First Aid Kit for Woodworkers Need!
                    type: video
-
    requirement: 2
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: |-
                Earn the <a href="/other-awards/totin-chip/">Totin' Chip</a>
                recognition.
            resources:
                -
                    href: >-
                        https://www.scouting.org/awards/awards-central/totin-chip/
                    text: Totin' Chip
                    type: website
        -
            requirement: b
            text: |-
                Discuss with your counselor your understanding of the Safety
                Checklist for Carving.
            resources:
                -
                    href: >-
                        https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Wood%20Carving/WoodcarvingChecklist.pdf
                    text: Safety Checklist for Carving
                    type: pdf
-
    requirement: 3
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: |-
                Explain to your counselor, orally or in writing, the care and
                use of five types of tools that you may use in a carving
                project.
            resources:
                -
                    href: https://youtu.be/vMrwACL0Yrc
                    text: Basic Hand Carving Tools Explained
                    type: video
        -
            requirement: b
            text: |-
                Tell your counselor how to care for and use several types of
                sharpening devices, then demonstrate that you know how to use
                these devices.
            resources:
                -
                    href: https://youtu.be/D6cy4av-18c
                    text: Essential Sharpening Tools Every Wood Carver Needs
                    type: video
                -
                    href: https://youtu.be/lBXRkMZfIXk
                    text: How To Use a Sharpening Stone | Knives
                    type: video
                -
                    href: https://youtu.be/5Tt3K-kXhJc
                    text: Fast and Easy Knife Stropping Guide
                    type: video
-
    requirement: 4
    text: |-
        Using a piece of scrap wood or a project on which you are working, show
        your counselor that you know how to do the following:
    children:
        -
            requirement: a
            text: Paring cut
            resources:
                -
                    href: https://youtu.be/V89HIK33dgQ
                    text: Pairing Cut Safety Whittling With a Knife
                    type: video
        -
            requirement: b
            text: Basic cut and push cut
            resources:
                -
                    href: https://youtu.be/ELvvu4wwMgM
                    text: Push Cut Tutorial | Beginner's Wood Carving Guide
                    type: video
        -
            requirement: c
            text: V cut
            resources:
                -
                    href: https://youtu.be/8NdNyjHm-fA
                    text: |-
                        V-Shaped Cut Technique |Essential Carving Technique |
                        Whittling Basics
                    type: video
        -
            requirement: d
            text: Stop cut or score line
            resources:
                -
                    href: https://youtu.be/45xBl3kiShM
                    text: How To Carve a Stop Cut | Woodcarving Fundamentals
                    type: video
                -
                    href: https://youtu.be/ckiBo5TLjk4
                    text: |-
                        Incise Woodcarving || The Basics of How to Incise Wood
                        Carve "Line Carving"
                    type: video
-
    requirement: 5
    text: |-
        Tell why different woods are used for different projects. Explain why
        you chose the type of wood you did for your projects in requirements 6
        and 7.
    resources:
        -
            href: https://youtu.be/qnrBh3M1KQw
            text: Beginners Guide to Wood Carving - Lets Talk Wood
            type: video
        -
            href: https://youtu.be/iIyU1Zx7tmI
            text: My Top 5 Favorite Carving Woods
            type: video
-
    requirement: 6
    text: |-
        Plan your own or select a project from the <em>Wood Carving</em> merit
        badge pamphlet and complete a simple carving in the round.
    resources:
        -
            href: https://youtu.be/A1C40ObwTX0
            text: Making Your Own Carving Patterns—Whittling Tips for Beginners
            type: video
        -
            href: https://caseknives.com/blogs/whittle-more/5-minute-wizard
            text: 5-Minute Wizard
            type: website
        -
            href: https://youtu.be/7bQAa_CZsF4
            text: |-
                How To Whittle a Simple Bear—Step-by-Step Beginner Wood Carving
                Project
            type: video
        -
            href: https://youtu.be/HimTJN3A3lw
            text: How To Carve a Arrowhead Neckerchief Slide Part 1 Carving Basics
            type: video
        -
            href: https://youtu.be/CaP4V7CyYD8
            text: What Should You Whittle? Whittling Tips for Beginners
            type: video
-
    requirement: 7
    text: Complete a simple low-relief OR a chip carving project.
    resources:
        -
            href: https://youtu.be/43dLqrKV9OI
            text: Beginning Woodcarving—How To Carve a Basic Flower With Mary May
            type: video
        -
            href: https://youtu.be/spg4f_ge6Is
            text: Chip Carving w/ Wayne Barton —Introduction
            type: video
        -
            href: https://youtu.be/bOE99r5N0Ds
            text: 'Chip Carving: Tips for Beginners'
            type: video
