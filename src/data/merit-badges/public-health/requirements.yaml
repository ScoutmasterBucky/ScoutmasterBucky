# 7a omits ":" at the end
# 7a1 omits the Oxford comma
# 7b should omit the word "either"
-
    requirement: 1
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: Explain what public health is.
            resources:
                -
                    href: https://youtu.be/t_eWESXTnic
                    text: What Is Public Health??
                    type: video
                -
                    href: https://youtu.be/5aww-Bpgkf4
                    text: 'What Is Public Health? Crash Course Public Health #1'
                    type: video
                -
                    href: https://youtu.be/uKe1KNi3YgI
                    text: Why Public Health Matters
                    type: video
        -
            requirement: b
            text: |-
                Explain how Escherichia coli (E. coli), tetanus, AIDS,
                encephalitis, salmonellosis, Lyme disease, and coronavirus
                (COVID-19) are contracted.
            resources:
                -
                    href: https://youtu.be/Zw7oWOvOjiQ
                    text: 'Food Safety: Avoiding E. coli'
                    type: video
                -
                    href: https://youtu.be/g0cd6iVfNbw
                    text: What Is Tetanus and How Do You Get It?
                    type: video
                -
                    href: https://youtu.be/7XT8dBmJdMo
                    text: Salmonella
                    type: video
                -
                    href: https://youtu.be/ENmVXtwsKE8
                    text: 5 Tips to Prevent Tick Bites and Getting Lyme Disease
                    type: video
                -
                    href: https://youtu.be/oqFn6AHoJZQ
                    text: How the COVID-19 Virus Is Transmitted
                    type: video
        -
            requirement: c
            text: |-
                Choose any four of the following diseases and explain how each
                one is contracted and possibly prevented: gonorrhea, West Nile
                virus, botulism, influenza, syphilis, hepatitis, emphysema,
                meningitis, herpes, or lead poisoning.
            resources:
                -
                    href: https://youtu.be/AL6V4eB-mbI
                    text: West Nile Story (West Nile Virus Prevention Rap)
                    type: video
                -
                    href: https://youtu.be/2v3dgup6n7c
                    text: |-
                        6 Types of Botulism: Food, Infant, Wound &amp; More
                        Explained!
                    type: video
                -
                    href: https://youtu.be/qq8tq4AEpxU
                    text: How Does the Flu Spread?
                    type: video
                -
                    href: https://youtu.be/Zc6MSB622SE
                    text: Emphysema, Explained in 90 Seconds
                    type: video
                -
                    href: https://youtu.be/FHLWnlrmKNg
                    text: The Signs and Symptoms of Meningitis
                    type: video
                -
                    href: https://youtu.be/L-crRQLn_p0
                    text: |-
                        Why Lead Poisoning Is a Danger to Your Child's Health |
                        UNICEF
                    type: video
        -
            requirement: d
            text: |-
                For all 10 diseases from 1(c), explain the type or form of the
                disease (viral, bacterial, environmental, toxin), any possible
                vectors for transmission, ways to help prevent exposure or the
                spread of infection, and available treatments.
            resources:
                -
                    href: https://youtu.be/uNc99BEaJLs
                    text: How West Nile Virus Is Transmitted
                    type: video
                -
                    href: https://youtu.be/rI9ysEaJzVs
                    text: What Is Botulism?
                    type: video
                -
                    href: https://youtu.be/WSZEcpti2i0
                    text: Flu Virus 101
                    type: video
                -
                    href: https://www.cdc.gov/copd/about/index.html
                    text: About COPD or Emphysema
                    type: website
                -
                    href: https://www.cdc.gov/meningitis/about/index.html
                    text: Meningitis
                    type: website
                -
                    href: https://www.cdc.gov/lead-prevention/about/index.html
                    text: Lead Poisoning
                    type: website
-
    requirement: 2
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: Explain the meaning of <em>immunization.</em>
            resources:
                -
                    href: https://youtu.be/4SKmAlQtAj8
                    text: 'Vaccines 101: How Vaccines Work'
                    type: video
                -
                    href: https://youtu.be/z0kfdZ8o_j4
                    text: How mRNA Vaccines Actually Work | Inside the Vaccine
                    type: video
        -
            requirement: b
            text: |-
                Name eight diseases against which a young child should be
                immunized, two diseases against which everyone should be
                reimmunized periodically, and one immunization everyone should
                receive annually.
            resources:
                -
                    href: https://youtu.be/zaXVO4hHld8
                    text: What You Need To Know About Childhood Immunizations
                    type: podcast
                -
                    href: https://youtu.be/1yf7uEnEU6o
                    text: |-
                        Vaccines for Children Program: 30 Years of Protecting
                        Children
                    type: video
        -
            requirement: c
            text: |-
                Using the list of diseases and conditions in requirement 1,
                discuss with your counselor those which currently have no
                immunization available.
-
    requirement: 3
    text: |-
        Discuss the importance of safe drinking water in terms of the spread of
        disease. Then, demonstrate two ways for making water safe to drink that
        can be used while at camp. In your demonstration, explain how dishes and
        utensils should be washed, dried, and kept sanitary at home and in camp.
    resources:
        -
            href: https://youtu.be/GlTdIRxpxAQ
            text: |-
                Waterborne Diseases | Waterborne Pathogens | Public Health and
                Water Safety | Prevention &amp; Control
            type: video
        -
            href: https://youtu.be/DIZz3iiZ2TY
            text: The Best Way to Filter Water While Backpacking
            type: video
        -
            href: https://youtu.be/4tNLdcjBlQc
            text: How to Wash Dishes at Camp
            type: video
-
    requirement: 4
    text: |-
        Explain what a vector is and how insects and rodents can be controlled
        in your home, in your community, and at camp. Tell why this is
        important. In your discussion, explain which vectors can be easily
        controlled by individuals and which ones require long-term, collective
        action.
    resources:
        -
            href: https://youtu.be/0xSUITkRvbA
            text: WHO Vector Borne Disease Animation
            type: video
-
    requirement: 5
    text: |-
        With your parent or guardian's and counselor's approval, do ONE of the
        following:
    children:
        -
            requirement: a
            text: |-
                Visit a municipal wastewater treatment facility or a solid-waste
                management operation in your community.
            children:
                -
                    requirement: 1
                    text: |-
                        Describe how the facility safely treats and disposes of
                        sewage or solid waste.
                -
                    requirement: 2
                    text: |-
                        Discuss your visit and what you learned with your
                        counselor.
                -
                    requirement: 3
                    text: |-
                        Describe how sewage and solid waste should be disposed
                        of under wilderness camping conditions.
        -
            requirement: b
            text: |-
                Visit a food service facility, such as a restaurant or school
                cafeteria.
            children:
                -
                    requirement: 1
                    text: |-
                        Observe food preparation, handling, and storage. Learn
                        how the facility keeps food from becoming contaminated.
                -
                    requirement: 2
                    text: |-
                        Find out what conditions allow microorganisms to
                        multiply in food, what can be done to help prevent them
                        from growing and spreading, and how to kill them.
                    resources:
                        -
                            href: https://youtu.be/_8s2FsT9VYY
                            text: 'Food Safety: Meet Bacteria'
                            type: video
                -
                    requirement: 3
                    text: |-
                        Discuss the importance of using a thermometer to check
                        food temperatures.
                    resources:
                        -
                            href: https://youtu.be/-2KkV2yFiN0
                            text: |-
                                The Importance of Cooking to a Safe Internal
                                Temperature and How To Use a Food Thermometer
                            type: video
                -
                    requirement: 4
                    text: |-
                        Discuss your visit and what you learned with your
                        counselor.
-
    requirement: 6
    text: 'Do the following:'
    children:
        -
            requirement: a
