                    type: video
                -
                    href: https://youtu.be/5jfmzufa8qo
                    text: Noise Pollution Is Much Worse for You Than You Think
                    type: video
        -
            requirement: b
            text: |-
                Describe health dangers from tobacco use and alcohol and drug
                abuse.
            resources:
                -
                    href: https://youtu.be/wQl_4kcE5nw
                    text: |-
                        Teen Substance Use &amp; Abuse (Alcohol, Tobacco,
                        Vaping, Marijuana, and More)
                    type: video
                -
                    href: https://youtu.be/9dZS_Rniak0
                    text: Electronic Cigarettes and Vaping
                    type: video
        -
            requirement: c
            text: |-
                Describe the health dangers from abusing illegal and
                prescription drugs.
            resources:
                -
                    href: https://youtu.be/b6Dte96WdqM
                    text: |-
                        Drug Abuse, Causes, Signs and Symptoms, Diagnosis and
                        Treatment
                    type: video
-
    requirement: 7
    text: |-
        With your parent or guardian's and counselor's approval, do the
        following:
    children:
        -
            requirement: a
            text: Do ONE of the following
            children:
                -
                    requirement: 1
                    text: |-
                        Visit your city, county, state or federal public health
                        agency.
                    resources:
                        -
                            href: >-
                                https://www.cdc.gov/public-health-gateway/php/communications-resources/health-department-directories.html
                            text: Find Your Health Department
                            type: website
                -
                    requirement: 2
                    text: |-
                        Familiarize yourself with your city, county, state, or a
                        federal health agency's website.
        -
            requirement: b
            text: 'After completing either 7(a) do the following:'
            children:
                -
                    requirement: 1
                    text: |-
                        Compare the four leading causes of mortality (death) in
                        your community for any of the past five years with the
                        four leading causes of disease in your community.
                        Explain how the public health agency you visited is
                        trying to reduce the mortality and morbidity rates of
                        these leading causes of illness and death.
                    resources:
                        -
                            href: https://www.cdc.gov/nchs/products/nvsr.htm
                            text: National Vital Statistics System
                            type: website
                -
                    requirement: 2
                    text: |-
                        Explain the role of your health agency as it relates to
                        the outbreak of diseases.
                    resources:
                        -
                            href: https://youtu.be/zN58Uj1pxg4
                            text: How Does Public Health Tackle Outbreaks?
                            type: video
                -
                    requirement: 3
                    text: |-
                        Discuss the kinds of public assistance the agency is
                        able to provide in case of disasters such as floods,
                        storms, tornadoes, earthquakes, and other acts of
                        destruction. Your discussion can include the cleanup
                        necessary after the disaster.
                    resources:
                        -
                            href: https://youtu.be/Ml-bLyLE-_A
                            text: FEMA's Role in Disaster Relief
                            type: video
-
    requirement: 8
    text: |-
        Pick a profession in the public health sector that interests you. Find
        out the education, training, and experience required to work in this
        profession. Discuss what you learn with your counselor.
    resources:
        -
            href: https://youtu.be/FvN1rfxYKIo
            text: |-
                Career in Public Health| Everything You Need to Know Public
                Health Careers| Healthcare Management
            type: video
        -
            href: https://youtu.be/QpaOGYDMe38
            text: Public Health Careers at the CDC
            type: video
        -
            href: https://youtu.be/l-wciIH4FcQ
