# 5b missing period at end. Added one.
- requirement: 1
  text: |-
      Do the following:
  children:
      - requirement: a
        text: |-
            Explain and discuss with your counselor the following disabilities
            awareness terms: disability, accessibility, adaptation, accommodation,
            invisible disability, and person-first language.
        resources:
            - href: https://youtu.be/Z3faUGgMsNI
              text: We Need to Talk About Disability
              type: video
            - href: https://youtube.com/shorts/X-OecmJeQJ4
              text: Disability Isn't a Dirty Word
              type: video
            - href: https://www.nea.org/words-matter-disability-language-etiquette
              text: Words Matter! Disability Language Etiquette
              type: website
      - requirement: b
        text: |-
            Explain why proper disability etiquette is important, and how it may
            differ depending on the specific disability. Give three examples.
        resources:
            - href: https://youtu.be/iG3pQp6HoQM
              text: Disability Etiquette - Respectful Ways to Interact With People With Disabilities
              type: video
            - href: https://youtu.be/kLKObHtQmis
              text: Sportable Disability Etiquette
              type: video
            - href: https://youtu.be/bb6uPDwclek
              text: Disability Sensitivity
              type: video
            - href: https://youtu.be/kNMJaXuFuWQ
              text: Not Special Needs | March 21 - World Down Syndrome Day
              type: video
- requirement: 2
  text: |-
      Visit an agency that works with people with physical, mental, emotional, or
      educational disabilities. Collect and read information about the agency's
      activities. Learn about opportunities its members have for training,
      employment, and education. Discuss what you have learned with your
      counselor.
  resources:
      - href: https://www.tiktok.com/@mychalslearningplace/video/7536333109688569118
        text: Mychal's Learning Place
        type: video
      - href: https://youtu.be/7h5oyiKc-B0
        text: In Our Own Voice
        type: video
      - href: https://ucp.org/from-concept-to-crag-students-design-adaptive-sports-equipment-to-help-classmate-climb/
        text: 'From Concept to Crag: Students Design Adaptive Sports Equipment to Help Classmate Climb'
        type: website
- requirement: 3
  text: |-
      Do TWO of the following:
  children:
      - requirement: a
        text: |-
            Talk with a Scout who has a disability and learn about the Scout's
            experiences taking part in Scouting activities and earning different
            merit badges. Discuss what you have learned with your counselor.
        resources:
            - href: https://youtu.be/SvT9gWLe3ds
              text: 12-Year-Old Boy Overcomes Disability to Pursue Sports, Adventures
              type: video
            - href: https://youtu.be/AQWBun-1KB0
              text: 'Philmont Scout Ranch: Zia Adaptive Trek'
              type: video
      - requirement: b
        text: |-
            Talk with an individual who has a disability and learn about this
            person's experiences and the activities in which this person likes to
            participate. Discuss what you have learned with your counselor.
        resources:
            - href: https://youtu.be/Okb35sk4KEA
              text: We Asked 5 People With Disability Some Questions Before International Day of People With Disability
              type: video
            - href: https://youtu.be/hnKim3S_Pvo
              text: Kids Ask Questions About Disability
              type: video
      - requirement: c
        text: |-
            Learn how people with disabilities take part in a particular adaptive
            sport or recreational activity. Discuss what you have learned with your
            counselor.
        resources:
            - href: https://youtu.be/TEC0iEMYs5M
              text: Alison's Story
              type: video
            - href: https://youtu.be/3inIaMOGoXQ
              text: International Day of Persons with Disabilities | Paralympic Games
              type: video
            - href: https://youtu.be/L9m84Jc9GX0
              text: THIS is Special Olympics!
              type: video
      - requirement: d
        text: |-
            Learn about independent living aids such as service animals, canes, and
            augmentative communication devices such as captioned telephones and
            videophones. Discuss with your counselor how people use such aids.
        resources:
            - href: https://www.youtube.com/shorts/EnYivEfJZAg
              text: Walking a Route with my Guide Dog
              type: video
            - href: https://youtube.com/shorts/JOyjBWizTU0
              text: "Disability Isn't One-Size-Fits-All: My Mobility Aid Toolkit"
              type: video
            - href: https://youtu.be/Lqsik6NM5HI
              text: How I Navigate as a Blind Person - 5 Tools I Use to Travel Safely
              type: video
            - href: https://www.ada.gov/topics/service-animals/
              text: Service Animals
              type: website
            - href: https://youtu.be/ez0x66P97GU
              text: Bridging Apps
              type: video
      - requirement: e
        text: |-
            Plan or participate in an activity that helps others understand what a
            person with a visible or invisible disability experiences. Discuss what
            you have learned with your counselor.
        resources:
            - href: https://craft.nationaldb.org/OHOA/Module-5/SimulationInstructions_a.pdf
              text: Vision Loss Simulation Instructions
              type: pdf
            - href: https://youtube.com/shorts/gjp90li7k50
              text: Eye Disease Vision Simulator
              type: video
            - href: https://youtu.be/Ezv85LMFx2E
              text: Amazing Things Happen!
              type: video
- requirement: 4
  text: |-
      Do ONE of the following options:
  children:
      - text: |-
            <strong>Option A—Access.</strong>. Visit TWO of the following locations and
            take notes about the accessibility to people with disabilities. In your
            notes, give examples of five things that could be done to improve upon
            the site and five things about the site that make it friendly to people
            with disabilities. Discuss your observations with your counselor.
        children:
            - requirement: 1
              text: |-
                  Your school
            - requirement: 2
              text: |-
                  Your place of worship
            - requirement: 3
              text: |-
                  A Scouting event or campsite
            - requirement: 4
              text: |-
                  A public exhibit or attraction (such as a theater, museum, or park)
        resources:
            - href: https://youtu.be/Cok1f-_3ydE
              text: NYC Students With Disabilities Speaking About Accessible Schools
              type: video
            - href: https://www.scouting.org/resources/disabilities-awareness/
              text: Special Needs Prepared Camps
              type: website
      - text: |-
            <strong>Option B—Accommodation.</strong>. Visit TWO of the following locations and
            take notes while observing features and methods that are used to
            accommodate people with invisible disabilities. While there, ask staff
            members to explain any accommodation features that may not be obvious.
            Note anything you think could be done to better accommodate people who
            have invisible disabilities. Discuss your observations with your
            counselor.
        children:
            - requirement: 1
              text: |-
                  Your school
            - requirement: 2
              text: |-
                  Your place of worship
            - requirement: 3
              text: |-
                  A Scouting event or campsite
            - requirement: 4
              text: |-
                  A public exhibit or attraction (such as a theater, museum, or park)
        resources:
            - href: https://youtu.be/qT9LE79Daps
              text: Accommodations and Difficulties.
              type: video
- requirement: 5
  text: |-
      Explain what advocacy is. Do ONE of the following:
  children:
      - requirement: a
        text: |-
            Present a counselor-approved disabilities awareness program to a Cub
            Scout pack or other group. During your presentation, explain and use
            person-first language.
        resources:
            - href: https://youtu.be/-uS56z1O46U
              text: 'The View From Here: My Path to Disability Advocacy | Liam Doyle'
              type: video
      - requirement: b
        text: |-
            Find out about disabilities awareness education programs in your school
            or school system, or contact a disability advocacy agency. Volunteer
            with a program or agency for eight hours
        resources:
            - href: https://youtube.com/shorts/huwy396lx2c
              text: Here's How You Can Support People With Disabilities
              type: video
      - requirement: c
        text: |-
            Using resources such as disability advocacy agencies, government
            agencies, the internet (with your parent or guardian's permission), and
            news magazines, learn about myths and misconceptions that influence the
            general public's understanding of people with disabilities. List 10
            myths and misconceptions about people with disabilities and learn the
            facts about each myth. Share your list with your counselor, then use it
            to make a presentation to a Cub Scout pack or other group.
        resources:
            - href: http://es.easterseals.com/site/PageServer/?pagename=ntl_myths_facts
              text: Myths and Facts About People with Disabilities
              type: website
- requirement: 6
  text: |-
      Make a commitment to your counselor describing what you will do to show a
      positive attitude about and toward people with disabilities and to
      encourage positive attitudes among others. Discuss how your awareness has
      changed as a result of what you have learned.
  resources:
      - href: https://www.apa.org/ed/precollege/psychology-teacher-network/introductory-psychology/changing-attitudes-towards-disability
        text: Changing Attitudes Towards Disability
        type: website
      - href: https://youtu.be/r9Y6XMko9Jc
        text: Understanding Disabilities
        type: video
      - href: https://www.silkandsonder.com/blogs/news/keeping-commitments
        text: 7 Ways to Actually Keep the Commitments You Make to Yourself
        type: website
- requirement: 7
  text: |-
      Name five professions that provide services to people with disabilities.
      Pick one that interests you and find out the education, training, and
      experience required for this profession. Discuss what you learn with your
      counselor, and tell why this profession interests you.
  resources:
      - href: https://bouve.northeastern.edu/news/10-rewarding-careers-for-those-who-want-to-work-with-children-with-special-needs/
        text: 10 Rewarding Careers for Those Who Want to Work With Children With Special Needs
        type: website
      - href: https://www.publicservicedegrees.org/careers/people-with-disabilities/
        text: Discover the Best Careers for Helping People With Disabilities
        type: website
