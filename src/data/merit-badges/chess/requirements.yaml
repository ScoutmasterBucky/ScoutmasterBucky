-
    requirement: 1
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: Discuss with your counselor the history of the game of chess.
            resources:
                -
                    href: https://youtu.be/YeB-1F-UKO0
                    text: A Brief History of Chess
                    type: video
        -
            requirement: b
            text: |-
                Research a famous chess player and what accomplishments made him
                or her famous. Discuss with your counselor.
            resources:
                -
                    href: https://youtu.be/TW0yJYab5YA
                    text: Story of World Chess Champion Magnus Carlsen!
                    type: video
                -
                    href: https://youtu.be/1DgosX9_T2U
                    text: The 'Queen of Chess' Who Defeated Kasparov
                    type: video
                -
                    href: https://youtu.be/GPuazOwq0aw
                    text: Chess Champ Bobby Fischer on 60 Minutes
                    type: video
-
    requirement: 2
    text: 'Discuss with your counselor the following:'
    children:
        -
            requirement: a
            text: Why chess is considered a game of planning and strategy.
            resources:
                -
                    href: https://youtu.be/4CVIO3Ey2_Y
                    text: Why Every Strategist Should Learn Chess
                    type: video
        -
            requirement: b
            text: |-
                The benefits of playing chess, including developing critical
                thinking skills, concentration skills, and decision-making
                skills, and how these skills can help you in other areas of your
                life.
            resources:
                -
                    href: https://youtu.be/fyzWEXakASs
                    text: 14 Shocking Benefits of Playing Chess
                    type: video
        -
            requirement: c
            text: Sportsmanship and chess etiquette
            resources:
                -
                    href: https://youtu.be/C5LNdtayoKI
                    text: The Morals of Chess by Benjamin Franklin
                    type: video
                -
                    href: https://youtu.be/71wh24-AYZk
                    text: Chess Etiquette
                    type: video
                -
                    href: >-
                        https://www.tiktok.com/@norwaychess/video/7524741028805430550
                    text: Understanding Resignation and Respect in Chess
                    type: video
-
    requirement: 3
    text: |-
        Demonstrate to your counselor that you know each of the following. Then,
        using Scouting EDGE to teach someone who does not know how to play
        chess:
    resources:
        -
            href: >-
                https://www.scouting.org/wp-content/uploads/2019/01/Teaching-Edge-Method.pdf
            text: The EDGE Method of Teaching
            type: pdf
    children:
        -
            requirement: a
            text: The name of each chess piece
            resources:
                -
                    href: https://youtu.be/f8LOIdpLWIk
                    text: 'Chess 101: Name the Pieces'
                    type: video
        -
            requirement: b
            text: How to set up a chessboard
            resources:
                -
                    href: https://youtu.be/NPyuNpYfrDc
                    text: How to Set Up the Chess Board
                    type: video
        -
            requirement: c
            text: |-
                How each chess piece moves and captures, including: four rules
                of castling, en passant captures, pawn promotion, check, ways to
                get out of check, and checkmate.
            resources:
                -
                    href: https://youtu.be/RpbQjiJ5ops
                    text: How to Move the Chess Pieces?
                    type: video
                -
                    href: https://youtu.be/1Ut3Zw61v9M
                    text: 'Chess: Castling and En Passant'
                    type: video
                -
                    href: https://youtu.be/C6bqDvAZVTk
                    text: Check! | Chess Term
                    type: video
                -
                    href: https://youtu.be/Svswkqslr9I
                    text: Checkmate | Chess Terms
                    type: video
        -
            requirement: d
            text: The five ways a game can end in a draw
            resources:
                -
                    href: https://youtu.be/rjHCE3UQY8w
                    text: Draw and Stalemate in Chess Explained
                    type: video
-
    requirement: 4
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: |-
                Demonstrate scorekeeping using the algebraic system of chess
                notation.
            resources:
                -
                    href: https://youtu.be/mADPCw-rhPI
                    text: |-
                        Learn How To Record Your Chess Games, Read Books and
                        Communicate
                    type: video
        -
            requirement: b
            text: |-
                Discuss the differences between the opening, the middle game,
                and the endgame.
            resources:
                -
                    href: https://youtu.be/OYevDf-oCt0
                    text: What Is a Chess Opening?
                    type: video
                -
                    href: https://youtu.be/mkOntF0rmSg
                    text: The Dreaded Middlegame
                    type: video
                -
                    href: https://youtu.be/UL8Jo4lc1Ms
                    text: What Is the Endgame in Chess?
                    type: video
                -
                    href: https://youtu.be/cheyUEMgWDg
                    text: |-
                        A Beginner's Guide to Chess: Opening, Middlegame, and
                        Endgame Principles
                    type: video
        -
            requirement: c
            text: |-
                Explain four opening principles. Demonstrate for your counselor
                the first five moves of the following openings: Ruy Lopez,
                French Defense, Queen's Gambit Declined, Sicilian Defense.
            resources:
                -
                    href: https://youtu.be/nx2HKfOHRBM
                    text: 'The Ruy Lopez: The Opening Every Chess Player Must Know'
                    type: video
                -
                    href: https://youtu.be/vOw5BQYCfWA
                    text: |-
                        The French Defense Chess Opening Explained in 4 Minutes
                        by a Chess Master!
                    type: video
                -
                    href: https://youtu.be/ZEQWwuAa2-o
                    text: Learn the Queen's Gambit Declined
                    type: video
                -
                    href: https://youtu.be/qzydxPgPKzs
                    text: 'Chess Openings: Sicilian Defense'
                    type: video
        -
            requirement: d
            text: |-
                On a chessboard, demonstrate Scholar's Mate, Fool's Mate, Légal
                Mate, Fried Liver Attack, and Noah's Ark Trap.
            resources:
                -
                    href: https://youtu.be/jrUalgPaiPQ
                    text: Fools Mate Scholar's Mate and a Nice Tactic
                    type: video
                -
                    href: https://youtu.be/iEu3xT--f_k
                    text: |-
                        Legal's Mate Trap: Chess Opening Trick To Fool Your
                        Opponent &amp; Win Fast
                    type: video
                -
                    href: https://youtu.be/EmYD8v81BY8
                    text: The Fried Liver Attack in 1 Minute
                    type: video
                -
                    href: https://youtu.be/KskXvXxlkCM
                    text: 'Chess Trap: Noah''s Ark Trap—Guy Lopez'
                    type: video
-
    requirement: 5
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: |-
                Explain four of the following elements of chess strategy:
                exploiting weaknesses, force, king safety, pawn structure,
                space, tempo, and clock management.
            resources:
                -
                    href: https://youtu.be/kw5XkhM-DDI
                    text: How To Identify and Exploit Weaknesses
                    type: video
                -
                    href: https://youtu.be/6T-Dt1JwANM
                    text: Only One Move Wins! (Understanding Forcing Moves)
                    type: video
                -
                    href: https://youtu.be/4JzL_MWhK8o
                    text: The Top 5 Priorities for Any Chess Opening!
                    type: video
                -
                    href: https://youtu.be/iPrSVMKHSgo
                    text: Pawn Structures in Chess
                    type: video
        -
            requirement: b
            text: |-
                Explain any five of these chess tactics: clearance sacrifice,
                decoy, discovered attack, double check, double attack, fork,
                interposing, overloading, overprotecting, pin, skewer, remove
                the defender, zwischenzug, and zugzwang.
            resources:
                -
                    href: https://youtu.be/yv7_0svOlQU
                    text: |-
                        Everything You Need to Know About Chess: Tactics &amp;
                        Strategy!
                    type: video
                -
                    href: https://youtu.be/vdS-uJoHS6g
                    text: Every Chess Tactic Explained in 4 Minutes
                    type: video
                -
                    href: https://youtu.be/9cwNsRA3txY
                    text: Decoy vs Deflection
                    type: video
                -
                    href: https://youtu.be/Yil3YavlOCo
                    text: Interposing
                    type: video
                -
                    href: https://youtu.be/_evjct0p6-c
                    text: Zugzwang
                    type: video
        -
            requirement: c
            text: |-
                Set up a chessboard as follows and with White to move first,
                demonstrate how to force checkmate on the Black king:
            children:
                -
                    requirement: 1
                    text: |-
                        White on <i>e1</i>, the White rooks on <i>a1</i> and
                        <i>h1</i>, and the Black king on <i>e5</i>.
                -
                    requirement: 2
                    text: |-
                        White King on <i>e1</i>, White queen on <i>d1</i>, Black
                        king on <i>e5</i>.
                -
                    requirement: 3
                    text: |-
                        White king on <i>e1</i>, White rook on <i>a1</i>, Black
                        king on <i>e5</i>.
        -
            requirement: d
            text: |-
                With White king on <i>d4</i>, White pawn on <i>e3</i>, and Black
                king on <i>e6</i>:
            children:
                -
                    requirement: 1
                    text: |-
                        With White to move, demonstrate how White can force
                        Black to allow his pawn to reach the last rank and be
                        promoted to a queen.
                -
                    requirement: 2
                    text: |-
                        With Black to move, demonstrate how Black can force a
                        draw.
        -
            requirement: e
            text: |-
                Set up and solve five direct-mate problems provided by your
                counselor.
-
    requirement: 6
    text: |-
        Explain to your counselor how chess tournaments are run, including the
        Swiss system tournament format, the round robin tournament format,
        pairings for each round, time controls, touch move, scoring, and chess
        ratings.
    resources:
        -
            href: https://youtu.be/b8oV2dj4dgU
            text: Why Swiss-Style Tournaments Are the BEST Tournaments!
            type: video
        -
            href: https://youtu.be/5nTkIEmJE2o
            text: How To Use a Chess Clock
            type: video
        -
            href: https://youtu.be/rKYsPvnm4eU
            text: Round Robin Tournament
            type: video
        -
            href: https://youtu.be/NPM8py0xHi8
            text: 'How To Play: Touch Moves'
            type: video
        -
            href: https://youtu.be/86Is6YemsyA
            text: Chess Piece Values—How Much Is Each Chess Piece Worth?
            type: video
        -
            href: https://youtu.be/o8AWrRk5su0
            text: How the Elo Rating System Works in Chess
            type: video
        -
            href: https://youtu.be/AsYfbmp0To0
            text: The Elo Rating System for Math Nerds
            type: video
-
    requirement: 7
    text: 'Do ONE of the following:'
    children:
        -
            requirement: a
            text: |-
                Play at least three games of chess with other Scouts and/or your
                counselor. Replay the games from your score sheets and discuss
                with your counselor how you might have played each game
                differently.
        -
            requirement: b
            text: |-
                Play in a scholastic (youth) chess tournament and use your score
                sheets from that tournament to replay your games with your
                counselor. Discuss with your counselor how you might have played
                each game differently.
        -
            requirement: c
            text: |-
                Organize and run a chess tournament with at least four players,
                plus you. Have each competitor play at least two games.
            resources:
                -
                    href: >-
                        https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Chess/chess_tournament_chart_4_players.pdf
                    text: Example Tournament Chart
                    type: pdf
