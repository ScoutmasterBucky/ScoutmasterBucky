# 4* biking sections ends with "and ride ready" but could be improved with "and ride safely"
# 4c1b and 4d1b uses "guidelines" while 4a1b uses "program." Consider making them consistent.
# 4c1c is misplaced after 4c2c
# 4 is very redundant. Consider consolidating, eg "Biking (for triathlon, duathlon, aquabike):"
- requirement: 1
  text: |-
      Do the following:
  children:
      - requirement: a
        text: |-
            Explain to your counselor the most likely hazards you may encounter
            during multisport activities and what you should do to anticipate,
            prevent, mitigate, and respond to these hazards.
        resources:
            - href: https://youtu.be/LckcSB-O8UI
              text: How To Avoid Injury When Triathlon Training
              type: video
      - requirement: b
        text: |-
            Show that you know first aid for injuries or illnesses that could occur
            while participating in multisport events, including abrasions,
            blisters, concussions, contusions, dehydration, hypothermia,
            overheating, sprains, and strains.
        resources:
            - href: https://youtu.be/TZqDBgiEfL8
              text: R.I.C.E. Treatment for Sprains and Strains
              type: video
            - href: https://youtu.be/5hSpMdlXZw0
              text: Treating Heat Exhaustion and Heat Stroke
              type: video
            - href: https://youtu.be/H6xlECl9ZBg
              text: How To Avoid and Treat Foot Blisters
              type: video
- requirement: 2
  text: |-
      Do the following:
  children:
      - requirement: a
        text: |-
            Discuss the importance of having a physical examination each year.
            Discuss why overall health, immunizations, medications, allergies, and
            medical history are covered during an examination. Tell your counselor
            when you last underwent a physical examination.
        resources:
            - href: https://www.scouting.org/health-and-safety/ahmr/
              text: Scouting America Annual Health and Medical Record
              type: website
      - requirement: b
        text: |-
            Explain the importance of maintaining good health habits, especially
            during training, and how the use of tobacco products, alcohol, and
            other harmful substances can negatively affect your health and your
            performance in athletic activities.
        resources:
            - href: https://youtu.be/hCC1dgmwO_4
              text: 7 Reasons To Be Smoke-Free
              type: video
            - href: https://youtu.be/zXL9k-rJvIo
              text: Vaping Impacts Your Athletic Ability
              type: video
            - href: https://youtu.be/YbBIl2KcVIQ
              text: 3 Things To Know About Drinking Alcohol
              type: video
      - requirement: c
        text: |-
            Define a healthy diet and explain the importance of maintaining a
            healthy diet.
        resources:
            - href: https://youtu.be/zMposrWrPC0
              text: Nutrition Fuels Training!
              type: video
- requirement: 3
  text: |-
      Do the following:
  children:
      - requirement: a
        text: |-
            Discuss with your counselor your level of familiarity and experience
            with the multisport events (swimming, biking, and running) and the
            order and distance of each sports segment.
        resources:
            - href: https://youtu.be/qmW51zdyduc
              text: Empowering Youth Through Multisport
              type: video
      - requirement: b
        text: |-
            Explain to your counselor which multisport event (swimming, biking, or
            running) you feel is your strongest and which you could improve upon
            the most.
        resources:
            - href: https://www.usatriathlon.org/multisport/disciplines%20
              text: Multisport Disciplines
              type: website
      - requirement: c
        text: |-
            Identify the required equipment for each of the three common multisport
            events (swimming, biking, and running).
        resources:
            - href: https://assets.contentstack.io/v3/assets/blteb7d012fc7ebef7f/blteec8160c769bfc2e/648b54b80f2d9bd22bed580b/USAT_Youth_Guide_2019.pdf
              text: USA Triathlon Youth Guide
              type: pdf
            - href: https://youtu.be/kgbz_3B9dNA
              text: Triathlon Equipment You Really Need
              type: video
      - requirement: d
        text: |-
            Based on your interests, experience, and discussion with your
            counselor, select ONE of the following multisport formats to concentrate
            on for the remaining requirements: triathlon (swimming, biking, and
            running), duathlon (biking and running), aquathlon (swimming and
            running), or aquabike (swimming and biking).
- requirement: 4
  text: |-
      Complete ALL of the following for the multisport format you
      selected in requirement 3(d):
  children:
      - text: |-
            <strong>Option A—Triathlon.</strong>
        children:
            - requirement: 1
              text: |-
                  <b>Swimming</b>
              children:
                  - requirement: a
                    text: |-
                        Before doing requirements 5 through 8, earn the <a
                        href="/merit-badges/swimming/">Swimming merit badge</a>.
                    resources:
                        - href: https://www.scouting.org/merit-badges/swimming/
                          text: Swimming Merit Badge
                          type: website
                  - requirement: b
                    text: |-
                        Explain the components of the Scouting America Safe Swim Defense
                        program and how you will ensure they are in place when you swim.
                  - requirement: c
                    text: |-
                        Explain to your counselor the difference between a pool swim and an
                        open water swim, including at what water temperature it is
                        appropriate to wear a wet suit.
                    resources:
                        - href: https://youtu.be/0VN9xikjs2E
                          text: 4 Things To Know Before Your First Open Water Swim
                          type: video
                        - href: https://youtu.be/fLdw5NBOf6g
                          text: The Dangers of Cold Water Immersion
                          type: video
                        - href: https://youtu.be/6B05sU20-Jw
                          text: How Do Wetsuits Keep You Warm?
                          type: video
            - requirement: 2
              text: |-
                  <b>Biking</b>
              children:
                  - requirement: a
                    text: |-
                        Explain to your counselor how to ride predictably, be conspicuous,
                        think ahead, and ride ready.
                    resources:
                        - href: https://youtu.be/v_hRsNHlq8M?
                          text: Bike Safety | Hand Signals
                          type: video
                  - requirement: b
                    text: |-
                        Discuss what should be checked regularly to make sure the bicycle
                        is safe to ride.
                    resources:
                        - href: https://youtu.be/EHLq5Em-EPI
                          text: 'Bike Tips: Preflight Checklist for a Safe Ride'
                          type: video
                  - requirement: c
                    text: |-
                        Explain the importance of wearing a properly sized and fitted
                        helmet while cycling and of wearing the right clothing for the
                        weather.
                    resources:
                        - href: https://youtu.be/hLlXswx0VvQ
                          text: Fitting a Bike Helmet
                          type: video
            - requirement: 3
              text: |-
                  <strong>Running</strong>
              children:
                  - requirement: a
                    text: |-
                        Demonstrate a proper run warmup and cool-down. Explain to your
                        counselor the importance of maintaining healthy habits, including
                        hydration, nutrition, injury prevention, and rest.
                    resources:
                        - href: https://youtu.be/PkF3jjFZc0s
                          text: Warm-Up for Running
                          type: video
                        - href: https://youtu.be/MpCO8Y7iPYk
                          text: Hydration for Running
                          type: video
                  - requirement: b
                    text: |-
                        Learn and state the basic rules of the road for runners.
                    resources:
                        - href: https://youtu.be/I6aDhB_uC8A
                          text: Safety Tips for Running
                          type: video
                  - requirement: c
                    text: |-
                        Demonstrate important running drills, including high knees, butt
                        kicks, lunges, inchworms, and soldier kicks.
                    resources:
                        - href: https://youtu.be/tY2bLt7roOQ
                          text: High Knees and Butt Kicks
                          type: video
                        - href: https://youtu.be/amElt61OHgM
                          text: Lunges
                          type: video
                        - href: https://youtu.be/pv_8CdDPAAk
                          text: Inchworms
                          type: video
                        - href: https://youtu.be/9cacAKZESf0
                          text: Soldier Kicks
                          type: video
