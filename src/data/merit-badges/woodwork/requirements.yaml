- requirement: 1
  text: |-
      Do the following:
  children:
      - requirement: a
        text: |-
            Explain to your counselor the most likely hazards you may encounter
            while participating in woodwork activities, and what you should do to
            anticipate, help prevent, mitigate, and respond to these hazards.
            Explain what precautions you should take to safely use your tools.
        resources:
            - href: https://youtu.be/GQkUbdE3VS8
              text: Safety in Woodworking | Woodworking
              type: video
      - requirement: b
        text: |-
            Show that you know first aid for injuries that could occur while
            woodworking, including splinters, scratches, cuts, severe bleeding, and
            shock. Tell what precautions must be taken to help prevent loss of
            eyesight or hearing, and explain why and when it is necessary to use a
            dust mask.
        resources:
            - href: https://youtu.be/A0EmfREhgRw
              text: The Emergency First Aid Kit for Woodworkers Need!
              type: video
      - requirement: c
        text: |-
            Earn the <a href="/other-awards/totin-chip/">Totin' Chip</a> recognition.
- requirement: 2
  text: |-
      Do the following:
  children:
      - requirement: a
        text: |-
            Describe how timber is grown, harvested, and milled. Tell how lumber is
            cured, seasoned, graded, and sized.
        resources:
            - href: https://youtu.be/hOO37pcFg5I
              text: How Trees Are Made Into Lumber
              type: video
      - requirement: b
        text: |-
            Collect and label blocks of six kinds of wood useful in woodworking.
            Describe the chief qualities of each. Give the best uses of each.
- requirement: 3
  text: |-
      Do the following:
  children:
      - requirement: a
        text: |-
            Show the proper care, use, and storage of all working tools and
            equipment that you own or use at home or school.
        resources:
            - href: https://deltamachinery.com/tool-maintenance-101-tips-for-keepingyour-woodworking-tools-in-top-condition/
              text: 'Tool Maintenance 101: Tips for KeepingYour Woodworking Tools in Top Condition'
              type: website
      - requirement: b
        text: |-
            Sharpen correctly the cutting edges of two different tools.
        resources:
            - href: https://youtu.be/2mJZH29bAHI
              text: Best Method for Sharpening Your Chisels and Plane Irons
              type: video
- requirement: 4
  text: |-
      Using a saw, plane, hammer, brace, and bit, make something useful of wood.
      Cut parts from lumber that you have squared and measured from working
      drawings.
  resources:
      - href: https://youtu.be/xV6ql13lfjw
        text: Build This Simple Wooden Tool Box - Hand Saw And A Hammer
        type: video
      - href: https://youtu.be/3WIjpz9Ut1c
        text: How to Make a Bench Hook
        type: video
- requirement: 5
  text: |-
      Create your own woodworking project. Begin by making working drawings, list
      the materials you will need to complete your project, and then build your
      project. Keep track of the time you spend and the cost of the materials.
- requirement: 6
  text: |-
      Do any TWO of the following:
  children:
      - requirement: a
        text: |-
            Make working drawings of a project needing beveled or rounded edges and
            build it.
        resources:
            - href: https://youtu.be/l06lCTcOgHQ
              text: Bevels- How to Make Beveled Panels on the Tablesaw
              type: video
            - href: https://youtu.be/XztV4yjfFaI
              text: Rounded Edges- How to Rout Round Corners
              type: video
      - requirement: b
        text: |-
            Make working drawings of a project needing curved or incised cuttings
            and build it.
        resources:
            - href: https://youtu.be/867ho1Pp12U
              text: Making Arcs &amp; Curves the Easy Way
              type: video
      - requirement: c
        text: |-
            Make working drawings of a project needing miter, dowel, or mortise and
            tenon joints and build it.
        resources:
            - href: https://youtu.be/h0ryuL0DuLE
              text: Mitered Mortise &amp; Tenon Joint
              type: video
      - requirement: d
        text: |-
            Make a cabinet, box, or something else with a door or lid fastened with
            inset hinges.
        resources:
            - href: https://youtu.be/Syv3JzRXld8
              text: The Special Wooden Box / Invisible Wooden Hinge - Using Basic Tools / Dovetail Joints
              type: video
            - href: https://youtu.be/TazBJ5MSMgc
              text: An Absurd Number of Wood Box Making Tips &amp; Tricks
              type: video
      - requirement: e
        text: |-
            Help make wooden toys for underprivileged children; OR help carry out a
            woodworking service project approved by your counselor for a charitable
            organization.
        resources:
            - href: https://youtu.be/IwLwNGAxSfg
              text: How to Make Wooden Toys for Kids | DIY | Great Home Ideas
              type: video
- requirement: 7
  text: |-
      Talk with a cabinetmaker or finish carpenter. Learn about training,
      apprenticeships, career opportunities, work conditions, work hours, pay
      rates, and union organization that woodworking experts have in your area.
  resources:
      - href: https://youtu.be/lPTR2xdIz9M
        text: 'A Day @ AWC : Careers in the Wood Industry'
        type: video
      - href: https://youtu.be/NBHhOMEs9Sk
        text: Kayleen McCabe - Her Career in Woodworking
        type: video
      - href: https://youtu.be/zCNgrOR8FEU?si=U9HEuwvA3fi3iqOn
        text: A Total Beginner's Guide to Woodworking
        type: video
