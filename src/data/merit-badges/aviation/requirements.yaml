-
    requirement: 1
    text: '<b>Aviation Basics and Mechanics of Flight.</b> Do the following:'
    children:
        -
            requirement: a
            text: |-
                Define "aircraft." Describe three kinds of aircraft today, and
                their typical uses.
            resources:
                -
                    href: https://youtu.be/QvfVX2TXeb0
                    text: Types of Aircraft
                    type: video
                -
                    href: https://youtu.be/pI8u8fQmtIo
                    text: Basics of How a Glider Works
                    type: video
        -
            requirement: b
            text: |-
                Provide a brief overview of the evolution of flight, and discuss
                three notable times in history important to aviation.
            resources:
                -
                    href: https://youtu.be/YDlk4Ky_ahs
                    text: The Wright Brothers, First Successful Airplane (1903)
                    type: video
                -
                    href: https://youtu.be/q_2AVyt9B_A
                    text: |-
                        The First Flight Around the World—U.S. Army Air Service
                        (1924)
                    type: video
                -
                    href: https://youtu.be/_R3fGL67mas
                    text: |-
                        First Solo Transatlantic Flight —Charles Lindbergh
                        (1927)
                    type: video
                -
                    href: https://youtu.be/y-itPeJOyzI
                    text: First Solo Transatlantic Flight—Amelia Earhart (1932)
                    type: video
                -
                    href: https://youtu.be/7O_iQ5LMGXI
                    text: First Commercial Jet Airliner—de Havilland Comet (1949)
                    type: video
                -
                    href: https://youtu.be/gH7MMJOOiUQ
                    text: First Commercial Supersonic Flight—The Concorde (1969)
                    type: video
                -
                    href: https://youtu.be/TunNolO9J4U
                    text: |-
                        First Flight Around the World Without Refueling—Rutan
                        Model 86 Voyager (1986)
                    type: video
                -
                    href: https://youtu.be/WDp1DFih-po
                    text: |-
                        FAA Approves Unmanned Aerial Vehicles (UAV's AKA Drones)
                        (2006)
                    type: video
        -
            requirement: c
            text: |-
                Explain the difference between a fixed wing and a rotary wing
                aircraft, and the benefits of each.
            resources:
                -
                    href: https://youtu.be/Qju0JTn3PvI
                    text: Airplane or Helicopter—Which Should You Choose?
                    type: video
        -
            requirement: d
            text: Explain the operation of piston, turbine, and jet engines.
            resources:
                -
                    href: https://youtu.be/5tN6eynMMNw
                    text: The Internal Combustion Engine
                    type: video
                -
                    href: https://youtu.be/kz5kv0RfeUc
                    text: How a Turbine Engine Works
                    type: video
                -
                    href: https://youtu.be/KjiUUJdPGX0
                    text: See a Jet Engine in Action!
                    type: video
        -
            requirement: e
            text: |-
                Using a model aircraft, describe the four forces that act on an
                aircraft in flight.
            resources:
                -
                    href: https://youtu.be/wFTHh-6jIT8
                    text: How Do Planes Fly?
                    type: video
        -
            requirement: f
            text: |-
                Explain how an airfoil generates lift, specifically noting
                Bernoulli's principle.
            resources:
                -
                    href: https://youtu.be/YrSUxgiwoFk
                    text: 'Bernoulli''s Principle: How Planes Fly'
                    type: video
        -
            requirement: g
            text: |-
                Identify and describe the aerodynamic control surfaces on the
                aircraft of your choice, and explain how they operate to control
                its attitude and direction of flight.
            resources:
                -
                    href: https://youtu.be/XxrdhJanotw
                    text: Aircraft Control Surfaces Explained
                    type: video
        -
            requirement: h
            text: |-
                Explain the purposes and functions of the various instruments
                found in a typical single-engine aircraft: attitude indicator,
                heading indicator, altimeter, airspeed indicator, turn and bank
                indicator, vertical speed indicator, compass, navigation,
                communication, and engine performance indicators.
            resources:
                -
                    href: https://youtu.be/NZn7Dd2jYFw
                    text: Cessna Cockpit Tour
                    type: video
                -
                    href: https://youtu.be/NLE9sDSRj-Y
                    text: |-
                        How To Control an Airplane: How Does a Pilot Control the
                        Plane?
                    type: video
-
    requirement: 2
    text: '<b>Principles of Flight.</b> Do ONE of the following:'
    children:
        -
            requirement: a
            text: |-
                Build a model FPG-9. Get others in your troop or patrol to make
                their own model, then organize a competition to test the
                precision of flight and landing of the models.
            resources:
                -
                    href: >-
                        https://www.gocivilairpatrol.com/media/cms/AEX_MARC_Activity_2_AMA_FPG9_Glider_A8316FDFF99FD.pdf
                    text: AMA FPG-9 Glider Instructions
                    type: pdf
                -
                    href: https://youtu.be/zU1DaUwPUhQ
                    text: AMA FPG-9 Glider
                    type: video
        -
            requirement: b
            text: |-
                Build a rubber-band driven balsa wood airplane. Fly the plane
                for 25 feet in a straight line, with a smooth landing.
            resources:
                -
                    href: https://youtu.be/rjuGw-oreyY
                    text: Balsa Wood Plane
                    type: video
        -
            requirement: c
            text: |-
                Build (or obtain) a fuel-driven or battery-powered electric
                model aircraft or drone. Obtain The Recreational UAS Safety Test
                (TRUST) certification, and fly the aircraft with a successful
                take-off and landing.
            resources:
                -
                    href: >-
                        https://www.faa.gov/uas/recreational_flyers/knowledge_test_updates
                    text: Learn
                    type: website
                -
                    href: >-
                        https://www.scouting.org/the-recreational-uas-safety-test/
                    text: Take the Test
                    type: website
-
    requirement: 3
    text: '<b>Flight Operations.</b> Do TWO of the following:'
    children:
        -
            requirement: a
            text: |-
                Using a flight simulator software package, set a course and fly
                the headings you have established with a successful take-off and
                landing.
            resources:
                -
                    href: >-
                        https://www.scouting.org/skills/merit-badges/digital-resource-guides/aviation/3-a/#elementor-action%3Aaction%3Dpopup%3Aopen%26settings%3DeyJpZCI6IjIzODg4NSIsInRvZ2dsZSI6ZmFsc2V9)
                    text: Microsoft Flight Simulator
                    type: website
        -
            requirement: b
            text: |-
                Under supervision, perform a preflight inspection of an
                aircraft.
            resources:
                -
                    href: https://youtu.be/4cwKZ0Q_Xug
                    text: How to Preflight a Cessna 172
                    type: video
        -
            requirement: c
            text: |-
                Observe and/or participate in an aircraft maintenance activity.
                Describe the maintenance schedule and requirements for an
                aircraft of your choice.
        -
            requirement: d
            text: |-
                Obtain and learn how to read an aeronautical chart. Measure a
                true course on the chart; correct it for magnetic variation,
                compass deviation, and wind drift to determine a navigational
                heading for an aircraft.
            resources:
                -
                    href: https://youtu.be/4Z-yGYn4w-A
                    text: How To Read an FAA Sectional Aeronautical Chart
                    type: video
        -
            requirement: e
            text: |-
                With your parent or guardian's permission, take a discovery
                flight in an aircraft. Record the date, place, type of aircraft,
                and duration of flight. Report on your impressions of the
                flight.
-
    requirement: 4
    text: '<b>Airport Operations.</b> Do ONE of the following:'
    children:
        -
            requirement: a
            text: |-
                Visit an airport. After the visit, report on how the facilities
                are used, how runways are numbered, and how runways are
                determined to be "active."
        -
            requirement: b
            text: |-
                Visit a Federal Aviation Administration facility: Airport
                Traffic Control Tower (ATCT), Terminal Radar Approach Control
                (TRACON), Air Route Traffic Control Center (ARTCC), or Flight
                Standards District Office (FSDO). Report on the operation and
                your impressions of the facility.
            resources:
                -
                    href: https://www.faa.gov/aircraft/air_cert/locate_office
                    text: FAA's Facility Locator
                    type: website
        -
            requirement: c
            text: |-
                Visit a military aviation facility. Learn how that facility
                supports defense and/or civilian activities. Report on the
                operation and your impressions of the facility.
            resources:
                -
                    href: https://installations.militaryonesource.mil/
                    text: Identify a Nearby Military Aviation Facility
                    type: website
        -
            requirement: d
            text: |-
                Visit an aviation museum or attend an air show. Report on your
                impressions of the museum or show, and what you learned from the
                experience.
            resources:
                -
                    href: https://affiliations.si.edu/
                    text: Smithsonian Affiliations
                    type: website
                -
                    href: https://www.airshowcenter.com/
                    text: Air Shows
                    type: website
                -
                    href: https://www.milavia.net/airshows/
                    text: Miltary Air Shows
                    type: website
                -
                    href: https://www.eaa.org/eaa/events
                    text: Recreational Aviation Events
                    type: website
                -
                    href: >-
                        https://whichmuseum.com/place/united-states-2682?q=aviation
                    text: Find a Museum
                    type: website
-
    requirement: 5
    text: |-
        <b>Personal &amp; Professional Aviation Opportunities.</b> Do the
        following:
    children:
        -
            requirement: a
            text: |-
                Explain the following: the student pilot, the recreational
                pilot, the remote pilot, and the private pilot certificates.
        -
            requirement: b
            text: Describe the benefits of the instrument rating.
            resources:
                -
                    href: https://youtu.be/pDciG07bauE
                    text: How To Use Flight Instruments When Flying an Airplane
                    type: video
                -
                    href: https://youtu.be/ZbxtvLj8CmA
                    text: What Is Instrument Flight Rules (IFR)?
                    type: video
                -
                    href: https://youtu.be/Nuzjui3toOA
                    text: Instrument Rating | Tips, Challenges &amp; Benefits
                    type: video
                -
                    href: https://youtu.be/O3PJd893M8o
                    text: Your First Instrument Pilot's Lesson
                    type: video
        -
            requirement: c
            text: |-
                Explain the following: the commercial pilot certificate, the
                airline transport pilot certificate, and certified flight
                instructor (CFI).
            resources:
                -
                    href: https://youtu.be/qMlfpncS7Mk&t=211
                    text: Pilot Licenses Explained
                    type: video
                -
                    href: https://youtu.be/ELv4oUNa-C4
                    text: Certified Flight Instructor
                    type: video
        -
            requirement: d
            text: |-
                Identify an Aviation Exploring Post and/or Civil Air Patrol
                facility in your area. Learn about their activities and
                membership requirements.
            resources:
                -
                    href: https://youtu.be/zH4Nq6f2SDA
                    text: Aviation Exploring Post Visiting Denton TX Airport
                    type: video
                -
                    href: https://www.exploring.org/aviation/
                    text: Aviation Exploring Posts
                    type: website
                -
                    href: https://youtu.be/QHAoogkb6ts
                    text: Gallatin Cap Visiting Montana
                    type: video
                -
                    href: https://www.gocivilairpatrol.com/
                    text: 'Find a Local CAP Squadron:'
                    type: website
        -
            requirement: e
            text: |-
                Identify three career opportunities that would use skills and
                knowledge in aviation. Pick one and research the training,
                education, certification requirements, experience, and expenses
                associated with entering the field. Research the prospects for
                employment, starting salary, advancement opportunities and
                career goals associated with this career. Discuss what you
                learned with your counselor and whether you might be interested
                in this career.
            resources:
                -
                    href: https://youtu.be/AQ75DC4WcS8
                    text: Careers in Aviation
                    type: video
                -
                    href: https://youtu.be/bnxcib-8S4s
                    text: Aerospace Engineer Careers
                    type: video
                -
                    href: https://youtu.be/KP15W-uTp2c
                    text: Career as a Flight Dispatcher
                    type: video
                -
                    href: https://youtu.be/x5WrHPtpzk8
                    text: How To Become a Helicopter Pilot
                    type: video
                -
                    href: https://youtu.be/TCThd0Vr0cQ
                    text: Career as a Aircraft Maintenance Technician
                    type: video
                -
                    href: https://youtu.be/GNN1gogcHdM
                    text: 5 Qualities To Be a Good Air Traffic Controller
                    type: video
                -
                    href: https://youtu.be/S6a3XVIMnHE
                    text: Career as a Flight Attendant
                    type: video
                -
                    href: https://youtu.be/SCrPtl9R1jQ
                    text: |-
                        Unseen Airport Jobs You Won't Believe Exist! | Inside
                        Hidden Roles That Keep Airports Running
                    type: video
                -
                    href: >-
                        https://www.bls.gov/ooh/Transportation-and-Material-Moving/Airline-and-commercial-pilots.htm
                    text: Airline and Commercial Pilots Occupational Outlook
                    type: website
