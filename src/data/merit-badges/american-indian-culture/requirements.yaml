-
    requirement: 1
    text: |-
        Identify the different American Indian cultural areas. Explain what
        makes them each unique.
    resources:
        -
            href: https://youtu.be/q7v3zl5tgKA
            text: Native American Cultural Regions
            type: video
-
    requirement: 2
    text: |-
        Research an American Indian tribe, group, or nation. Tell your counselor
        about traditional dwellings, way of life, tribal government, religious
        beliefs, family and clan relationships, language, clothing styles, arts
        and crafts, food cultivation, foraging and preparation, means of getting
        around, games, customs in warfare, and where and how they live today.
-
    requirement: 3
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: |-
                Learn 10 common terms in an American Indian language and their
                meanings.
        -
            requirement: b
            text: |-
                Identify the meaning of 10 place names of American Indian origin
                in the United States.
            resources:
                -
                    href: >-
                        https://www.today.com/life/native-american-town-names-rcna176894
                    text: 75 U.S. Place Names Inspired by Native American Culture
                    type: website
        -
            requirement: c
            text: |-
                Name five well-known American Indian leaders, either from the
                past or people of today. Give their tribes or nations. Describe
                what they did or do now that makes them notable.
            resources:
                -
                    href: https://youtu.be/nBYtf58Vpt0
                    text: '10 Legendary Chiefs: Courageous Heroes of Native America'
                    type: video
-
    requirement: 4
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: |-
                Describe how life might have been different for the European
                settlers if there had been no Native Americans to meet them when
                they came to this continent.
        -
            requirement: b
            text: Describe eight things adopted by others from American Indians.
            resources:
                -
                    href: https://youtu.be/Stp7uQxj5lM
                    text: |-
                        Contributions of Native Americans—Indigenous
                        Achievements That Shaped Today
                    type: video
        -
            requirement: c
            text: |-
                Learn a game played by a group or tribe. Teach and lead it with
                a Scout group.
            resources:
                -
                    href: https://youtu.be/Btted7c6Fqc
                    text: 'Cherokee Traditional Games: Stickball'
                    type: video
                -
                    href: https://youtu.be/7ipsFFUyr00
                    text: 'Cherokee Traditional Games: The Game of Graces'
                    type: video
-
    requirement: 5
    text: 'Do ONE of the following:'
    children:
        -
            requirement: a
            text: |-
                Visit a museum either in-person or virtually to see American
                Indian exhibitions and collections. Discuss with your counselor
                what you observed or learned from two exhibitions and identify
                10 artifacts by tribe or nation, their shape, size, and use.
            resources:
                -
                    href: >-
                        https://www.aam-us.org/programs/about-museums/find-a-museum/
                    text: |-
                        Museums (Choose option Ethnically/Culturally/Tribally
                        Specific)
                    type: website
        -
            requirement: b
            text: |-
                Attend a contemporary American Indian gathering. Discuss with
                your counselor proper etiquette for attending as well as what
                you learned and observed during your visit.
            resources:
                -
                    href: https://calendar.powwows.com/
                    text: Pow Wow Calendar
                    type: website
                -
                    href: https://youtu.be/N2CmYbpjIz8
                    text: |-
                        Celebration of Powwow | The Living History of Native
                        American Gatherings
                    type: video
                -
                    href: >-
                        https://www.indianreservation.info/annual-events-and-celebrations-on-indian-reservations/
                    text: Annual Events and Celebrations on Indian Reservations
                    type: website
