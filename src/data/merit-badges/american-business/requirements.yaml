-
    requirement: 1
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: |-
                Explain four features of the free enterprise system in the
                United States. Describe the difference between freedom and
                license. Tell how the Scout Oath and Scout Law apply to business
                and free enterprise.
            resources:
                -
                    href: https://youtu.be/AvvPKwTpGqE
                    text: What Is the Free Enterprise System?
                    type: video
                -
                    href: https://youtu.be/nKLUfmIcO5c
                    text: What Is the Difference Between Freedom and Liberty
                    type: video
        -
            requirement: b
            text: |-
                Describe the Industrial Revolution and tell about the major
                developments that marked the start of the modern industrial era
                in the United States. Discuss three people who had a great
                influence on business or industry in the United States and
                describe what each did.
            resources:
                -
                    href: https://youtu.be/FCpqN7GmLYk
                    text: |-
                        The Industrial Revolution: Crash Course History of
                        Science #21
                    type: video
                -
                    href: https://youtu.be/UPvwpYeOJnI
                    text: |-
                        Ford, Cars, and a New Revolution: Crash Course History
                        of Science #28
                    type: video
                -
                    href: https://youtu.be/vmbRtjN0gAk
                    text: 'Man of Steel: Andrew Carnegie | The Gilded Age'
                    type: video
                -
                    href: https://youtu.be/wupQUvrmQjA
                    text: 'Who Was: Henry Ford | Encyclopaedia Britannica'
                    type: video
                -
                    href: https://youtu.be/M9LnW09fvHE
                    text: How JP Morgan Built It's Empire
                    type: video
                -
                    href: https://youtu.be/tvXUHY4z0As
                    text: Steve Jobs—Apple CEO
                    type: video
        -
            requirement: c
            text: |-
                Identify and describe to your counselor the five primary areas
                of business.
            resources:
                -
                    href: https://youtu.be/_UaSu07bqNQ
                    text: Functional Areas of a Business
                    type: video
        -
            requirement: d
            text: |-
                Explain the history of labor unions in the United States and the
                importance of labor unions and employers working together.
                Identify two major labor unions currently in existence.
            resources:
                -
                    href: https://youtu.be/ewu-v36szlE
                    text: The Labor Movement in the United States | History
                    type: video
                -
                    href: >-
                        https://www.findlaw.com/employment/wages-and-benefits/list-of-us-labor-unions.html
                    text: List of US Labor Unions
                    type: website
        -
            requirement: e
            text: |-
                Discuss with your counselor how business impacts the local,
                national, and global economy.
            resources:
                -
                    href: https://youtu.be/SY3Z1WgqaYQ
                    text: 'Small Businesses: Their Importance to the Global Economy'
                    type: video
-
    requirement: 2
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: |-
                Explain the three basic types of financial statements (income
                statement, balance sheet, and statement of cash flows). Discuss
                with your counselor how each statement can help business leaders
                make better decisions.
            resources:
                -
                    href: https://youtu.be/Fw14qE_9B-A
                    text: 4 Types of Financial Statements
                    type: video
        -
            requirement: b
            text: |-
                Explain how changes in interest rates, taxes, and government
                spending affect the flow of money into or out of business and
                industry.
            resources:
                -
                    href: https://youtu.be/_etdZ9G8D4A
                    text: |-
                        How Interest Rates Affect Interest Rates, Financial
                        Flows, and Exchange Rates
                    type: video
        -
            requirement: c
            text: |-
                Explain how a sole proprietorship, partnership, or limited
                liability company gets its capital. Discuss and explain four
                ways a corporation obtains capital.
            resources:
                -
                    href: https://youtu.be/4-yE5JduTIo
                    text: |-
                        How To Choose the Right Business Structure: LLC vs
                        Corporation vs Sole Proprietorship
                    type: video
        -
            requirement: d
            text: |-
                Name five kinds of insurance useful to business. Describe their
                purposes.
            resources:
                -
                    href: https://youtu.be/O4AziG_UKl4
                    text: 5 Types of Insurance Your Business Needs
                    type: video
-
    requirement: 3
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: Explain the place of profit in business.
            resources:
                -
                    href: https://youtu.be/R8voRf5BjdA
                    text: |-
                        What Is Profit? (Gross Profit, Operating Profit, Net
                        Income) | From a Business Professor
                    type: video
        -
            requirement: b
            text: |-
                Describe to your counselor green marketing and sustainable
                business practices.
            resources:
                -
                    href: https://youtu.be/J9wzu_JeGyI
                    text: |-
                        What Is Eco Marketing or Green Marketing? | Needs and
                        Significance of Eco Marketing
                    type: video
        -
            requirement: c
            text: Explain how ethics plays a role in business decision making.
            resources:
                -
                    href: https://youtu.be/_zYVOnjLCR0
                    text: |-
                        Top 5 Business Ethics Lessons for Making the Right
                        Decisions at Work
                    type: video
        -
            requirement: d
            text: |-
                Discuss the differences between operating a brick-and-mortar
