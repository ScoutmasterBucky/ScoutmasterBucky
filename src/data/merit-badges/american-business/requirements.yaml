    requirement: 5
    text: |-
        Choose a business and research how it applies to each of the primary
        areas of business (accounting, finance, economics, marketing, and
        management). Share what you have learned with your counselor.
-
    requirement: 6
    text: 'Do ONE of the following:'
    children:
        -
            requirement: a
            text: |-
                Choose one of the primary areas of business and identify three
                career opportunities. Select one and research the education,
                training, and experience required for this career. Discuss this
                with your counselor and explain why this interests you.
            resources:
                -
                    href: https://youtu.be/wVfhXYdTcdQ
                    text: Careers in Business
                    type: video
                -
                    href: https://youtu.be/jMIa9SJiFb8
                    text: |-
                        Business Administration: A Complete Guide and Career
                        Insight
                    type: video
        -
            requirement: b
            text: |-
                Select a business leader and interview this individual to learn
                more about his or her company and career path. Discuss the role
                ethics plays in making business decisions. Share what you have
                learned with your counselor.
