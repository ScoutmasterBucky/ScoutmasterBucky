    requirement: 4
    text: |-
        Describe the role of the U.S. Department of Labor. Discuss TWO of the
        following topics with your counselor: Fair Labor Standards Act (FLSA),
        Occupational Safety and Health Act (OSHA), Family and Medical Leave Act
        (FMLA), or Employee Retirement Income Security Act (ERISA).
    resources:
        -
            href: https://www.dol.gov/general/aboutdol/majorlaws
            text: Summary of the Major Laws of the Department of Labor
            type: website
        -
            href: https://youtu.be/v9BhAWc-gWU
            text: What Is the Fair Labor Standards Act?
            type: video
        -
            href: https://youtu.be/3JoXP3Gh9C8
            text: Intro to OSHA
            type: video
        -
            href: https://youtu.be/K1KDFnCOLDY
            text: What's FMLA? FMLA Explained + What You Need To Know About FMLA
            type: video
        -
            href: https://youtu.be/z8nq9iPIMk0
            text: What Is ERISA? Part 1
            type: video
        -
            href: https://youtu.be/f6QRobJIpWw
            text: What Is ERISA? Part 2
            type: video
