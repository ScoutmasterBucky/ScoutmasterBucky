                    type: video
                -
                    href: >-
                        https://www.bendingbranches.com/blogs/resources/round-up-of-our-best-canoeing-safety-topics
                    text: Safety on Wilderness Canoe Trips
                    type: website
        -
            requirement: b
            text: |-
                Review prevention, symptoms, and first-aid treatment for the
                following injuries or illnesses that could occur while canoeing:
                blisters, cold-water shock and hypothermia, dehydration,
                heat-related illnesses, sunburn, sprains, and strains.
            resources:
                -
                    href: >-
                        https://paddlingmag.com/skills/how-to-prevent-and-treat-blisters/
                    text: How To Prevent and Treat Blisters
                    type: website
                -
                    href: https://youtu.be/rH3gZuSr6Y8
                    text: Cold Water Shock—How To Deal With Cold Water Shock
                    type: video
                -
                    href: https://youtu.be/pS0EeinLd3Y
                    text: Cold Water Paddling Safely
                    type: video
                -
                    href: https://youtu.be/EmNieKLjmH4
                    text: What Happens If You Don't Drink Enough Water
                    type: video
                -
                    href: >-
                        https://paddling.com/learn/great-ways-to-beat-the-heat-and-avoid-heat-related-illness-on-the-water
                    text: |-
                        Great Ways To Beat the Heat and Avoid Heat-Related
                        Illness on the Water
                    type: website
                -
                    href: >-
                        https://paddling.com/learn/what-to-do-if-you-are-overheated-after-a-paddling-this-summer
                    text: |-
                        What To Do if You Are Overheated After a Paddling This
                        Summer?
                    type: website
                -
                    href: https://youtu.be/9aFm087_XWg
                    text: What Causes Sunburns
                    type: video
                -
                    href: https://youtu.be/z1gbB_peVDQ
                    text: Sprain Care With RICE Method
                    type: video
