    requirement: 4
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: Name and point out the parts of a paddle.
            resources:
                -
                    href: https://youtu.be/4KSwa6J3Jfw
                    text: Parts of a Canoe Paddle Explained
