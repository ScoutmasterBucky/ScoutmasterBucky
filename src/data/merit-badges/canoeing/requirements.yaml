# 9e changed "thumbdown" back to "thumb-down"
-
    requirement: 1
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: |-
                Review with your counselor the most likely hazards you may
                encounter while participating in canoeing activities and what
                you should do to anticipate, help prevent, mitigate, and respond
                to these hazards.
            resources:
                -
                    href: >-
                        https://boundarywaters.com/ely-minnesota-outfitter/canoe-trip-risks/
                    text: Canoe Trip Risks
                    type: website
                -
                    href: https://youtu.be/bNlnEOblxLw
                    text: Canoe Safety
                    type: video
                -
                    href: https://youtu.be/a6Qy5sVRCtk
