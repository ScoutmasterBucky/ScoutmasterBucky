-
    requirement: 1
    text: |-
        In your own words, define entrepreneurship. Explain to your counselor
        how entrepreneurs impact the U.S. economy.
    resources:
        -
            href: https://youtu.be/KEuTpRkZqiY
            text: Why Entrepreneurs Are Important for the Economy
            type: video
        -
            href: >-
                https://www.investopedia.com/articles/personal-finance/101414/why-entrepreneurs-are-important-economy.asp
            text: Why Entrepreneurship Is Important to the Economy
            type: website
-
    requirement: 2
    text: |-
        Explain to your counselor why having good skills in the following areas
        are important for an entrepreneur: communication, planning,
        organization, problem solving, decision making, basic math,
        adaptability, technical and social skills, teamwork, and leadership.
    resources:
        -
            href: https://youtu.be/iAWeIBUjRqQ
            text: The Key Skills of Successful Entrepreneurs
            type: video
        -
            href: https://youtu.be/JiGJttyiqFs
            text: 'The Entrepreneurial Mindset: From Kids to Entrepreneur'
            type: video
        -
            href: https://online.hbs.edu/blog/post/entrepreneurial-skills
            text: 6 Skills All Entrepreneurs Need
            type: website
-
    requirement: 3
    text: |-
        Identify and interview an individual who has started a business. Learn
        about this person's educational background, early work experiences,
        where the idea for the business came from, and what was involved in
        starting the business. Find out how the entrepreneur raised the capital
        (money) to start the business, examples of successes and challenges
        faced, and how the business is currently doing (if applicable). Discuss
        with your counselor what you have learned.
-
    requirement: 4
    text: |-
        Think of as many ideas for a business as you can, and write them down.
        From your list, select three ideas you believe represent the best
        opportunities. Choose one of these and explain to your counselor why you
        selected it and why you feel it can be successful.
    resources:
        -
            href: https://youtu.be/qJp0j4g3k3o
            text: 'Business Ideas: Finding Your Niche'
            type: video
-
    requirement: 5
    text: |-
