-
    requirement: 1
    text: 'Discuss the following with your counselor:'
    resources:
        -
            href: https://youtu.be/dKM9ZkglGDs
            text: What Is Art
            type: video
    children:
        -
            requirement: a
            text: What art is and what some of the different forms of art are
        -
            requirement: b
            text: The importance of art to humankind
        -
            requirement: c
            text: What art means to you and how art can make you feel
-
    requirement: 2
    text: |-
        Discuss with your counselor the following terms and elements of art:
        line, value, shape, form, space, color, and texture. Show examples of
        each element.
    resources:
        -
            href: https://youtu.be/Z-I6o2wu9v4
            text: Beginner's Guide to the 7 Elements of Art
            type: video
-
    requirement: 3
    text: |-
        Discuss with your counselor the six principles of design: rhythm,
        balance, proportion, variety, emphasis, and unity.
    resources:
        -
            href: https://youtu.be/qp3jHWyPW-E
            text: What Makes a Great Design? The 7 Principles You Need to Know
            type: video
-
    requirement: 4
    text: 'Render a subject of your choice in FOUR of these ways:'
    resources:
        -
            href: https://youtu.be/W4NuqLa9i1Q
            text: What Are the Different Mediums Used in Art?
            type: video
    children:
        -
            requirement: a
            text: Pen and ink
        -
            requirement: b
            text: Watercolors
        -
            requirement: c
            text: Pencil
        -
            requirement: d
            text: Pastels
        -
            requirement: e
            text: Oil paints
        -
            requirement: f
            text: Tempera
        -
            requirement: g
            text: Acrylics
        -
            requirement: h
            text: Charcoal
        -
            requirement: i
            text: Computer drawing or painting
-
    requirement: 5
    text: 'Do ONE of the following:'
    resources:
        -
            href: https://www.tinkercad.com
            text: Design Useful Things website
            type: website
        -
            href: https://www.canva.com/
            text: Create With Canva
            type: website
        -
            href: https://youtu.be/-gbCSnkvwNo
            text: Model and Animate Your Character
            type: video
    children:
        -
            requirement: a
            text: |-
                Design something useful. Make a sketch or model of your design.
                With your counselor's approval, create a promotional piece for
                the item using a picture or pictures.
        -
            requirement: b
            text: |-
                Tell a story with a picture or pictures or using a 3-D
                rendering.
        -
            requirement: c
            text: |-
                Design a logo. Share your design with your counselor and explain
                the significance of your logo. Then, with your parent or
                guardian's permission and your counselor's approval, put your
                logo on Scout equipment, furniture, ceramics, or fabric.
-
    requirement: 6
    text: |-
        With your parent or guardian's permission and your counselor's approval,
        visit a museum, art exhibit, art gallery, artists' co-op, or artist's
        workshop. Find out about the art displayed or created there. Discuss
        what you learned with your counselor.
    resources:
        -
            href: >-
                https://whichmuseum.com/place/united-states-2682?category%5B%5D=art-design
            text: Art Museums in the US
            type: website
        -
            href: https://gocity.com/en/oahu/things-to-do/oahu-for-art-lovers
            text: 'Oahu''s Art Scene: Museums, Murals, Makers and More'
            type: website
-
    requirement: 7
    text: |-
        Find out about three career opportunities in art. Pick one and find out
        the education, training, and experience required for this profession.
        Discuss this with your counselor, and explain why this profession might
        interest you.
    resources:
        -
            href: https://youtu.be/OYF_LHeHLXA
            text: Careers in Art. The Amazing Jobs an Art Education Can Lead to!
            type: video
