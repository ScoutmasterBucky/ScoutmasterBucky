# The footnote for 7 is after all requirements - moved to requirement 7
# Altered footnote to add a space after *
- requirement: 1
  text: |-
      In your own words, define inventing. Then do the following:
  children:
      - requirement: a
        text: |-
            Explain to your counselor the role of inventors and their inventions in
            the economic development of the United States.
        resources:
          - href: https://youtu.be/sSBq9A9GwAk
            text: The Industrial Revolution: Inventions and Changes
            type: video
          - href: https://youtu.be/FGwdpJrfTec
            text: What Is Economic Development
            type: video
      - requirement: b
        text: |-
            List three inventions and state how they have helped humankind.
        resources:
          - href: https://youtu.be/TepBC9dWQZM
            text: Top 5 Inventions That Changed the World
            type: video
          - href: https://youtu.be/lcc-HnMmsXA
            text: 7 Inventions That Changed The World
            type: video
  resources:
      - href: https://youtu.be/n5h01jhICwQ
        text: "What Is Invention"
        type: video
- requirement: 2
  text: |-
      Do ONE of the following:
  children:
      - requirement: a
        text: |-
            With your parent or guardian's permission and counselor's approval,
            interview an adult who has invented a useful item or process. Report
            what you learned to your counselor.
        resources:
          - href: https://www.invent.org/inductees
            text: National Inventors Hall of Fame Inductees Have Changed the World
            type: website
      - requirement: b
        text: |-
            Read about three inventors. Select the one you find most interesting
            and tell your counselor what you learned.
- requirement: 3
  text: |-
      Do the following:
  children:
      - requirement: a
        text: |-
            Define the term intellectual property. Explain which
            government agencies oversee the protection of intellectual property,
            the types of intellectual property that can be protected, how such
            property is protected, and why protection is necessary.
        resources:
          - href: https://youtu.be/rDKxuTi2Cmk
            text: What Is Intellectual Property &amp; Why Do I Care
            type: video
          - href: https://youtu.be/Ay9fZMUPCnE
            text: Intellectual Propert Law: The Basics of Patent Law
            type: video
          - href: https://youtu.be/bQbW_XEYibs
            text: Tips for Protecting Your Business's Intellectual Property
            type: video
      - requirement: b
        text: |-
            Explain the components of a patent and the different types of patents
            available.
        resources:
          - href: https://youtu.be/lERq71WVjgM
            text: What Are the Types of Patents?
            type: video
      - requirement: c
        text: |-
            Examine your Scouting gear and find a patent number on a camping item
            you have used. With your parent or guardian's permission, use the
            internet to find out more about that patent. Compare the finished item
            with the claims and drawings in the patent. Report what you learned to
            your counselor.
        resources:
          - href: https://ppubs.uspto.gov/basic/
            text: US Patent and Trade Office Basic Search
            type: website
      - requirement: d
        text: |-
            Explain to your counselor the term patent infringement.
        resources:
          - href: https://youtu.be/o5nlV9OSgyg
            text: Patent Infringement
            type: video
- requirement: 4
  text: |-
      Discuss with your counselor the types of inventions that are appropriate to
      share with others, and explain why. Tell your counselor about one
      unpatented invention and its impact on society.
  resources:
    - href: https://youtu.be/B8PuOS0J6Ro
      text: Unlucky Inventors Who Never Got To Cash In
      type: video
- requirement: 5
  text: |-
      Choose a commercially available product that you have used on an overnight
      camping trip with your troop. Make recommendations for improving the
      product, and make a sketch that shows your recommendations. Discuss your
      recommendations with your counselor.
- requirement: 6
  text: |-
      Think of an item you would like to invent that would solve a problem for
      your family, troop, chartered organization, community, or a
      special-interest group. Then do the following, while keeping a notebook to
      record your progress.
  children:
      - requirement: a
        text: |-
            Talk to potential users of your invention and determine their needs.
            Then, based on what you have learned, write a statement describing the
            invention and how it would help solve a problem. This statement should
            include a detailed sketch of the invention.
        resources:
          - href: https://youtu.be/kT0ZqwdPYRM
            text: User Needs Statement in Design Thinking
            type: video
          - href: https://youtu.be/l0hVIH3EnlQ
            text: The Secret to Successfully Pitching an Idea
            type: video
          - href: https://youtu.be/ooBRwIDQRdw
            text: How To Make a Virtual "Frankenstein" Prototype Feat
            type: video
      - requirement: b
        text: |-
            Create a model of the invention using clay, cardboard, or any other
            readily available material. List the materials necessary to build a
            working prototype of the invention.
        resources:
          - href: https://youtu.be/k_9Q-KDSb9o
            text: How To Make a Cardboard Prototype
            type: video
      - requirement: c
        text: |-
            Share the idea and the model with your counselor and potential users of
            your invention. Record their feedback in your notebook.
  resources:
    - href: https://youtu.be/StdwWpbokcw
      text: Inventing 101
      type: video
    - href: https://youtu.be/ERFgorcRCJY
      text: Little Inventors: How To Think Up Invention Ideas
      type: video
- requirement: 7
  text: |-
      Build a working prototype of the item you invented for requirement 6.
      Test and evaluate the invention. Among the aspects to consider in your
      evaluation are cost, usefulness, marketability, appearance, and function.
      Describe how your original vision and expectations for your invention are
      similar or dissimilar to the prototype you built. Have your counselor
      evaluate and critique your prototype.
      <div class="gap"></div>
      <b>Note:</b> Before you begin building the prototype, you must have your
      counselor's approval, based on the design and building plans you have
      already shared.
  resources:
    - href: https://youtu.be/k_9Q-KDSb9o
      text: How To Build Prototypes!
      type: video
- requirement: 8
  text: |-
      Do ONE of the following:
  children:
      - requirement: a
        text: |-
            Participate with a club or team (robotics team, science club, or
            engineering club) that builds a useful item. Share your experience with
            your counselor.
        resources:
          - href: https://youtu.be/Jd29kzjclV0
            text: About FIRST Robotics Competition (2021)
            type: video
          - href: https://youtu.be/Mi6E37oU8yc
            text: About VEX Robotics
            type: video
      - requirement: b
        text: |-
            Visit a museum or exhibit dedicated to an inventor or invention, and
            create a presentation of your visit to share with a group such as your
            troop or patrol.
        resources:
          - href: https://museumsdatabase.com/
            text: National Museum's Database
            type: website
          - href: https://www.invent.org/museum/exhibits
            text: National Inventors Hall of Fame
            type: website
          - href: https://invention.si.edu/
            text: Smithsonian's Lemelson Center
            type: website
          - href: https://www.uspto.gov/about-us/uspto-locations/alexandria-va/national-inventors-hall-fame-and-museum
            text: National Inventors Hall of Fame and Museum
            type: website
- requirement: 9
  text: |-
      Discuss with your counselor the diverse skills, education, training, and
      experience it takes to be an inventor. Discuss how you can prepare yourself
      to be creative and inventive to solve problems at home, in school, and in
      your community. Discuss three career fields that might utilize the skills
      of an inventor.
  resources:
    - href: https://youtu.be/WErRJ581SIQ
      text: Meaningful Soft Skills for Inventors
      type: video
    - href: https://youtu.be/3sUHYD728s0
      text: What Does It Take To Be an Inventor?
      type: video
    - href: https://www.zippia.com/inventor-jobs/best-companies-for-inventors/
      text: 10 Best Companies for Inventors
      type: website
    - href: https://youtu.be/ZKuNaN3Dqis
      text: Work of an Examinor
      type: video
    - href: https://youtu.be/Jm2rB29enN4
      text: Why a Career in Science Is for Me
      type: video
