# Requirement 1c1 put the period within the parentheses, which is wrong.
# Requirement 2c has a period outside the parenthesis, which is wrong.
-
    requirement: 1
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: |-
                Choose an item that your family might want to purchase that is
                considered a major expense.
        -
            requirement: b
            text: |-
                Write a plan that tells how your family would save money for the
                purchase identified in requirement 1(a).
            resources:
                -
                    href: https://youtu.be/WG7j91s-E20&t=37
                    text: How To Create a Weekly Savings Plan
                    type: video
                -
                    href: https://youtu.be/cnW_HDIBmz4
                    text: Why and How To Save, Budgeting and Saving
                    type: video
            children:
                -
                    requirement: 1
                    text: Discuss the plan with your counselor.
                -
                    requirement: 2
                    text: Discuss the plan with your family.
                -
                    requirement: 3
                    text: |-
                        Discuss how other family needs must be considered in
                        this plan.
        -
            requirement: c
            text: |-
                Develop a written shopping strategy for the purchase identified
                in requirement 1(a).
            resources:
                -
                    href: >-
                        https://awiseconsumer.com/how-to-determine-product-quality-before-buying/
                    text: How To Determine Product Quality
                    type: website
                -
                    href: https://youtu.be/MfriPbc8hxM
                    text: Can You Really Trust Online Reviews?
                    type: video
                -
                    href: https://youtu.be/nRMp8tVrWk4
                    text: Inside the Consumer Reports Test Lab
                    type: video
            children:
                -
                    requirement: 1
                    text: |-
                        Determine the quality of the item or service (using
                        consumer publications or rating systems.)
                    resources:
                        -
                            href: >-
                                https://awiseconsumer.com/how-to-determine-product-quality-before-buying/
                            text: How To Determine Product Quality
                            type: website
                        -
                            href: https://youtu.be/MfriPbc8hxM
                            text: Can You Really Trust Online Reviews?
                            type: video
                        -
                            href: https://youtu.be/nRMp8tVrWk4
                            text: Inside the Consumer Reports Test Lab
                            type: video
                -
                    requirement: 2
                    text: |-
                        Comparison shop for the item. Find out where you can buy
                        the item for the best price. (Provide prices from at
                        least two different price sources.) Call around; study
                        ads. Look for a sale or discount coupon. Consider
                        alternatives. Can you buy the item used? Should you wait
                        for a sale?
                    resources:
                        -
                            href: https://youtu.be/hFvwIjFfo_s
                            text: Get the Best Value Every Time You Shop
                            type: video
-
    requirement: 2
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: |-
                Prepare a budget reflecting your expected income (allowance,
                gifts, wages), expenses, and savings for a period of 13
                consecutive weeks.
            resources:
                -
                    href: https://youtu.be/-cOjBanoNP0
                    text: How To Create a Budget for Beginners
                    type: video
                -
                    href: https://youtu.be/vUMV-XUdpuM
                    text: Budgeting Basics
                    type: video
        -
            requirement: b
            text: Compare expected income with expected expenses.
            children:
                -
                    requirement: 1
                    text: |-
                        If expenses exceed budget income, determine steps to
                        balance your budget.
                -
                    requirement: 2
                    text: |-
                        If income exceeds budget expenses, state how you would
                        use the excess money (new goal, savings).
        -
            requirement: c
            text: |-
                Track and record your actual income, expenses, and savings for
                13 consecutive weeks (the same 13-week period for which you
                budgeted). (You may use the forms provided in the <em>Personal
                Management</em> merit badge pamphlet, devise your own, or use a
                computer-generated version). When complete, present the records
                showing the results to your counselor.
        -
            requirement: d
            text: |-
                Compare your budget with your actual income and expenses to
                understand when your budget worked and when it did not work.
                With your counselor, discuss what you might do differently the
                next time.
-
    requirement: 3
    text: 'Discuss with your counselor FIVE of the following concepts:'
    children:
        -
            requirement: a
            text: The emotions you feel when you receive money.
        -
            requirement: b
            text: |-
                Your understanding of how the amount of money you have with you
                affects your spending habits.
        -
            requirement: c
            text: |-
                Your thoughts when you buy something new and your thoughts about
                the same item three months later. Explain the concept of buyer's
                remorse.
        -
            requirement: d
            text: |-
                How hunger affects you when shopping for food items (snacks,
                groceries).
        -
            requirement: e
            text: |-
                Your experience of an item you have purchased after seeing or
                hearing advertisements for it. Did the item work as well as
                advertised?
        -
            requirement: f
            text: |-
                Your understanding of what happens when you put money into a
                savings account.
            resources:
                -
                    href: https://youtu.be/sCiE4X_y1a0
                    text: How To Choose the Right Savings Account
                    type: video
        -
            requirement: g
            text: |-
                Charitable giving. Explain its purpose and your thoughts about
                it.
            resources:
                -
                    href: https://youtu.be/PpEOk2botAo
                    text: What Is a Charity?
                    type: video
        -
            requirement: h
            text: What you can do to better manage your money.
            resources:
                -
                    href: https://youtu.be/SgQPzcb8Q-A
                    text: Manage Money Effectively as a Teen
                    type: video
-
    requirement: 4
    text: 'Explain the following to your counselor:'
    children:
        -
            requirement: a
            text: |-
                The differences between saving and investing, including reasons
                for using one over the other.
            resources:
                -
                    href: >-
                        https://www.wellsfargo.com/goals-investing/saving-vs-investing/
                    text: Why Invest?
                    type: website
                -
                    href: https://youtu.be/9tr_HxbAaU4
                    text: Saving vs Investing
                    type: video
        -
            requirement: b
            text: |-
                The concepts of return on investment and risk and how they are
                related.
            resources:
                -
                    href: https://youtu.be/acbV1-fErSI
                    text: Risk and Return
                    type: video
        -
            requirement: c
            text: The concepts of simple interest and compound interest.
            resources:
                -
                    href: https://youtu.be/lMVwYoiiV0w
                    text: Simple vs Compound Interest
                    type: video
        -
            requirement: d
            text: The concept of diversification in investing.
            resources:
                -
                    href: https://youtu.be/MZchH0Ddzn8
                    text: What Is Diversification?
                    type: video
        -
            requirement: e
            text: Why it is important to save and invest for retirement.
            resources:
                -
                    href: https://youtu.be/J9lTE95LPaA
                    text: Why Plan for Retirement?
                    type: video
-
    requirement: 5
    text: |-
        Explain to your counselor what the following investments are and how
        each works:
    resources:
        -
            href: https://youtu.be/i-To1GILOhA
            text: Every Type of Investment Explained
            type: video
    children:
        -
            requirement: a
            text: Common stocks
        -
            requirement: b
            text: Mutual funds
        -
            requirement: c
            text: Life insurance
        -
            requirement: d
            text: A certificate of deposit (CD)
        -
            requirement: e
            text: A savings account
        -
            requirement: f
            text: A U.S. savings bond
-
    requirement: 6
    text: |-
        Explain to your counselor why people might purchase the following types
        of insurance and how they work:
    resources:
        -
            href: https://www.allstate.com/resources/types-of-insurance
            text: Different Types of Insurance and Why You Need Them
            type: website
    children:
        -
            requirement: a
            text: Automobile
        -
            requirement: b
            text: Health
        -
            requirement: c
            text: Homeowner's/renter's
        -
            requirement: d
            text: Whole life and term life
-
    requirement: 7
    text: 'Explain to your counselor the following:'
    children:
        -
            requirement: a
            text: |-
                What a loan is, what interest is, and how the annual percentage
                rate (APR) measures the true cost of a loan
            resources:
                -
                    href: >-
                        https://www.investopedia.com/ask/answers/100314/what-difference-between-interest-rate-and-annual-percentage-rate-apr.asp
                    text: What Is the Difference Between Interest and APR?
                    type: website
        -
            requirement: b
            text: The different ways to borrow money
            resources:
                -
                    href: https://www.prageru.com/videos/borrowing
                    text: Borrowing Money
                    type: video
        -
            requirement: c
            text: |-
                The differences between a charge card, debit card, and credit
                card, including the costs and pitfalls of using these financial
                tools, and why it is unwise to make only the minimum payment on
                your credit card
            resources:
                -
                    href: https://youtu.be/mllbYh0DFMc
                    text: Credit Cards vs Debit Cards
                    type: video
        -
            requirement: d
            text: |-
                Credit reports and how personal responsibility can affect your
                credit report
            resources:
                -
                    href: >-
                        https://www.britannica.com/video/explanation-credit-scores/-279958
                    text: Your Credit Score Explained
                    type: video
        -
            requirement: e
            text: Ways to reduce or eliminate debt.
            resources:
                -
                    href: https://youtu.be/CHiOBzqcMV8
                    text: Easy Steps to Eliminate Debt
                    type: video
-
    requirement: 8
    text: |-
        Demonstrate to your counselor your understanding of time management by
        doing the following:
    resources:
        -
            href: https://youtu.be/CBEQxJK9Y6Q
            text: Time Management for Teens
            type: video
    children:
        -
            requirement: a
            text: |-
                Write a "to do" list of tasks or activities, such as homework
                assignments, chores, and personal projects, that must be done in
                the coming week. List these in order of importance to you.
            resources:
                -
                    href: https://youtu.be/fjjKuoeYP5A
                    text: 'Work Smart: How To Write a To-Do List'
                    type: video
        -
            requirement: b
            text: |-
                Make a seven-day calendar or schedule. Put in your set
                activities, such as school classes, sports practices or games,
                jobs or chores, and/or Scout or place of worship or club
                meetings, then plan when you will do all the tasks from your "to
                do" list between your set activities.
            resources:
                -
                    href: https://youtu.be/OMcy0PD1jQc
                    text: Master Time Management Tips for Teens
                    type: video
        -
            requirement: c
            text: |-
                Follow the one-week schedule you planned. Keep a daily diary or
                journal during each of the seven days of this week's activities,
                writing down when you completed each of the tasks on your "to
                do" list compared to when you scheduled them.
        -
            requirement: d
            text: |-
                With your counselor, review your "to do" list, one-week
                schedule, and diary/journal to understand when your schedule
                worked and when it did not work. Discuss what you might do
                differently the next time.
-
    requirement: 9
    text: |-
        Prepare a written project plan demonstrating the steps below, including
        the desired outcome. This is a project on paper, not a real-life
        project. Examples could include planning a camping trip, developing a
        community service project or a school or religious event, or creating an
        annual patrol plan with additional activities not already included in
        the troop annual plan. Discuss your completed project plan with your
        counselor.
    resources:
        -
            href: https://youtu.be/ntQ1Mx3GZwk
            text: How To Create a Project Plan
            type: video
    children:
        -
            requirement: a
            text: Define the project. What is your goal?
        -
            requirement: b
            text: |-
                Develop a timeline for your project that shows the steps you
                must take from beginning to completion.
        -
            requirement: c
            text: Describe your project.
        -
            requirement: d
            text: |-
                Develop a list of resources. Identify how these resources will
                help you achieve your goal.
        -
            requirement: e
            text: Develop a budget for your project.
-
    requirement: 10
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: |-
                Choose a career you might want to enter after high school or
                college graduation. Discuss with your counselor the needed
                qualifications, education, skills, and experience.
            resources:
                -
                    href: https://bigfuture.collegeboard.org/explore-careers
                    text: Explore Career Possibilities
                    type: website
                -
                    href: https://youtu.be/dMe69L-v4pI
                    text: 'Career Search: Pursuing Passion'
                    type: video
                -
                    href: https://youtu.be/9TtKUydRfDM
                    text: The Cost of Education Careers and Education
                    type: video
                -
                    href: >-
                        https://career.cornell.edu/blog/2025/03/05/10-ways-to-pay-for-college-scholarships-grants-and-more/
                    text: 10 Ways To Pay for College
                    type: website
        -
            requirement: b
            text: |-
                Explain to your counselor what the associated costs might be to
                pursue this career, such as tuition, school or training
                supplies, and room and board. Explain how you could prepare for
                these costs and how you might make up for any shortfall.
