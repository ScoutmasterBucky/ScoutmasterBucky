# 6a: "whehre" changed to "where"
# 7a7: Had "terrain,show" - added space
# 7b says "DO ALL" - corrected to "Do ALL"
# Option D, item (i) is missing a period at the end - added one.
- requirement: 1
  text: |-
      Do the following:
  children:
      - requirement: a
        text: |-
            Explain to your counselor the hazards you are most likely to encounter
            while participating in snow sport activities, and what you should do to
            anticipate, help prevent, mitigate, and respond to these hazards.
        resources:
            - href: https://youtu.be/AKxY8Xm-Gg0
              text: How to Ski Safely
              type: video
            - href: https://centerforspineandortho.com/common-skiing-and-snowboarding-injuries-and-how-to-prevent-them/
              text: How to Prevent Injuries
              type: website
      - requirement: b
        text: |-
            Discuss first aid and prevention for the types of injuries or illnesses
            that could occur while participating in snow sports, including
            hypothermia, frostbite, shock, dehydration, sunburn, concussion,
            fractures, bruises, sprains, and strains. Tell how to apply splints.
        resources:
            - href: https://youtu.be/tHiav9zYJT0
              text: Treating Frostbite and Hypothermia
              type: video
            - href: https://youtu.be/jo2zi_JB9_4
              text: How to Splint a Broken Bone
              type: video
- requirement: 2
  text: |-
      Do the following:
  children:
      - requirement: a
        text: |-
            Explain why every snow sport participant should be prepared to render
            first aid in the event of an accident.
      - requirement: b
        text: |-
            Explain the procedure used to report an accident to the local ski
            patrol or local emergency personnel.
        resources:
            - href: https://youtu.be/Zl0ZyNoox8M
              text: How to Report an Accident to the Ski Patrol
              type: video
- requirement: 3
  text: |-
      Explain the international trail-marking system.
  resources:
      - href: https://youtu.be/N_f6xMFVVHc
        text: International Trail Marking System
        type: video
- requirement: 4
  text: |-
      Discuss the importance of strength, endurance, and flexibility in snow
      sports. Demonstrate exercises and activities you can do to get fit for the
      option you choose in requirement 7.
  resources:
      - href: https://youtu.be/a8sf5k3fH9I
        text: Training to Prevent Snow Sports Injuries
        type: video
- requirement: 5
  text: |-
      Present yourself properly clothed and equipped for the option you choose in
      requirement 7. Discuss how the clothing you have chosen will help keep you
      warm and protected.
  resources:
      - href: https://youtu.be/mjJNpR3nepM
        text: How to Dress for Snow Sports
        type: video
- requirement: 6
  text: |-
      Do ALL of the following:
  children:
      - requirement: a
        text: |-
            Explain the elements of the <i>Your Responsibility Code</i> that is
            in effect at the location where you will ski, snowboard, or snowshoe.
            Explain why each person must follow this code.
        resources:
            - href: https://youtu.be/euGO92z4MnM
              text: Your Responsibility Code
              type: video
      - requirement: b
        text: |-
            Explain the <i>SMART Style</i> safety program. Tell why it is important and
            how it applies to participants at snow sport venues like terrain parks
            and pipes.
        resources:
            - href: https://youtu.be/4Y7lCN7SKiY
              text: <i>SMART</i> Style Safety Program
              type: video
      - requirement: c
        text: |-
            Explain the precautions pertaining to avalanche safety, including the
            responsibility of individuals regarding avalanche safety.
        resources:
            - href: https://youtu.be/_f-vEc5LTFM
              text: How to Reduce Avalanche Risk
              type: video
- requirement: 7
  text: |-
      Do ONE of the following options:
  children:
      - text: |-
            <strong>Option A—Downhill (Alpine) Skiing.</strong> Do ALL of the following:
            <div class="gap"></div>
            <b>Note:</b> Generally, a gentle slope will be a
            trail designated by a green circle, a slightly steeper slope will be a
            green circle or blue square trail, and an intermediate slope will be a
            blue square trail. However, your counselor should determine what type of
            hill is most suited to your skill level and allows you to demonstrate
            each of the required skills.
        children:
            - requirement: 1
              text: |-
                  Show how to wax and maintain your skis and use/maintain your release
                  bindings. Explain the international DIN standard and what it means to
                  skiers.
              resources:
                  - href: https://youtu.be/1Xt1gZfZ2Rw
                    text: How to Wax Skis
                    type: video
                  - href: https://youtu.be/Ix27SNEsRYM
                    text: How to Test Ski Bindings
                    type: video
                  - href: https://youtu.be/DkNAXgc2-rk
                    text: Ski Binding DIN Settings
                    type: video
            - requirement: 2
              text: |-
                  Explain the American Teaching System and a basic snowskiing
                  progression.
              resources:
                  - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Snow%20Sports/american_teaching_system_levels.pdf
                    text: American Teaching System Skill Levels
                    type: pdf
            - requirement: 3
              text: |-
                  Discuss the different types of Alpine skis. Demonstrate two ways to carry
                  skis and poles safely and easily.
              resources:
                  - href: https://youtu.be/PXR5vRgIlJE
                    text: Types of Alpine Skis
                    type: video
                  - href: https://youtu.be/GLu49jDy51k
                    text: How to Carry Skis
                    type: video
            - requirement: 4
              text: |-
                  Demonstrate how to ride one kind of lift and explain how to ride two
                  others.
              resources:
                  - href: https://youtu.be/4xkGmEC-vPk
                    text: Ski Lifts and How to Ride Them
                    type: video
            - requirement: 5
              text: |-
                  On a gentle slope, demonstrate some of the beginning maneuvers learned
                  in skiing. Include the straight run, gliding wedge, wedge stop,
                  sidestep, and herringbone maneuvers.
              resources:
                  - href: https://youtu.be/LaF1tT1l7c0
                    text: Beginner's Guide - The Gear
                    type: video
                  - href: https://youtu.be/l6AG5WLUaNo
                    text: Beginner's Guide - Basic Moves
                    type: video
                  - href: https://youtu.be/zAQVuC1Q4mw
                    text: Beginner's Guide - Getting Around
                    type: video
            - requirement: 6
              text: |-
                  On slightly steeper terrain, show linked wedge turns.
              resources:
                  - href: https://youtu.be/1BdMf9rmubQ
                    text: How to Do Linked Wedge Turns
                    type: video
                  - href: https://youtu.be/9bEH6JCq83U
                    text: The Wedge Turn
                    type: video
            - requirement: 7
              text: |-
                  On a moderate slope, demonstrate five to 10 christies.
              resources:
                  - href: https://youtu.be/x5q0yV14sas
                    text: How to Do Christies
                    type: video
            - requirement: 8
              text: |-
                  Make a controlled run down an intermediate slope.
              resources:
                  - href: https://youtu.be/CMgId4iSlcE
                    text: Making a Controlled Run
                    type: video
            - requirement: 9
              text: |-
                  Demonstrate the ability to ski in varied conditions, including
                  changes in pitch and snow conditions. Maintain your balance and ability
                  to turn.
              resources:
                  - href: https://youtu.be/DQv53VSxykY
                    text: Skiing in Variable Snow Conditions
                    type: video
            - requirement: 10
              text: |-
                  Name the major ski organizations in the United States and explain their
                  functions.
              resources:
                  - href: https://youtu.be/Z_Jh5pfseU8
                    text: Professional Ski Instructors of America (PSIA)
                    type: video
                  - href: https://youtu.be/MHJlZBwiUx4
                    text: U.S. Ski &amp; Snowboard
                    type: video
                  - href: https://youtu.be/bmqLYSj4u0Q
                    text: National Ski Patrol
                    type: video
      - text: |-
            <strong>Option B—Cross-Country (Nordic) Skiing.</strong> Do ALL of the
            following:
        children:
            - requirement: 1
              text: |-
                  Show your ability to select, use, and maintain equipment for
                  cross-country skiing in safety and comfort.
              resources:
                  - href: https://youtu.be/vqKaNOw6Feg
                    text: How to Choose Cross-Country Skis
                    type: video
            - requirement: 2
              text: |-
                  Explain the reasons for common rules, including no walking on ski
                  trails, one-way ski direction, no pets, and no skiing on snowmobile
                  trails.
            - requirement: 3
              text: |-
                  Discuss classic, skating, touring, and telemark skis.
              resources:
                  - href: https://youtu.be/oXIp-lJJH4E
                    text: Types of Cross Country Skis
                    type: video
            - requirement: 4
              text: |-
                  Discuss the basic principles of waxing for cross-country ski touring.
              resources:
                  - href: https://www.youtube.com/shorts/hFl9r0JapvI
                    text: How to Wax Cross-Country Skis
                    type: video
            - requirement: 5
              text: |-
                  Discuss the differences between cross-country, backcountry/ski touring,
                  ski mountaineering, and downhill/telemark skiing.
              resources:
                  - href: https://youtu.be/a2C77sfBMHo
                    text: Styles of Cross-Country Skiing
                    type: video
                  - href: https://youtu.be/-B1UnHDByoY
                    text: What is Telemark Skiing?
                    type: video
            - requirement: 6
              text: |-
                  List the items you would take on a one-day ski tour.
              resources:
                  - href: https://youtu.be/3rHuEqZgUMc
                    text: Gear Checklist for a Day Tour
                    type: video
            - requirement: 7
              text: |-
                  Demonstrate the proper use of a topographic map and compass.
              resources:
                  - href: https://youtu.be/CoVcRxza8nI
                    text: How to Read a Topographic Map
                    type: video
                  - href: https://youtu.be/0cF0ovA3FtY
                    text: How to Use a Compass
                    type: video
                  - href: https://youtu.be/P1LL2FXK6o0
                    text: How to Use a Topographic Map and Compass
                    type: video
            - requirement: 8
              text: |-
                  On a gentle, packed slope, show some basic ways to control speed and
                  direction. Include the straight run, traverse, side slip, step turn,
                  wedge stop, and wedge turn maneuvers.
              resources:
                  - href: https://youtu.be/kmw9LxutG_8
                    text: How to Control Speed and Direction
                    type: video
            - requirement: 9
              text: |-
                  On a cross-country trail, demonstrate effective propulsion by showing
                  proper weight transfer form ski to ski, pole timing, rhythm, flow, and
                  glide.
              resources:
                  - href: https://youtu.be/ctrIUq9kCJI
                    text: Basic Moves on Cross-Country Skis
                    type: video
            - requirement: 10
              text: |-
                  Demonstrate your ability, on a 4-mile tour, to cope with an average
                  variety of snow conditions.
                  <div class="gap"></div>
                  <b>Note:</b> Adaptive skiers may
                  complete a 1-mile tour with prior approval from their counselor.
              resources:
                  - href: https://youtu.be/nCqNLC8PzNM
                    text: Skiing on Varied Conditions
                    type: video
            - requirement: 11
              text: |-
                  Demonstrate several methods of dealing with steep hills or difficult
                  conditions. Include traverses and kick turns going uphill and downhill,
                  sidesteps, pole drag, and ski-pole "glissade."
              resources:
                  - href: https://youtu.be/MWskz4ZnPl4
                    text: Dealing With Hills
                    type: video
      - text: |-
            <strong>Option C—Snowboarding.</strong> Do ALL of the following:
            <div class="gap"></div>
            <b>Note:</b> Generally, a gentle slope will be a trail
            designated by a green circle, a slightly steeper slope will be a green
            circle or blue square trail, and an intermediate slope will be a blue
            square trail. However, your counselor should determine what type of hill
            is most suited to your skill level and allows you to demonstrate the
            required skills.
        children:
            - requirement: 1
              text: |-
                  Discuss forward-fall injuries.
              resources:
                  - href: https://youtu.be/pAuRz-QP5tM
                    text: How to Fall on a Snowboard
                    type: video
            - requirement: 2
              text: |-
                  Show your ability to select the correct equipment for snowboarding and
                  to use it for safety and comfort.
              resources:
                  - href: https://youtu.be/lF2lf5RGCOw
                    text: Selecting Snowboard Equipment
                    type: video
            - requirement: 3
              text: |-
                  Show how to use and maintain your own bindings, and explain the use of
                  the different binding methods. Explain the need for leashes.
              resources:
                  - href: https://youtu.be/1NQ-G0qn4UA
                    text: How to Adjust Bindings
                    type: video
            - requirement: 4
              text: |-
                  Discuss the four types of snowboards. Demonstrate how to carry a
                  snowboard easily and safely.
              resources:
                  - href: https://youtu.be/I9t_ez_utno
                    text: Types of Snowboards
                    type: video
            - requirement: 5
              text: |-
                  Demonstrate how to ride one kind of lift and explain how to ride two
                  others.
              resources:
                  - href: https://youtu.be/4xkGmEC-vPk
                    text: Ski Lifts and How to Ride Them
                    type: video
            - requirement: 6
              text: |-
                  Demonstrate the basic principles of waxing a snowboard.
              resources:
                  - href: https://youtu.be/YGG5_xjeB2Y
                    text: How to Wax a Snowboard
                    type: video
            - requirement: 7
              text: |-
                  Do the following:
              children:
                  - requirement: a
                    text: |-
                        On a gentle slope, demonstrate beginning snowboarding maneuvers.
                        Show basic ways to control speed and direction. Include the
                        sideslipping maneuver.
                    resources:
                        - href: https://youtu.be/9YGruvaETK4
                          text: Beginning Snowboard Maneuvers
                          type: video
                        - href: https://youtu.be/UoPxRNsLrZ8
                          text: How to Make Your Board Go Straight
                          type: video
                  - requirement: b
                    text: |-
                        On slightly steeper terrain, show traversing.
                    resources:
                        - href: https://youtu.be/eIcLMojBopA
                          text: Maneuvering Hills &amp; Traversing the Slope
                          type: video
            - requirement: 8
              text: |-
                  On a moderate slope, demonstrate an ollie, a nose-end grab, and a
                  wheelie.
              resources:
                  - href: https://youtu.be/N4hCpTt30GE
                    text: How to Do an Ollie
                    type: video
                  - href: https://youtu.be/gZFWW4Vus-Q
                    text: How to Do a Nose-End Grab
                    type: video
                  - href: https://youtu.be/ZDUHDwxqNuE
                    text: How to Do a Wheelie
                    type: video
            - requirement: 9
              text: |-
                  Make a controlled run down an intermediate slope.
              resources:
                  - href: https://youtu.be/77rXSf7-CWY
                    text: Making a Controlled Run
                    type: video
            - requirement: 10
              text: |-
                  Demonstrate your ability to ride in varied conditions, including
                  changes in pitch, snow conditions, and moguls. Maintain your balance
                  and ability to turn.
              resources:
                  - href: https://youtu.be/96SaQtglKHE
                    text: Types of Snow Conditions
                    type: video
            - requirement: 11
              text: |-
                  Name the major snowboarding organizations in the United States and
                  explain their functions.
              resources:
                  - href: https://youtu.be/UrtwvLd2sbU
                    text: American Association of Snowboarding Instructors
                    type: video
      - text: |-
            <strong>Option D—Snowshoeing.</strong> Do ALL of the following:
        children:
            - requirement: 1
              text: |-
                  Name the parts of a snowshoe.
            - requirement: 2
              text: |-
                  Explain how to choose the correct size of snowshoe.
            - requirement: 3
              text: |-
                  Describe the different types of snowshoes and their specialized uses.
                  Discuss factors to consider when choosing a snowshoe.
            - requirement: 4
              text: |-
                  Explain how to properly care for and maintain snowshoes.
              resources:
                  - href: https://youtu.be/7BwDagdaXew
                    text: How to Repair Snowshoes
                    type: video
                  - href: https://youtu.be/scwZ1geZpWA
                    text: How to Store Snowshoes
                    type: video
            - requirement: 5
              text: |-
                  List the items you would take on a one-day snowshoe hike.
              resources:
                  - href: https://youtu.be/_gA5VlgKnOI
                    text: What to Bring Snowshoeing
                    type: video
                  - href: https://youtu.be/p-7UMYNP6s0
                    text: What to Wear Snowshoeing
                    type: video
            - requirement: 6
              text: |-
                  Describe areas that are best for snowshoeing. Discuss some advantages
                  and dangers of backcountry snowshoeing.
              resources:
                  - href: https://youtu.be/tYo3RNM2ock
                    text: Where and How to Snowshoe Safely
                    type: video
            - requirement: 7
              text: |-
                  Discuss the benefits of snowshoeing.
              resources:
                  - href: https://youtu.be/Iej5x5vk304
                    text: Benefits of Snowshoeing
                    type: video
            - requirement: 8
              text: |-
                  Demonstrate the most efficient ways to break trail, climb uphill,
                  travel downhill and traverse a slope.
              resources:
                  - href: https://youtu.be/9gLm2viPkT4
                    text: How to Break Trail
                    type: video
                  - href: https://youtu.be/Mr1uR6ENxBY
                    text: How to Snowshoe on Hills
                    type: video
                  - href: https://youtu.be/zWabuDZBcVQ
                    text: How to Sidestep
                    type: video
            - requirement: 9
              text: |-
                  Demonstrate your ability, on a 2-mile snowshoe hike, to cope with an
                  average variety of snow conditions.
                  <div class="gap"></div>
                  <b>Note:</b> Adaptive
                  snowshoers may complete a 1-mile hike with prior approval from their
                  counselor.
              resources:
                  - href: https://youtu.be/3U37kHrGlvo
                    text: How to Travel Cross-Country on Snowshoes
                    type: video
            - requirement: 10
              text: |-
                  Demonstrate the proper use of a topographic map and compass.
              resources:
                  - href: https://youtu.be/CoVcRxza8nI
                    text: How to Read a Topographic Map
                    type: video
                  - href: https://youtu.be/0cF0ovA3FtY
                    text: How to Use a Compass
                    type: video
                  - href: https://youtu.be/P1LL2FXK6o0
                    text: How to Use a Topographic Map and Compass
                    type: video
        resources:
            - href: https://youtu.be/vsco4SkXSTc
              text: How to Choose Snowshoes
              type: video
