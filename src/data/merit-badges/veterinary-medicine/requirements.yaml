    requirement: 6
    text: 'Do ONE of the following:'
    children:
        -
            requirement: a
            text: |-
                Visit a veterinary clinic, hospital, or veterinary referral
                teaching hospital that does work in one of the practices listed
                in requirement 1. Spend as much time as you can observing the
                veterinarians and their staff. Prepare a presentation on what
                you observed and learned at the facility and share with your
                counselor.
        -
            requirement: b
            text: |-
                Spend as much time as possible with a veterinarian who works in
                one of the fields listed in requirement 2. Learn what special
                training beyond veterinary medical school may have been required
                for that position. Learn about any special or unusual activities
                required of this position. Prepare a presentation and share what
                you have learned about this field of veterinary medicine with
                your counselor. Include how this field serves the needs of the
                general public.
