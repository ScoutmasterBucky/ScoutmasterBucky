# 2B had the period removed from the title - added it back in
# 5A and 5B use "A.)" and "B.)" which isn't needed for our format.
- requirement: 1
  text: |-
      Do the following:
  children:
      - requirement: a
        text: |-
            Explain what a projectile is, and why any device that shoots a
            projectile at high speed must be handled with care and respect, and
            used only in approved locations.
        resources:
            - href: https://youtu.be/kStpU1bU-oc
              text: High-Speed Collisions in Space - Experiments with a Carrot Gun
              type: video
      - requirement: b
        text: |-
            Explain the five range safety rules.
        resources:
            - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Archery/Archery%20Range%20Rules.png
              text: Archery Range Rules
              type: image
      - requirement: c
        text: |-
            Explain the four whistle commands used on the range.
        resources:
            - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Archery/Archery%20Range%20Rules.png
              text: Archery Range Rules
              type: image
      - requirement: d
        text: |-
            Explain how to safely remove arrows from the target and return them to
            your quiver.
        resources:
            - href: https://youtu.be/E51Y4ZIaJ7k
              text: How to Safely Pull Your Arrows From The Target
              type: video
            - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Archery/retrieving_arrows.jpeg
              text: Retrieving Arrrows
              type: image
      - requirement: e
        text: |-
            Tell your counselor about your local and state laws for owning and
            using archery equipment.
        resources:
            - href: https://www.gearheadarchery.com/regulations/
              text: Regulations by State
              type: website
- requirement: 2
  text: |-
      Do the following:
  children:
      - requirement: a
        text: |-
            Name and point to the parts of an arrow.
        resources:
            - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Archery/arrow.png
              text: Diagram of Arrow
              type: image
            - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Archery/How%20to%20Measure%20an%20Archer%27s%20Arrow%20Length.mp4
              text: How To Measure an Archer's Arrow Length
              type: video
      - requirement: b
        text: |-
            Describe three or more different types of arrows.
        resources:
            - href: https://legendarchery.com/blogs/archery-bowhunting-blog/different-types-of-arrows-and-uses
              text: Different Types of Arrows and Uses
              type: website
      - requirement: c
        text: |-
            Name the four principal materials for making arrow shafts.
        resources:
            - href: https://legendarchery.com/blogs/archery-bowhunting-blog/different-types-of-arrows-and-uses
              text: Different Types of Arrows and Uses
              type: website
      - requirement: d
        text: |-
            Do ONE of the following:
        children:
            - requirement: 1
              text: |-
                  Make a complete arrow from a bare shaft using appropriate equipment
                  available to you.
              resources:
                  - href: https://youtu.be/bu6qDn3HXEQ
                    text: How To Make Wood Arrows in 5 Steps
                    type: video
            - requirement: 2
              text: |-
                  To demonstrate arrow repair, inspect the shafts and prepare and
                  replace at least three vanes, one point, and one nock. You may use
                  as many arrows as necessary to accomplish this. The repairs can be
                  done on wood, fiberglass, or aluminum arrows.
              resources:
                  - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Archery/How%20to%20Replace%20the%20Nocking%20Point.mp4
                    text: How To Replace the Nocking Point
                    type: video
                  - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Archery/basic_repair_kit.png
                    text: Basic Repair Kit
                    type: image
                  - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Archery/How%20to%20Replace%20the%20Arrow%20Fletching.mp4
                    text: How To Replace the Arrow Fletching
                    type: video
                  - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Archery/How%20to%20Replace%20the%20Nock.mp4
                    text: How To Replace the Nock
                    type: video
                  - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Archery/How%20to%20Replace%20the%20Target%20Point.mp4
                    text: How To Replace the Target Point
                    type: video
      - requirement: e
        text: |-
            Explain how to properly care for and store arrows.
        resources:
            - href: https://youtu.be/PKyA6i1TATM
              text: How To Store Arrows
              type: video
- requirement: 3
  text: |-
      Do the following:
  children:
      - requirement: a
        text: |-
            Explain the proper use, care, and storage of, as well as the reasons
            for using tabs, arm guards, shooting gloves, and quivers.
        resources:
            - href: https://youtu.be/1g10qARTSrE
              text: How To Wear Your Archery Gear Correctly
              type: video
            - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Archery/arm%20guard.png
              text: Arm Guard
              type: image
            - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Archery/finger_tab_on_hand.png
              text: Finger Tab on Hand
              type: image
            - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Archery/quiver.png
              text: Quiver
              type: image
      - requirement: b
        text: |-
            Explain the following terms: draw length, draw weight, mechanical
            release, and barebow.
        resources:
            - href: https://youtu.be/bH7RTX0fgUM
              text: Basic Archery Terms
              type: video
- requirement: 4
  text: |-
      Explain the following:
  children:
      - requirement: a
        text: |-
            The difference between an end and a round
        resources:
            - href: https://youtu.be/zJcaPSDtboI
              text: 'NFAA Indoor: Fundamentals of an Indoor Round'
              type: video
      - requirement: b
        text: |-
            The differences among field, target, and 3-D archery
        resources:
            - href: https://archery360.com/2022/03/10/how-to-shoot-3d-field-and-outdoor-target-archery/
              text: 'How To Shoot: 3D, Field, and Outdoor Target Archery'
              type: website
      - requirement: c
        text: |-
            How the five-color World Archery Federation target is scored
        resources:
            - href: https://youtu.be/WUgH5IbxuT8
              text: How To Score an Archery Target
              type: video
      - requirement: d
        text: |-
            How the National Field Archery Association (NFAA) black-and-white field
            targets and blue indoor targets are scored
        resources:
            - href: https://youtu.be/O47cSaBzNw0
              text: How To Score an NFAA Field Archery Target
              type: video
- requirement: 5
  text: |-
      Working under the supervision of a certified USA Archery Level 1 Instructor
      or a certified long-term camp staff member (i.e., a National Camping School
      [NCS] Range Activities Director; or a Rangemaster over age 18 who is
      trained by a NCS Range Activities Director or by a USA Archery Level 1
      Instructor), do ONE of the following options:
      <div class="gap"></div>
      <b>Note:</b> When using a Genesis bow, apply the requirements in Option A.
  resources:
      - href: https://youtu.be/EuMHSsN8YLM
        text: How Is a Compound Bow Different From a Recurve Bow?
        type: video
  children:
      - text: |-
            <strong>Option A—Recurve Bow or Longbow.</strong> Do ALL of the
            following:
        children:
            - requirement: 1
              text: |-
                  Name and point to the parts of the recurve or longbow you are
                  shooting.
              resources:
                  - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Archery/recurve_bow_size.png
                    text: Recurve Bow Measurement Chart
                    type: image
            - requirement: 2
              text: |-
                  Explain how to properly care for and store recurve bows and
                  longbows.
              resources:
                  - href: https://youtu.be/Kbl2a9HRAR8
                    text: How To Store a Recurve Bow
                    type: video
            - requirement: 3
              text: |-
                  Demonstrate and explain USA Archery's 11 Steps of Shooting
                  for the bow you are shooting.
              resources:
                  - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Archery/Steps%20of%20Shooting%20with%20a%20Recurve%20Bow.mp4
                    text: Steps of Shooting
                    type: video
            - requirement: 4
              text: |-
                  Demonstrate the proper way to string a recurve bow or longbow.
              resources:
                  - href: https://youtu.be/K1NMzkoLC3c
                    text: How To String a Recurve Bow
                    type: video
            - requirement: 5
              text: |-
                  Using a bow square, locate and mark with dental floss, crimp-on, or
                  other method, the nocking point on the bowstring of the bow you are
                  using.
              resources:
                  - href: https://youtu.be/325P19BBNgY
                    text: How To Mark a Nock on a Recurve Bow
                    type: video
            - requirement: 6
              text: |-
                  Do ONE of the following:
              children:
                  - requirement: a
                    text: |-
                        Using a recurve bow or longbow and arrows with a finger
                        release, shoot a single round of ONE of the following:
                    children:
                        - requirement: 1
                          text: |-
                              An NFAA field round of 14 targets and make a score of 60
                              points
                        - requirement: 2
                          text: |-
                              A Scouting America field round of 14 targets and make a score
                              of 80 points
                        - requirement: 3
                          text: |-
                              A World Archery/USA Archery indoor round and make a score
                              of 80 points (indoor rounds may be shot outdoors if this is
                              more convenient)
                        - requirement: 4
                          text: |-
                              An NFAA indoor round and make a score of 50 points (indoor
                              rounds may be shot outdoors if this is more convenient).
                  - requirement: b
                    text: |-
                        Shooting 30 arrows in five-arrow ends at an 80-centimeter
                        (32-inch) five-color target at 10 yards and using the 10
                        scoring regions, make a score of 150 points.
      - text: |-
            <strong>Option B—Compound Bow.</strong> Do ALL of the following:
        children:
            - requirement: 1
              text: |-
                  Name and point to the parts of the compound bow you are shooting.
              resources:
                  - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Archery/compound_bow.png
                    text: compound_bow.png
                    type: image
            - requirement: 2
              text: |-
                  Explain how to properly care for and store compound bows.
            - requirement: 3
              text: |-
                  Demonstrate and explain USA Archery's 11 Steps of Shooting for
                  the bow you are shooting.
              resources:
                  - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Archery/Steps%20of%20Shooting%20with%20a%20Recurve%20Bow.mp4
                    text: Steps of Shooting
                    type: video
            - requirement: 4
              text: |-
                  Explain why it is necessary to have the string or cable on a compound
                  bow replaced at an archery shop.
            - requirement: 5
              text: |-
                  Locate and mark with dental floss, crimp-on, or other method, the
                  nocking point on the bowstring of the bow you are using.
              resources:
                  - href: https://youtu.be/Hh0UgcUrpSI
                    text: How To Mark a Nock on a Compound Bow
                    type: video
            - requirement: 6
              text: |-
                  Do ONE of the following:
              children:
                  - requirement: a
                    text: |-
                        Using a compound bow and arrows with a finger release, shoot a
                        single round of ONE of the following:
                    children:
                        - requirement: 1
                          text: |-
                              An NFAA field round of 14 targets and make a score of 70 points
                        - requirement: 2
                          text: |-
                              A Scouting America field round of 14 targets and make a score of
                              90 points
                        - requirement: 3
                          text: |-
                              A World Archery/USA Archery indoor round and make a score of 90
                              points (indoor rounds may be shot outdoors if this is more
                              convenient)
                        - requirement: 4
                          text: |-
                              An NFAA indoor round and make a score of 60 points (indoor rounds
                              may be shot outdoors if this is more convenient)
                  - requirement: b
                    text: |-
                        Shooting at an 80-centimeter (32-inch) five-color target using the
                        10 scoring regions, make a minimum score of 160 points. Accomplish this in
                        the following manner:
                    children:
                        - text: |-
                              Shoot 15 arrows in five-arrow ends, at a distance of 10
                              yards<br /> AND<br /> Shoot 15 arrows in five-arrow ends, at a
                              distance of 15 yards.
