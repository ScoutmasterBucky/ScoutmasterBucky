- requirement: 1
  text: |-
      Do ONE of the following:
  children:
      - requirement: a
        text: |-
            For one day, keep a log in which you describe your communication
            activities. Keep track of the time and different ways you spend
            communicating, such as talking person-to-person, listening to teachers,
            listening to the radio or podcasts, watching television, using social
            media, reading books and other print media, and using any electronic
            communication device. Discuss with your counselor what your log reveals
            about the importance of communication in your life. Think of ways to
            improve your communication skills.
        resources:
            - href: https://youtu.be/BW82k7lwI_U
              text: Active Listening
              type: video
            - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Communications/Communication%20Log.docx
              text: Download a Communication Log Template
              type: pdf
      - requirement: b
        text: |-
            For three days, keep a journal of your listening experiences. Identify
            one example of each of the following, and discuss with your counselor
            when you have listened to each: obtain information, be
            persuaded, appreciate, or enjoy something, and understand someone's
            feelings.
        resources:
            - href: https://youtu.be/x2dxh8xc68E
              text: Informative Speech
              type: video
            - href: https://youtu.be/lAxMdswA_-s
              text: What is Persuation
              type: video
            - href: https://youtu.be/Ljlkvmn0RKk
              text: Want to Add More Joy to Your Life? Here's How
              type: video
            - href: https://youtu.be/_Of_YO0-B4k
              text: Listening Skills for Conflict Resolution
              type: video
            - href: https://youtu.be/D6-MIeRr1e8
              text: How to Improve Your Listening Skills
              type: video
      - requirement: c
        text: |-
            In a small-group setting, meet with other Scouts or with friends. Have
            them share personal stories about significant events in their lives
            that affected them in some way. Take note of how each Scout
            participates in the group discussion and how effectively each Scout
            communicates their story. Report what you have learned to your
            counselor about the differences you observed in effective
            communication.
        resources:
            - href: https://youtu.be/XeJ03dDGlCk
              text: How to Ask Good Questions
              type: video
      - requirement: d
        text: |-
            List as many ways as you can think of to communicate with others
            (face-to-face, by telephone, letter, email, text messages, social
            media, and so on). For each type of communication, discuss with your
            counselor an instance when that method might not be appropriate or
            effective.
        resources:
            - href: https://youtu.be/2JG9AC0ZxuY
              text: Communication Skills
              type: video
            - href: https://scoutlife.org/outdoors/181688/how-to-communicate-underwater-when-scuba-diving/%20
              text: Communicating While Scuba Diving
              type: website
            - href: https://scoutlife.org/outdoors/outdoorarticles/3591/calls-for-climbers-and-belayers/
              text: Communicating While Climbing
              type: website
- requirement: 2
  text: |-
      Do ONE of the following:
  children:
      - requirement: a
        text: |-
            Think of a creative way to describe yourself using, for example, a
            collage, short story or autobiography, drawing or series of
            photographs, or a song or skit. Using the aid you created, make a
            presentation to your counselor about yourself.
        resources:
            - href: https://scoutlife.org/the-emoji-scout-law/
              text: Using Emojis to Communicate the Scout Law
              type: website
            - href: https://youtu.be/xyH79KQET5E
              text: Writing With Your Audience in Mind
              type: video
            - href: https://youtu.be/KVbRQ0cE0Ok
              text: How to Use Visual Aids for Public Speaking
              type: video
      - requirement: b
        text: |-
            Choose a concept, product, or service in which you have great
            confidence. Build a sales plan based on its good points. Try to
            persuade the counselor to agree with, use, or buy your concept, product
            or service. After your sales talk, discuss with your counselor how
            persuasive you were.
        resources:
            - href: https://youtu.be/FhWBABCpT9w
              text: Making a Speech Powerful &amp; Persuasive
              type: video
- requirement: 3
  text: |-
      Write a five-minute speech. Give it at a meeting of a group.
  resources:
      - href: https://youtu.be/ZFmBcag7G_w
        text: Types of Speeches
        type: video
      - href: https://youtu.be/u-_i7-kNwZI
        text: 3 Steps to Write Your Speech
        type: video
      - href: https://youtu.be/_3fz0eiBGvA
        text: 'How to Overcome the Fear of Public Speaking: 3 Tips'
        type: video
- requirement: 4
  text: |-
      Interview someone you know fairly well, like, or respect because of his or
      her position, talent, career, or life experiences. Listen actively to learn
      as much as you can about the person. Then prepare and deliver to your
      counselor an introduction of the person as though this person were to be a
      guest speaker, and include reasons why the audience would want to hear this
      person speak. Show how you would call to invite this person to speak.
  resources:
      - href: https://speechcoachforexecutives.com/how-to-introduce-your-guest-speaker/
        text: How to Introduce Your Guest Speaker
        type: website
- requirement: 5
  text: |-
      Attend a public meeting (city council, school board, debate) approved by
      your counselor where several points of view are given on a single issue.
      Practice active listening skills and take careful notes of each point of
      view. Prepare an objective report that includes all points of view that
      were expressed, and share this with your counselor.
  resources:
      - href: https://youtu.be/uy6Eu5l0yOk
        text: 3 Note-Taking Methods in 3 Minutes
        type: video
      - href: https://sulky-answer-76a.notion.site/Note-taking-assignment-tips-52758bb0f5a3486181c4b60b813e0338
        text: Note-Taking Assignment Tips
        type: website
- requirement: 6
  text: |-
      With your counselor's approval, develop a plan to teach a skill or inform
      someone about something. Prepare teaching aids for your plan. Carry out
      your plan. With your counselor, determine whether the person has learned
      what you intended.
  resources:
      - href: https://youtu.be/WAAuRoz4pVc
        text: Scouting's Teaching EDGE
        type: video
- requirement: 7
  text: |-
      Do ONE of the following:
  children:
      - requirement: a
        text: |-
            Write to the editor of a magazine or your local newspaper to express
            your opinion or share information on any subject you choose. Send your
            message by fax, email, or regular mail.
        resources:
            - href: https://scoutlife.org/contact-us/communications-mb/%20
              text: Link to Write to the Editors of Scout Life
              type: website
            - href: https://youtu.be/yxflXSfOalk
              text: How to Write a Letter to the Editor
              type: video
      - requirement: b
        text: |-
            Create a webpage or blog of special interest to you (for instance,
            your troop or crew, a hobby, or a sport). Include at least three
            articles or entries and one photograph or illustration, and one link to
            some other webpage or blog that would be helpful to someone who visits
            the webpage or blog you have created.
            <div class="gap"></div>
            <b>Note:</b> It is not necessary to post your webpage or blog to
            the internet, but if you decide to do so, you must first share it
            with your parent or guardian and counselor and get their
            permission.
        resources:
            - href: https://youtu.be/0woNTtlcxgM
              text: How to Use Google Sites - Tutorial for Beginners
              type: video
            - href: https://youtu.be/A2ky3irNAiw
              text: Build a Website in Canva &amp; Host it for FREE
              type: video
            - href: https://www.easybib.com/
              text: Get Your Paper Hand-In Ready
              type: website
            - href: https://vimeo.com/1154745256/49c11cda51?fl=pl&amp;fe=vl
              text: How to Proofready Your Blog
              type: video
      - requirement: c
        text: |-
            Use desktop publishing to produce a newsletter, brochure, flyer, or
            other printed material for your troop or crew, class at school, or
            other group. Include at least one article and one photograph or
            illustration.
        resources:
            - href: https://youtu.be/DWiM3GLw0Z8
              text: Canva Brochure Design Tutorial
              type: video
            - href: https://youtu.be/7eeUsOQI5EA
              text: How to Make a FLYER in Google Docs
              type: video
            - href: https://youtu.be/pPYcPlTFbwU
              text: How to Use Lucidpress to Make a Pamphlet or Brochure
              type: video
- requirement: 8
  text: |-
      Plan a troop or crew court of honor, campfire program, or an interfaith
      worship service. Have the patrol leaders' council approve it, then write
      the script and prepare the program. Serve as master of ceremonies.
  resources:
      - href: https://troopleader.scouting.org/program-features/
        text: Troop Program Features
        type: website
      - href: https://troopleader.scouting.org/program-features/communication/
        text: 'Program Feature: Communication'
        type: website
      - href: https://troopleader.scouting.org/ceremonies/troop-courts-of-honor/
        text: Troop Courts of Honor
        type: website
      - href: https://troopleader.scouting.org/ceremonies/eagle-courts-of-honor/
        text: Eagle Courts of Honor
        type: website
      - href: https://filestore.scouting.org/filestore/pdf/33696.pdf
        text: Campfire Planning form
        type: pdf
      - href: https://dragon.sleepdeprived.ca/songbook/campfire_planning.htm
        text: Campfire Planning
        type: website
      - href: https://filestore.scouting.org/filestore/pdf/Interfaithservice.pdf
        text: Interfaith Worship Service
        type: pdf
- requirement: 9
  text: |-
      Find out about three career opportunities in communication. Pick one and
      find out the education, training, and experience required for this
      profession. Discuss this with your counselor, and explain why this
      profession might interest you.
