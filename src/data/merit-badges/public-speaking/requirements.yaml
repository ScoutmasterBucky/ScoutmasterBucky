- requirement: 1
  text: |-
      Give a three- to five-minute introduction of yourself to an audience such
      as your troop, class at school, or some other group.
  resources:
      - href: https://youtu.be/l0Nve1zPvNkZ
        text: How To Introduce Yourself In A Speech
        type: video
      - href: https://youtu.be/e_swBD_-yR4
        text: Introduction Speech Example
        type: video
- requirement: 2
  text: |-
      Prepare a three- to five-minute talk on a topic of your choice that
      incorporates body language and visual aids.
  resources:
      - href: https://youtube.com/shorts/xmMfr8RtWkY
        text: How Should I Pick My Speech Topic?
        type: video
      - href: https://youtu.be/ZK3jSXYBNak
        text: 4 Essential Body Language Tips From a World Champion Public Speaker
        type: video
      - href: https://youtu.be/QZ9_4mcMpS0
        text: '3 Minute Speech: How to Craft a Memorable Short Speech?'
        type: video
      - href: https://youtube.com/shorts/IEAmkl7VmHU
        text: 5 Presentation Aids to Make Your Presentation Pop
        type: video
- requirement: 3
  text: |-
      Give an impromptu talk of at least two minutes, either as part of a group
      discussion or before your counselor. Use a subject selected by your
      counselor that is interesting to you but that is not known to you in
      advance and for which you do not have time to prepare.
  resources:
      - href: https://youtube.com/shorts/cOObqPtUlNk
        text: What is Impromptu Speaking?
        type: video
      - href: https://youtube.com/shorts/PcbigPvCi1Y
        text: 'Mastering Impromptu Speaking: An Opportunity!'
        type: video
      - href: https://youtube.com/shorts/L87VlHjbm_M
        text: 'Mastering Impromptu Speaking: Deep Breaths and Go Slow'
        type: video
      - href: https://youtube.com/shorts/nsGHoxuH-VU
        text: How Do I Improve my Impromptu Speeches?
        type: video
      - href: https://youtu.be/Rw2TZv56qO4
        text: How to Pick a Captivating Speech Topic
        type: video
- requirement: 4
  text: |-
      Select a topic of interest to your audience. Collect and organize
      information about the topic and prepare an outline. Write an eight- to
      10-minute speech, practice it, then deliver it in a conversational way.
  resources:
      - href: https://youtube.com/shorts/5G9FQ7Gkt1g
        text: How to Prepare a Speech
        type: video
      - href: https://youtube.com/shorts/zNpPaeRXVIs
        text: The Easiest Way to Practice for a Speech or Presentation
        type: video
- requirement: 5
  text: |-
      Show you know parliamentary procedure by leading a discussion or meeting
      according to accepted rules of order; or by answering questions on the
      rules of order.
  resources:
      - href: https://youtu.be/Kit39MysFL4
        text: Robert's Rules
        type: video
      - href: https://youtu.be/gDfhNGMO_0gl
        text: Roberts Rules of Order Updated
        type: video
