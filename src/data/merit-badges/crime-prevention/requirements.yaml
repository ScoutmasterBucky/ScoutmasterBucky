- requirement: 1
  text: |-
      <b>Laws and Society.</b> Discuss the following with your counselor:
  children:
      - requirement: a
        text: |-
            Why we have criminal laws.
        resources:
            - href: https://youtu.be/j9IvbB50YB0
              text: The Purposes of Criminal Law
              type: video
      - requirement: b
        text: |-
            What are types of crimes, including property crimes, crimes against
            people, white collar crime, and environmental crime.
        resources:
            - href: https://youtu.be/BSyY9RRR6ds
              text: 7 Types of Crime
              type: video
      - requirement: c
        text: |-
            Why people commit crimes.
        resources:
            - href: https://youtu.be/1FD7aMivAek
              text: Why Do People Commit Crimes?
              type: video
      - requirement: d
        text: |-
            Why everyone should follow the law even when no one is watching.
        resources:
            - href: https://youtu.be/PgaLe64jUJk
              text: Why Do We Obey Laws? The Social Contract
              type: video
            - href: https://youtu.be/Ax2Ig6Y9Ve4
              text: Our Social Contract to Follow the Law
              type: video
      - requirement: e
        text: |-
            What is the meaning of crime prevention.
        resources:
            - href: https://youtu.be/RbObl2KKU7A
              text: What is Crime Prevention?
              type: video
            - href: https://youtu.be/PS1RmeyTSD0
              text: Basic Crime Prevention
              type: video
- requirement: 2
  text: |-
      <b>Groups Working to Prevent Crime.</b> Research how the following groups
      contribute to crime prevention and share your findings with your counselor:
  children:
      - requirement: a
        text: |-
            Citizens, including youth
        resources:
            - href: https://youtu.be/WxWrbx0dmzc
              text: 'Neighbors: The Key to Crime Prevention'
              type: video
            - href: https://youtu.be/eVZ-NOoyIIE
              text: How Sport Helps to Prevent Crime
              type: video
      - requirement: b
        text: |-
            Schools
        resources:
            - href: https://youtu.be/qvjG3lmM3Gk
              text: Education Efforts Could Prevent Crime
              type: video
            - href: https://youtu.be/RkMHmdFPkI0
              text: Preventing Crime with Education
              type: video
      - requirement: c
        text: |-
            Neighborhood, social and civic groups, including youth groups
        resources:
            - href: https://youtu.be/lx2wS94nk_Q
              text: Youth Programs Teach Conflict Resolution Skills
              type: video
            - href: https://youtu.be/rhk1Yo_mCvA
              text: Youth Programs Reduce Crime
              type: video
      - requirement: d
        text: |-
            Private security
        resources:
            - href: https://youtu.be/EGPbHVf-rXc
              text: Security Guards Reduce Crime in LA
              type: video
            - href: https://youtu.be/sWHSndoE1U0
              text: Private Security and Crime Prevention
              type: video
      - requirement: e
        text: |-
            Law enforcement agencies
        resources:
            - href: https://youtu.be/UCMgXMc-So8
              text: What is Community Policing?
              type: video
            - href: https://youtu.be/TqWdlDABmvo
              text: Community Policing
              type: video
      - requirement: f
        text: |-
            Courts
        resources:
            - href: https://youtu.be/whgh6FD53wI
              text: Problem-Solving Courts
              type: video
            - href: https://youtu.be/TYTiGwoQLKI
              text: Colorado's 1st JD Problem Solving Courts
              type: video
      - requirement: g
        text: |-
            Corrections and rehabilitation programs
        resources:
            - href: https://youtu.be/Fb-gOS3p44U
              text: How Norway Reinvented Prison
              type: video
            - href: https://youtu.be/Awgq2rQFm34
              text: Humane Incarceration
              type: video
- requirement: 3
  text: |-
      <b>Crime in Your Community, State, and Nation.</b> Do the following:
  children:
      - requirement: a
        text: |-
            With your parent or guardian's permission and the approval of your
            counselor, research local, state, or national news coverage of three
            crimes of different types. Research how common these types of crimes
            are in your state or in the United States.
        resources:
            - href: https://www.youtube.com/watch?v=XmqL65ZBx44
              text: 5 Incredible Prison Rehabilitation Programs
              type: video
            - href: https://www.pewresearch.org/short-reads/2024/04/24/what-the-data-says-about-crime-in-the-us/
              text: What the Data Says About Crime in the U.S. and Substances
              type: video
            - href: https://www.youtube.com/shorts/_W__yWCaCW0
              text: Top 5 Common Crimes in the USA
              type: video
      - requirement: b
        text: |-
            Record notes on which law enforcement agencies and courts were involved
            in the pursuit of justice for the victims and the accused person, why
            you think these crimes were committed, and what could be done to
            prevent similar crimes. Review your research with your counselor.
- requirement: 4
  text: |-
      <b>Home and Neighborhood Crime Prevention.</b> Do the following:
  children:
      - requirement: a
        text: |-
            Discuss the following with your counselor:
        children:
            - requirement: 1
              text: |-
                  How participation in activities of families, churches, sports
                  teams, and clubs prevents crime.
              resources:
                  - href: https://youtu.be/GG5UkPNxBHU
                    text: Church members Escape Crime-Ridden Lives
                    type: video
                  - href: https://youtu.be/oEJoZnsgUZA
                    text: How Can Boxing Clubs Help Prevent Crime
                    type: video
            - requirement: 2
              text: |-
                  How designs of houses, neighborhoods, public buildings, stores,
                  streets, and parks prevent crime.
              resources:
                  - href: https://youtu.be/p3UY1w1O3PA
                    text: What is CPTED?
                    type: video
                  - href: https://youtu.be/CZ5sVtt9-8I
                    text: 'Designing Out Crime: CPTED'
                    type: video
      - requirement: b
        text: |-
            Conduct a security survey of a home, a neighborhood, a park, or a
            camp building with adult supervision and following youth protection
            guidelines using a security checklist in the <em>Crime
            Prevention</em> merit badge pamphlet or one approved by your
            counselor.
        resources:
            - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Crime%20Prevention/Home%20Security%20Checklists%20%231%20%232.pdf
              text: Home Security Checklists # 1 and # 2
              type: pdf
            - href: https://filestore.scouting.org/filestore/Merit_Badge_ReqandRes/Requirement%20Resources/Crime%20Prevention/Camp%20Security%20Checklists%20%231%20%232%2001%202026.pdf
              text: Camp Security Checklists # 1 and # 2
              type: pdf
      - requirement: c
        text: |-
            Use information from your survey for requirement 4(b) and the EDGE method
            to develop a lesson about how a family or Scouts can protect themselves
            from crime. Review your teaching plan with your counselor, then present
            your lesson to your family or to Scouts.
        resources:
            - href: https://www.scouting.org/wp-content/uploads/2019/01/Teaching-Edge-Method.pdf
              text: The EDGE Method of Teaching
              type: pdf
- requirement: 5
  text: |-
      <b>Retail Crime Prevention.</b> Research the following topics and review
      them with your counselor:
  children:
      - requirement: a
        text: |-
            The impact of shoplifting and employee theft (also known as shrinkage)
            and loss prevention on retail finances, customer service, and
            reputation.
        resources:
            - href: https://youtu.be/sQ3m5T4vk3E
              text: The Impact of Shoplifting on the Retail Industry
              type: video
      - requirement: b
        text: |-
            Techniques used by retail stores to prevent shoplifting.
        resources:
            - href: https://youtu.be/j4OJtL7Snko
              text: How to Prevent Shoplifting
              type: video
            - href: https://youtu.be/giFprF8nsKg
              text: Retail Loss Prevention Techniques
              type: video
- requirement: 6
  text: |-
      <b>Reporting Crime.</b> Discuss the following with your counselor:
  children:
      - requirement: a
        text: |-
            When and how to report a crime or an impending crime.
        resources:
            - href: https://youtu.be/uPWW3S_LLT4
              text: How to Report a Crime
              type: video
            - href: https://youtu.be/aMT6wlCOvEM
              text: How to Report a Crime - Public Safety Minute
              type: video
      - requirement: b
        text: |-
            The warning signs for child abuse and domestic violence and how to
            report these situations.
      - requirement: c
        text: |-
            The three R's of personal safety and protection and how to apply them.
      - requirement: d
        text: |-
            How reporting a crime can help law enforcement provide resources for
            crime victims.
        resources:
            - href: https://youtu.be/vZbarQJTs1c
              text: Importance of Reporting Crime
              type: video
- requirement: 7
  text: |-
      <b>Peers and Crime.</b> Discuss the following with your counselor:
  children:
      - requirement: a
        text: |-
            The role that peers play in crime, crime prevention, and experiencing
            crime.
        resources:
            - href: https://youtu.be/2Q4tlPEihAM
              text: 'Adolescent Risk-Takers: The Power of Peers'
              type: video
      - requirement: b
        text: |-
            How to resist peer influence.
        resources:
            - href: https://youtu.be/R3LV5oZPof4
              text: Positive Peer Influences
              type: video
            - href: https://youtu.be/SNZ9LHclUvA
              text: Managing Peer Pressure
              type: video
      - requirement: c
        text: |-
            Bullying and hazing behaviors and signs that a friend may be bullying
            you or someone else.
        resources:
            - href: https://youtu.be/4mrE5zgEvt4
              text: Protect Yourself Rules - Bullying
              type: video
            - href: https://youtu.be/eAj2kTQyEGw
              text: The Basics of Bullying
              type: video
            - href: https://youtu.be/ffzIhWoi5ac
              text: Bullying and How to Stop it
              type: video
      - requirement: d
        text: |-
            Explain the impact of gangs on communities.
        resources:
            - href: https://youth.gov/youth-topics/preventing-gang-involvement/adverse-effects
              text: How Gangs Affect Communities
              type: website
- requirement: 8
  text: |-
      <b>Substance Use and Crime.</b> Discuss the following with your counselor:
  children:
      - requirement: a
        text: |-
            The legal and health consequences of using alcohol, tobacco and vaping
            products, illegal drugs, and diverted prescription drugs.
        resources:
            - href: https://youtu.be/hBC7i-vHWsU
              text: The Science of Addiction
              type: video
            - href: https://youtu.be/9dZS_Rniak0
              text: Electronic Cigarettes and Vaping
              type: video
            - href: https://youtu.be/Y4xITbvN7rk
              text: Legal Consequences of Drugs
              type: video
            - href: https://youtu.be/b6Dte96WdqM
              text: Drug Abuse, Causes, Signs and Symptoms, Diagnosis and Treatment
              type: video
      - requirement: b
        text: |-
            How substance use contributes to violence and property crime and
            increases a person's risk of becoming a victim of crime.
        resources:
            - href: https://ncaddnational.org/addiction_articles/alcohol-drugs-and-crime/
              text: Drugs and Crime
              type: website
            - href: https://drugabusestatistics.org/drug-related-crime-statistics/
              text: Crimes Related to Drugs
              type: website
      - requirement: c
        text: |-
            How drug abuse awareness, prevention, and recovery programs help
            prevent crime.
        resources:
            - href: https://youtu.be/ATaSk7NzXLc
              text: Reduce Crime AND Save Money
              type: video
      - requirement: d
        text: |-
            How to get help if you or someone you know needs help with drugs or
            alcohol.
        resources:
            - href: https://findtreatment.gov/
              text: Finding Help for Drug and Alcohol Disorders
              type: website
            - href: https://youtu.be/IcLtRTEP7eo
              text: Treatment Choices for Substance Use Disorders
              type: video
- requirement: 9
  text: |-
      <b>Online Crime and You.</b> Discuss the following with your counselor:
  children:
      - requirement: a
        text: |-
            How to avoid being the victim of online crimes.
        resources:
            - href: https://youtu.be/_IELMnzqVgQ
              text: Top 10 Cyber Crimes
              type: video
            - href: https://consumer.ftc.gov/protect-your-personal-information-hackers-scammers#keep
              text: Protect Your Personal Information From Hackers and Scammers
              type: website
      - requirement: b
        text: |-
            Common online financial scams.
        resources:
            - href: https://youtu.be/k8UVnkh8i0c
              text: Common Online Scams
              type: video
      - requirement: c
        text: |-
            Effective online security.
        resources:
            - href: https://youtu.be/aO858HyFbKI
              text: Effective Online Security
              type: video
            - href: https://filestore.scouting.org/filestore/YPSAT/YT%20Mod1%20Final%20Master%20Small.mp4
              text: Digital Safety
              type: video
      - requirement: d
        text: |-
            Identity theft and how to prevent it.
        resources:
            - href: https://youtu.be/kDFeSUUwRnA
              text: Preventing Identity Theft
              type: video
            - href: https://youtu.be/zq8ErbZzcbI
              text: How to Prevent Identity Theft
              type: video
      - requirement: e
        text: |-
            How criminals use social media to target victims.
        resources:
            - href: https://youtu.be/5bdBvNCBeho
              text: How Criminals Use Social Media
              type: video
      - requirement: f
        text: |-
            How bullying, texting, and sharing photos can become crimes.
        resources:
            - href: https://www.scouting.org/training/youth/bullying/
              text: Bullying Awareness
              type: website
            - href: https://www.stopbullying.gov/
              text: 'Prevention: Learn How to Identify Bullying and Stand Up to It Safely'
              type: website
            - href: https://youtu.be/0Xo8N9qlJtk
              text: Top 10 Forms of Cyber Bullying
              type: video
            - href: https://filestore.scouting.org/filestore/YPSAT/YT%20Mod2%20Final%20Master%20Small.mp4
              text: Bullying
              type: video
- requirement: 10
  text: |-
      <b>Interview.</b> With your parent or guardian's permission and your
      counselor's approval, interview a law enforcement officer or a civil
      servant about their work in crime prevention. Learn about how they chose
      this career and about their duties. Discuss what you learned with your
      counselor.
- requirement: 11
  text: |-
      <b>Careers.</b> Identify three career opportunities that would use skills
      and knowledge in the field of crime prevention. Pick one and research the
      training, education, certification requirements, experience, and expenses
      associated with entering the field. Research the prospects for
      employment, starting salary, advancement opportunities and career goals
      associated with this career. Discuss what you learned with your counselor
      and whether you might be interested in this career.
  resources:
      - href: https://youtu.be/eqTjWF4GRm0
        text: 8 Careers in Criminal Justice
        type: video
      - href: https://youtu.be/kR-yLbFoR9A
        text: How Law Enforcement Agencies Serve the Public
        type: video
