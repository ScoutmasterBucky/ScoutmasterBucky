- requirement: 1
  text: |-
      Tell the history of papermaking. Describe the part paper products play in
      our society and economy.
  resources:
      - href: https://youtu.be/gvdeiWWOG8w
        text: The History of Paper From Ancient China to Modern Times
        type: video
- requirement: 2
  text: |-
      Learn about the pulp and paper industry.
  children:
      - requirement: a
        text: |-
            Describe the ways the industry plants, grows, and harvests trees.
        resources:
            - href: https://youtu.be/qNX5EkbqYek
              text: How They Grow Trees for Paper Manufacture
              type: video
      - requirement: b
        text: |-
            Explain how the industry manages its forests so that the supply of
            trees keeps pace with the demand.
        resources:
            - href: https://youtu.be/jGvlrhivWo8
              text: Forest Management
              type: video
      - requirement: c
        text: |-
            Tell how the industry has incorporated the concepts of sustainable
            forest management (SFM).
        resources:
            - href: https://youtu.be/dYFt-3LNNNg
              text: Sustainable Forestry
              type: video
      - requirement: d
        text: |-
            Describe two ways the papermaking industry has addressed pollution.
        resources:
            - href: https://youtu.be/bNjp_J3yang
              text: Green Spotlight on the Paper Industry
              type: video
- requirement: 3
  text: |-
      Name at least four types of trees that are major sources of papermaking
      fibers. Then do the following:
  resources:
      - href: https://youtube.com/shorts/oRgPQdX0CLI
        text: What Kind of Tree Does Paper Come From
        type: video
  children:
      - requirement: a
        text: |-
            Discuss what other uses are made of the trees and the forestland owned
            by the pulp and paper industry.
        resources:
            - href: https://www.britannica.com/science/forestry/Range-and-forage
              text: Purposes and Techniques of Forest Management
              type: website
      - requirement: b
        text: |-
            Describe two ways of getting fibers from wood, and explain the major
            differences between them.
        resources:
            - href: https://youtube.com/shorts/c-87Bw_lXso
              text: From Tree to Paper
              type: video
      - requirement: c
        text: |-
            Tell why some pulps are bleached, and describe the process.
        resources:
            - href: https://youtu.be/d43q0j831f8
              text: Bleaching
              type: video
- requirement: 4
  text: |-
      Describe how paper is made. Discuss how paper is recycled. Make a sheet of
      paper by hand.
  resources:
      - href: https://youtu.be/OEbf9ffkyy8
        text: Production of Paper
        type: video
      - href: https://youtu.be/invUjqvE0Oc
        text: 'From Tree to Sheet: How Paper Is Made | Unveiling the Manufacturing Process'
        type: video
      - href: https://youtu.be/Ow5LeG-zzyg
        text: How to Make Handmade Paper from Recycled Materials
        type: video
- requirement: 5
  text: |-
      Explain what coated paper is and why it is coated. Describe the major uses
      for different kinds of coated papers. Describe one other way that paper is
      changed by chemical or mechanical means to make new uses possible.
  resources:
      - href: https://youtu.be/TCFpE6vtC4s
        text: Coated vs. Uncoated Paper
        type: video
- requirement: 6
  text: |-
      Make a list of 15 pulp or paper products found in your home. Share examples
      of 10 such products with your counselor.
- requirement: 7
  text: |-
      With your parent or guardian's and counselor's approval, do ONE of the
      following:
  children:
      - requirement: a
        text: |-
            Visit a pulp mill. Describe how the mill converts wood to cellulose
            fibers.
        resources:
            - href: https://www.afandpa.org/news/2025/how-paper-made-today
              text: How Is Paper Made Today?
              type: website
      - requirement: b
        text: |-
            Visit a paper mill and get a sample of the paper made there. Describe
            the processes used for making this paper. Tell how it will be used.
      - requirement: c
        text: |-
            Visit a container plant or box plant. Describe how the plant's products
            are made.
        resources:
            - href: https://corrugatedboxcompanies.com/more-corrugated-box-companies-listings/
              text: Corrugated Box Companies Listings
              type: website
      - requirement: d
        text: |-
            Visit a recycled paper collection or sorting facility. Describe the
            operations there.
        resources:
            - href: https://youtu.be/xEdwIHtK_6k
              text: Discover How Paper is Sorted for Recycling!
              type: video
            - href: https://youtu.be/ZuZJZccjI34
              text: How Is Paper Recycled?
              type: video
            - href: https://recycling-centers.regionaldirectory.us/
              text: Recycling Centers in the US
              type: website
      - requirement: e
        text: |-
            Using books, magazines, your local library, the internet (with your
            parent or guardian's permission), and any other suitable research tool,
            find out how paper products are developed. Find out what role research
            and development play in the papermaking industry. Share what you
            learned with your counselor.
        resources:
            - href: https://youtu.be/xcrVyh7s6zA
              text: Revolutionizing the Paper Industry
              type: video
            - href: https://www.startus-insights.com/innovators-guide/pulp-and-paper-trends/
              text: Top 10 Pulp and Paper Trends &amp; Innovations in 2025
              type: website
- requirement: 8
  text: |-
      Find out about three career opportunities in the papermaking industry that
      interest you. Pick one and find out the education, training, and experience
      required for this profession. Discuss this with your counselor, and explain
      why this profession might interest you.
  resources:
      - href: https://youtu.be/JceCMm-kbg4
        text: Why a Career in Pulp and Paper Pays Off
        type: video
      - href: https://youtu.be/QUeAwmqD4CM
        text: Career Opportunities at Catalyst Paper
        type: video
      - href: https://youtu.be/yfZzS3zmytQ
        text: Amazing Summer Internships for Students at Pulp and Paper
        type: video
      - href: https://youtu.be/-zw1BXofRK4
        text: Working for International Paper
        type: video
      - href: https://www.indeed.com/career-advice/finding-a-job/jobs-in-paper-industry
        text: Jobs in the Paper Industry
        type: website
