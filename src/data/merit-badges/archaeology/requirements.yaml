    requirement: 5
    text: 'Do the following:'
    children:
        -
            requirement: a
            text: |-
                Learn about the federal laws and international conventions that
                protect archaeological sites. Find out if your state, county, or
                local government has regulations that apply to archaeological or
                historic sites.
            resources:
                -
                    href: >-
                        https://www.nps.gov/subjects/archeology/laws-regulations-guidelines.htm
                    text: Laws, Regulations, &amp; Guidelines
                    type: website
        -
            requirement: b
            text: |-
                Identify a national, international, or local organization that
                helps to protect archaeological sites.
            resources:
                -
                    href: https://smarthistory.org/preserve-cultural-heritage/
                    text: |-
                        Organizations and Agencies that Work to Protect Cultural
                        Heritage
                    type: website
