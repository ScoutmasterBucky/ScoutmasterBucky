# 4d - removed the space in "Quarter® /territories"
# 4d: "Current American Woman Quarters" is "Women" according to US Mint.
# 4f: According to the US Mint's website, the Sacagawea Golden Dollar
# transitioned in 2009 to the Native American $1 Coin Program using the
# Sacagawea obverse paired with different designs each year.
# 4f: Punctuation should be changed to use semicolons - Susan B. Anthony 1979-1981, 1999; Sacagawea 2000-2008; U.S. Presidents 2007-2016, 2020.
