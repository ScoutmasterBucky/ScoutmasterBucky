    requirement: 5
    text: '<b>Fire Safety at Home.</b> Do the following:'
    children:
        -
            requirement: a
            text: |-
                Describe how to prevent the frequent causes of home fires,
                including unattended cooking, electricity, smoking, clothes
                dryers, and rechargeable batteries.
            resources:
                -
                    href: >-
                        https://www.injurylawyers.com/blog/5-leading-causes-of-house-fires/
                    text: 5 Most Common Causes of House Fires
