                -
                    href: https://youtu.be/1WOO-Sn2pNI
                    text: Fireworks and Wildfires
                    type: video
        -
            requirement: b
            text: |-
                Describe how to prevent frequent causes of seasonal and
                holiday-related home fires, including fires related to home
                heating, holiday trees, candles, and fireworks.
            resources:
                -
                    href: https://youtu.be/6ggmmzFSgpU
                    text: How To Prevent Holiday Fires
                    type: video
        -
