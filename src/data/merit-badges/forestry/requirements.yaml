- requirement: 5
  text: |-
      With your parent or guardian's and counselor's approval, do ONE of the
      following:
  children:
      - requirement: a
        text: |-
            Visit a managed public or private forest area with the manager or a
            forester who is familiar with it. Write a brief report describing the
            type of forest, the management objectives, and the forestry techniques
            used to achieve the objectives.
        resources:
            - href: https://youtu.be/1iTvc_8AFVc
              text: International Paper Managed Forest Tour
              type: video
      - requirement: b
        text: |-
            With a knowledgeable individual, visit a current or past logging
            operation or wood-using manufacturing plant. Write a brief report
            describing the following:
        resources:
            - href: https://youtu.be/OBlcDZxHKXY
              text: 'A Possible Virtual Tour: Big Logging Equipment in Action'
              type: video
        children:
            - requirement: 1
              text: |-
                  The species and size of trees harvested or used.
            - requirement: 2
              text: |-
                  The origin of the forest or stands of trees utilized (e.g.,
                  planted or natural)
            - requirement: 3
              text: |-
                  The forest's successional stage. What is its future? If it is a past
                  logging operation, note the regeneration that is occurring either
                  planted or natural.
            - requirement: 4
              text: |-
                  Where the trees are coming from (land ownership) or where they are
                  going (type of mill or processing plant).
            - requirement: 5
              text: |-
                  The products that are made from the trees.
            - requirement: 6
              text: |-
                  How the products are made and used.
            - requirement: 7
              text: |-
                  How waste materials from the logging operation or manufacturing
                  plant are or were disposed of or utilized.
      - requirement: c
        text: |-
            Take part in a forest-fire prevention campaign in cooperation with your
            local fire warden, state wildfire agency, forester, or counselor.
            Write a brief report describing the campaign, how it will help prevent
            wildfires, and your part in it.
        resources:
            - href: https://youtu.be/vL_syp1ZScM
              text: Your Home Can Survive a Wildfire
              type: video
