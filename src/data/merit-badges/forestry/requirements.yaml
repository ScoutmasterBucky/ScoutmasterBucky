        text: Top 10 Benefits of Forestry
        type: website
      - href: https://youtu.be/QqDIMbWypDU
        text: How Forests Make Our Lives Better
        type: video
  children:
      - requirement: a
        text: |-
            Describe the contributions forests make to:
        children:
            - requirement: 1
              text: |-
                  Our economy in the form of products
            - requirement: 2
              text: |-
                  Our social well-being, including recreation
            - requirement: 3
              text: |-
                  Soil protection and increased fertility
            - requirement: 4
              text: |-
                  Clean water
            - requirement: 5
              text: |-
                  Clean air (carbon cycling, sequestration)
            - requirement: 6
              text: |-
                  Wildlife habitat
            - requirement: 7
              text: |-
                  Fisheries habitat
            - requirement: 8
              text: |-
                  Threatened and endangered species of plants and animals
      - requirement: b
        text: |-
            Tell which watershed or other source your community relies on for its
            water supply.
