# Requirement 5b's list items have inconsistent trailing punctuation.
- text: |-
      <b>NOTE:</b> <i>Scouts must remember to follow the Leave No Trace Seven
      Principles and the Outdoor Code while on field trips and when collecting
      specimens. Make sure you have permission of the land manager prior to
      taking any samples for your collection. Collecting is prohibited in most
      National and State Parks. Pictures or sketches may suffice for a
      collection and limit impacted disturbances.</i>
- requirement: 1
  text: |-
      Prepare a field notebook, make a collection, and identify 15 species of
      trees, wild shrubs, or vines in a local forested area. Write a description
      in which you identify and discuss the following:
  resources:
      - href: https://youtu.be/06nhKenT4109
        text: How to Press Leaves
        type: video
      - href: https://youtu.be/AtoSxXlRzsM
        text: Best Tree ID Apps Reviewed
        type: video
  children:
      - requirement: a
        text: |-
            The characteristics of leaf, twig, cone, or fruiting bodies
      - requirement: b
        text: |-
            The habitat in which these trees, shrubs, or vines are found.
      - requirement: c
        text: |-
            The important ways each tree, shrub, or vine is used by humans or
            wildlife and whether the species is native or was introduced to the
            area. If it is not native, explain whether it is considered invasive or
            potentially invasive.
- requirement: 2
  text: |-
      Do ONE of the following:
  children:
      - requirement: a
        text: |-
            Collect and identify wood samples of 10 species of trees. List several
            ways the wood of each species can be used.
        resources:
            - href: https://youtu.be/HKU8EKGSsHY
              text: How to Identify Wood Species
              type: video
            - href: https://youtu.be/Lj5MPkEsuSY
              text: Mississippi State University Wood ID Team
              type: video
      - requirement: b
        text: |-
            Find and examine three stumps, logs, or core samples that show
            variations in the growth rate of their ring patterns. In the field
            notebook you prepared for requirement 1, describe the location or
            origin of each example (including elevation, aspect, slope, and the
            position on the slope), and discuss possible reasons for the variations
            in growth rate. Photograph or sketch each example.
        resources:
            - href: https://youtu.be/7zMWaFRRExI
              text: Reading a Tree's Stump
              type: video
            - href: https://youtu.be/8qtlZk8QFRw
              text: Aging of Trees; Studying Tree Rings
              type: video
      - requirement: c
        text: |-
            Find and examine two types of animal, insect, or disease damage to
            trees. In the field notebook you prepared for requirement 1, identify
            the damage, explain how the damage was caused, and describe the effects
            of the damage on the trees. Photograph or sketch each example.
        resources:
            - href: https://youtu.be/LUShQaEXmMA
              text: 'Ask an Arborist: How Do I Check for Tree Pests?'
              type: video
            - href: https://youtu.be/81edC7KdOCc
              text: Why You Should Stomp Every Spotted Lanternfly
              type: video
            - href: https://www.bhg.com/gardening/pests/insects-diseases-weeds/tree-disease-photos/
              text: 10 Pictures of Tree Diseases and Pests to Help You Spot Problems
              type: website
- requirement: 3
  text: |-
      Do the following:
  resources:
