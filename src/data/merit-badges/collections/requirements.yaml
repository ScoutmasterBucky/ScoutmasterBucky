- text: |-
      <b>NOTE: <a href="/merit-badges/stamp-collecting/">Stamp</a> and <a
      href="/merit-badges/coin-collecting/">coin collecting</a> are excluded
      from eligibility for this merit badge.</b>
      <div class="gap"></div>
      <b>Scouts must remember to follow the Leave No Trace Seven Principles and
      the Outdoor Code while on field trips and when collecting specimens. Make
      sure you have permission of the land manager prior to taking any samples
      for your collection. Collecting is prohibited in most National and State
      Parks. Pictures or sketches may suffice for a collection and limit
      impacted disturbances.</b>
- requirement: 1
  text: |-
      Prepare a short written report or outline for your counselor, giving a
      detailed description of your collection, including a short history, why
      you enjoy your collection, and what you have learned from collecting. Be
      sure to include why you chose that particular type of collection/collecting
      method.
  resources:
      - href: https://youtu.be/G09aIKMBNhE
        text: The Invention of Collecting
        type: video
      - href: https://icebreakerideas.com/things-to-collect/
        text: 246 Cool Things to Collect (Collection Ideas)
        type: website
      - href: https://youtu.be/FtaG6XgemUY
        text: Meet Reece, King of the Fans | My Kid's Obsession
        type: video
- requirement: 2
  text: |-
      Explain the growth and development of your collection.
  resources:
      - href: https://youtu.be/dPnsVmEk3Y4
        text: 'Collecting Tips 101: Tip #4 Do Your Research'
        type: video
      - href: https://youtu.be/rGLfkhaTts4
        text: 'Collecting Tips 101: Tip #86 Be Unique'
        type: video
      - href: https://youtu.be/cOleElanH6w
        text: 'Collecting Tips 101: Tip #2 Budget Your Money'
        type: video
      - href: https://youtu.be/fB7j8OZk4f0
        text: 'Collecting Tips 101: Tip #27 Leave Room to Grow'
        type: video
- requirement: 3
  text: |-
      Demonstrate your knowledge of preserving and displaying your collection.
  children:
      - requirement: a
        text: |-
            Explain the precautions you need to take to preserve your collection,
            including handling, cleaning, and storage.
        resources:
            - href: https://www.homeaswemakeit.com/20-best-ways-to-store-preserve-vintage-collectibles-for-long-term-value/
              text: 20 Best Ways to Store &amp; Preserve Vintage Collectibles for Long-Term Value
              type: website
            - href: https://youtu.be/1_QFgGbywAc
              text: 'Collecting Tips 101: Tip #61 You Shalt Dust? (General Cleaning)'
              type: video
            - href: https://youtu.be/e-5c_DcByWU
              text: 'Collecting Tips 101: Tip #25 Where to Keep a Collection'
              type: video
            - href: https://youtu.be/Ck5yO9gg1uc
              text: 'Collecting Tips 101: Tip #20 Stay Away From Sunlight'
              type: video
            - href: https://www.youtube.com/shorts/C2-ZPL3jRHU
              text: 3 Ways to Store and Organize Your Squishmallows
              type: video
      - requirement: b
        text: |-
            Explain how best to display your collection, keeping in mind preserving
            as discussed above.
        resources:
            - href: https://youtu.be/VRehA_4XJcY
              text: 5 TIPS to Display your Collection LIKE A PRO --- Props, Statues, Star Wars &amp; more
              type: video
            - href: https://youtu.be/vveS2xB97b8
              text: How To Display Your Collection Like a PRO (As a Broke College Student)
              type: video
            - href: https://youtu.be/xfFWEpkfTl8
              text: How to Display Squishmellows
              type: video
      - requirement: c
        text: |-
            Explain to your counselor the events available for a hobbyist of this
            collection, including shows, seminars, conventions, contests, and
            museum programs and exhibits.
        resources:
            - href: https://whichmuseum.com/
              text: Museums
              type: website
      - requirement: d
        text: |-
            Explain to your counselor how you keep track of your collection.
            Describe your cataloging method.
        resources:
            - href: https://www.youtube.com/shorts/YUn5su6RKDE
              text: How I Keep Track of My 4000+ Dolls!
              type: video
            - href: https://youtu.be/wLAoVbLuur0
              text: "Citizen Collector's Toolkit: How to document your collection"
              type: video
            - href: https://youtu.be/zLT1aqMgJWs
              text: 'Collecting Tips 101: Tip #5 Database Your Collection'
              type: video
            - href: https://youtu.be/DKOFh-Kyhcs
              text: How to Organize POKEMON Cards
              type: video
- requirement: 4
  text: |-
      Demonstrate your knowledge of collecting and investing. Discuss with your
      counselor:
  children:
      - requirement: a
        text: |-
            How investing and speculation would apply to your collection
        resources:
            - href: https://www.forbes.com/advisor/investing/how-to-invest-in-collectibles/
              text: Find Investments to Meet Your Financial Goals
              type: website
            - href: https://youtu.be/j2YLShzE-PU
              text: 'Collecting Tips 101: Tip #48 Predicting Rare Games'
              type: video
      - requirement: b
        text: |-
            What you would look for in purchasing other collections similar to
            yours
      - requirement: c
        text: |-
            What you would expect in return value if you decided to sell all or
            part of the collection
        resources:
            - href: https://www.worldcollectorsnet.com/category/whats-it-worth/
              text: What's it Worth - Free Antiques &amp; Collectables Price Guide
              type: website
  resources:
      - href: https://youtu.be/ZSZXXjrWMf0
        text: 5 Smart Tips for Collecting Pokemon Cards on a Budget
        type: video
      - href: https://www.investopedia.com/articles/basics/06/contemplatingcollectibles.asp
        text: Contemplatiing Collectible Investments
        type: website
- requirement: 5
  text: |-
      Do the following:
  children:
      - requirement: a
        text: |-
            Discuss with your counselor at least 10 terms commonly used to describe
            your collection and be prepared to discuss the definition of each.
        resources:
            - href: https://page.nomenclature.info/apropos-about.app?lang=en
              text: Nomenclature for Museum Cataloging
              type: website
      - requirement: b
        text: |-
            Show your counselor any two groups from your collection. Explain how
            you organized your collection and why you chose that method. (Note: if
            your collection is too large to transport and your counselor is unable
            to view your collection directly, photographs should be available to
            share.)
      - requirement: c
        text: |-
            Explain the monetary value of your collection and where you learned
            about those values.
        resources:
            - href: https://www.liveabout.com/how-to-find-the-value-of-an-item-780265
              text: How to Find Out What It's Worth
              type: website
            - href: https://www.lovetoknow.com/home/antiques-collectibles/how-much-are-my-collectibles-worth
              text: How Much Are My Collectibles Worth? Tips for Finding Values
              type: website
      - requirement: d
        text: |-
            Explain how your collection is graded for value, physical defects,
            size, and age. Show the various classifications or ratings used in your
            collection.
        resources:
            - href: https://stonehards.com/articles/understanding-museum-quality-in-collectibles/
              text: Understanding Museum Quality in Collectibles and Artifacts
              type: website
      - requirement: e
        text: |-
            List the national, state, or local association(s) related to or
            associated with your collection.
        resources:
            - href: https://acna.us/national.html
              text: Antiques &amp; Collectibles National Association Directory
              type: website
      - requirement: f
        text: |-
            Explain to your counselor the purpose of and reason for the
            identification number (if applicable), series, brand name (if any), and
            any other special identification marks.
- requirement: 6
  text: |-
      Discuss with your counselor the plans you have to continue with the
      collection in the future.
- requirement: 7
  text: |-
      Find out about career opportunities in collecting. Pick one and find out
      the education, training, and experience required for this profession.
      Discuss this with your counselor, and explain why this profession might
      interest you.
  resources:
      - href: https://youtu.be/zLYjrT_jvY0
        text: Curators, Conservators, and Museum Workers Career Video
        type: video
      - href: https://youtu.be/bvMjvg23mBk
        text: 'Dream Jobs: Antiquer'
        type: video
