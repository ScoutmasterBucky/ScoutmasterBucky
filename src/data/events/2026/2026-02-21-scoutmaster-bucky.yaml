     Giving to AllyHoo!
noticeHtml: |-
     <p>Our February 2026 Year of Giving recipient will be Allyhoo. To receive your limited edition February Scoutmaster Bucky pin, we are collecting one yard of fleece (or equivalent remnant), 8+ white fabric pencils, or 24+ oz. bag(s) of Premium Polyester Fiberfill. Alternatively, the February Month of Giving Pin is available for $10, with the full $10 donated directly to the organization.</p>
