html: |-
    <p>Ten Ring and Rapids Archery Club are helping Scouts earn the Archery merit badge. Upon registration, Ten Ring will provide a workbook that must be completed before class. Also, bring your signed blue card. They are asking for a voluntary donation of $5 per Scout to cover materials and a food item to be donated to a local food shelf.</p>
