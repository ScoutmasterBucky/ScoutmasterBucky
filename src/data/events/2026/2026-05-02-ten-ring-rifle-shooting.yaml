html: |-
    <p>Ten Ring is helping Scouts earn the Rifle Shooting merit badge. These classes are offered several times throughout the weekend and each runs for approximately 3 hours. Please come to class with a completed Ten Ring workbook, the merit badge pamphlet, a signed blue card, and a signed permission slip.</p>
