html: |-
    <p>This event is designed to provide older Scouts, ages 15-17, with valuable insights and practical skills to prepare them for the workforce.</p>
    <p>Scouts will be interviewing for the (pretend) positions at <a href="/enterprises/">Bucky Enterprises</a>. To be best prepared for this day, Scouts should do the following:</p>
    <ul>
        <li>Dress appropriately for an interview with a business.</li>
        <li>Bring five copies of your resume (if possible).</li>
        <li>Be prepared to participate in mock interviews.</li>
        <li>Bring a water bottle, notepad, and pen for taking notes.</li>
    </ul>
    <p>There are four overlapping sessions throughout the day - register for the one that best fits your schedule. Each session has the same content and will cover a range of topics including resume tips, interview techniques, workplace etiquette, and more. Scouts will have the opportunity to engage in interactive activities, practice interview scenarios, and receive personalized feedback from experienced professionals.</p>
    <p>Don't miss this chance to equip yourself with essential job skills that will set you apart in the competitive job market. Whether you're preparing for your first job or looking to enhance your existing skills, Scoutmaster Bucky's Job Skills day is the perfect opportunity to learn and grow. Register now to secure your spot!</p>
